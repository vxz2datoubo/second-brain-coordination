# PIT AND LOOK-AHEAD REVIEW (Q01-Q04)
# ============================================================================
pit_and_lookahead:
  Q01_REFERENCE_ZONE_FIELDS:
    status: "PARTIAL"
    evidence: "REFERENCE-ZONE-DEFINITION-CONTRACT.yaml zone_families lists 8 zone types with bar_fields and lookback parameters. Covered 3 mandatory zone types: price_level_zone (PREVIOUS_SESSION_EXTREME, PIT_N_BAR_SWING, PRICE_LIMIT_BOUNDARY, PRE_REGISTERED_ROUND_NUMBER), volume_zone (BAR_VWAP_BAND, BAR_VOLUME_DISTRIBUTION_CANDIDATE), volatility_zone (not explicitly named; nearest is COMPLETED_BAR_LOCAL_EXTREME and OPENING_RANGE which combine price levels. No explicit volatility-only zone family)."
    score: 0.5

  Q02_TIMESTAMP_CAUSALITY:
    status: "PARTIAL"
    evidence: "Invariants: 'defined_at <= available_at' and 'available_at <= breach_event.event_time'. Multi-timeframe proof states daily zone only eligible after day completion. These are CONTRACT statements, not machine-executable proofs. No computational proof that generates a timestamp chain for a concrete example."
    score: 0.5

  Q03_ZONE_VERSIONING:
    status: "PARTIAL"
    evidence: "Invariants: 'zone version changes only at a completed source-bar available_at boundary' and 'expired/superseded zones remain immutable records'. Defines applicable-version rule implicitly: version active at available_at boundary. No explicit per-time-period applicability table for a concrete example."
    score: 0.5

  Q04_MULTI_TIMEFRAME:
    status: "PARTIAL"
    evidence: "Multi-timeframe proof section addresses daily→intraday causality: 'A zone sourced from daily D is only eligible after D has completed', 'never eligible for a minute bar earlier on D'. DATA-CAPABILITY-AND-PIT-CONTRACT timeframe_join_rule provides join semantics. No concrete causation diagram or worked example."
    score: 0.5

