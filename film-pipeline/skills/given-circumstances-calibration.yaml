# ============================================================
# 原子技能 · given-circumstances-calibration
# 来自纠正：2026-07-12 Shot 1 凯姆不应"眼神倦怠"
# ============================================================
id: given-circumstances-calibration
version: "1.0"
status: 已锁定
created: 2026-07-12
source_correction: "凯姆'眼神倦怠'被纠正为'漫不经心'——前杀手抓弱目标不值得疲惫"

# ---------- 双环学习追踪 ----------
default_assumption: "任务看起来很辛苦/无聊 → 角色应该显得累/厌倦"
corrected_assumption: "角色的反应不是由任务表面决定，而是由任务相对于角色能力的难度决定。前杀手抓柔弱的私奔男 = 一只手就够了——反应应该是漫不经心/无所谓，不是疲惫。"
double_loop_scope: "泛化——所有场景中角色对任务的反应必须经过'给定情境'校准：这个任务对角色而言有多难？"
# -----------------------------------

# ------------------------------------------------------
# 学术依据
# ------------------------------------------------------
academic_basis:
  - source: "Stanislavski - Given Circumstances"
    key_point: "'没有规定情境，就没有行动，行动永远是对规定情境的回答'。角色的背景（前杀手）、能力（远高于目标）、任务性质（抓人而非杀人）——这些给定情境决定了角色对任务的反应。"
    ref: "baike.baidu.com / wikiwand.com"
  
  - source: "Stanislavski - Magic If"
    key_point: "演员问'如果我是这个人物，在这种情况下我会怎么做？'——前杀手抓弱目标 = trivial task → 不需要动用任何情绪资源 → 漫不经心。"
    ref: "klieg.org"

# ------------------------------------------------------
# 何时触发
# ------------------------------------------------------
triggers:
  - scene_type: "角色在完成某项任务"
    conditions:
      - 任务的难度级别与角色能力存在明显差距
      - 角色有过往经历（given circumstances）会影响其对任务的感知

  - scene_type: "角色的反应标签可能与给定情境不符"
    conditions:
      - 标注了"疲倦"/"厌倦"等情绪词
      - 但角色的背景（前杀手/老兵/老手）暗示任务对他们而言不值一提

# ------------------------------------------------------
# 核心原则
# ------------------------------------------------------
principle: >
  角色的反应不是由任务表面决定的，而是由任务相对于角色能力的难度决定的。
  问："这个任务对于角色而言有多难？"
  如果 trivial（前杀手抓弱人 = 一只手）→ 反应是漫不经心/无所谓，不是疲惫。
  如果 挑战性（普通人面对这种事会紧张）→ 反应才可能是紧张/疲惫。
  
  追加（2026-07-12）：routine 时刻不添加戏剧性——当场景前后没有重大事件发生时，
  角色的动作应该匹配 scene baseline：抿酒而非灌酒，日常而非异常。
  "灌酒"暗示角色在消化什么大事——如果没有大事，就不要制造假大事。
  给定情境（角色背景、能力、过往经历）决定角色的反应校准。

# ------------------------------------------------------
# 应用规则
# ------------------------------------------------------
rules:
  diagnose:
    - question: "这个角色以前是做什么的？这段经历会影响他对当前任务的感知吗？"
    - question: "这个任务相对于角色的能力水平，有多难？"
    - question: "如果角色是个新手/普通人，反应会有什么不同？——差异就是'给定情境校准'的作用"

  apply:
    - step: "读角色设定文件（ASSET-INDEX → profile .txt）→ 找到角色的过往经历和能力水平"
    - step: "估算当前任务对角色而言的难度：trivial / 适中 / 极具挑战"
    - step: "根据难度校准表演反应：trivial→漫不经心; 适中→专注; 极致挑战→紧张/投入"
    - step: "切勿：把任务本身的性质（'抓人很累'）直接套在角色身上，忽略角色的个人史"

  counter_example: "不要做的事：看到一个角色'抓了一个人'就假设他应该疲惫。先查他的背景——如果是前杀手，连热身都不算。"

# ------------------------------------------------------
# 测试案例
# ------------------------------------------------------
examples:
  wrong:
    character: "凯姆（前杀手）"
    task: "抓回私奔男（毫无攻击力的年轻人）"
    ai_output: "眼神倦怠、因任务结束如释重负"
    problem: "把任务性质当成角色反应——抓人=累。忽略了给定情境：他是前杀手，这活一只手就够了。"

  correct:
    character: "凯姆（前杀手）"
    task: "抓回私奔男"
    ai_output: "眼神平淡漫不经心、单手递出人质——不是疲倦，是不值得认真。目光飘向酒架——不是回避，是不在乎。"
    reasoning: "任务 trivial → 漫不经心。任务简单到不需要双手。不累，因为没消耗任何真正的能力。"

  wrong_routine_action:
    scene: "Shot 2 凯姆喝酒"
    ai_output: "凯姆灌了一大口酒"
    problem: "'灌酒'暗示角色在消化什么大事或情绪。但前后没有任何重大事件——私奔男这种事司空见惯。灌酒 = 给日常加了不该有的戏剧性。"

  correct_routine_action:
    scene: "Shot 2 凯姆喝酒"
    corrected: "凯姆抿了一口酒"
    reasoning: "routine 时刻匹配 routine 动作。抿酒 = 日常。"
