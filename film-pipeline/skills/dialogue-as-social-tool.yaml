# ============================================================
# 原子技能 · dialogue-as-social-tool
# 来自纠正：2026-07-12 奥兹-凯姆吧台场景
# ============================================================
id: dialogue-as-social-tool
version: "1.0"
status: 已锁定
created: 2026-07-12
source_correction: "奥兹'抱怨年轻人没用'被纠正为社交恭维而非真情流露"

# ---------- 双环学习追踪 ----------
# 单环（改表面）：把这句改成"社交恭维"
# 双环（改假设）：
default_assumption: "台词 = 角色真实想法和情感"
corrected_assumption: "权力不对等时，台词优先服务于社交目的（面子/恭维/推脱）而非表达真实情感"
double_loop_scope: "泛化——适用于所有存在权力差距的对话场景，不限于奥兹"
# -----------------------------------

# ------------------------------------------------------
# 何时自动触发
# ------------------------------------------------------
triggers:
  - scene_type: "存在权力差距的对话"
    conditions:
      - 说话者与听话者有上下级/甲方乙方关系
      - 对话内容涉及"解释""道歉""推脱""恭维"
  
  - scene_type: "社交场合的客套话"
    conditions:
      - 台词表面是抱怨/自谦/道歉
      - 上下文表明角色另有真实目的
  
  - scene_type: "任何角色说'这不是你真的意思吧'的时刻"
    conditions:
      - 此类台词几乎一定是 tactic

# ------------------------------------------------------
# 核心原则
# ------------------------------------------------------
principle: >
  台词是社交工具，不是情感窗口。
  当角色处于权力不对等关系中时，他们的语言优先服务于社交目的
  （面子、恭维、推脱、试探）而非表达真实情感。
  问自己："如果这个角色此刻完全诚实，他/她会说完全相同的话吗？"
  如果不会 → 这是 tactic，演 objective，不要演台词的字面情绪。

# ------------------------------------------------------
# 学术依据
# ------------------------------------------------------
academic_basis:
  - source: "Stanislavski - Objectives and Tactics"
    key_point: "台词是 tactic（手段），不是 objective（目的）"
    ref: "actingmagazine.com / klieg.org"

  - source: "Stanislavski - Subtext (潜台词)"
    key_point: "'作家创造台词，演员创造潜台词'。同一句台词根据 objective 不同，潜台词完全不同"
    ref: "zgbk.com / actbroward.org"

  - source: "Goffman - Face-work (面子功夫)"
    key_point: "社交互动中大量语言用于维护彼此面子，而不仅仅是传递信息"

# ------------------------------------------------------
# 应用规则
# ------------------------------------------------------
rules:
  diagnose:
    question: "如果角色此刻完全诚实，会说完全相同的话吗？"
    if_no: "这是 tactic。找到 objective，用 objective 驱动表演，不要按台词字面情绪演。"
    if_yes: "台词与真实感受一致，可以按字面情绪演。"

  apply:
    - step: "从上下文中找出角色此时此刻的 objective（想要什么）"
    - step: "台词 = 为实现 objective 而选择的 tactic"
    - step: "表演依据 = objective，不是台词的字面情绪"
    - step: "如果 objective 是'恭维'，那么'抱怨'台词应该演成轻松的、社交性的、不真诚的"
    - step: "微表情提示：说话时嘴角的微小弧度、欠身的角度、眼神的力度——这些暴露 tactic 而非 objective"

  counter_example: "不要做的事：看到一个角色说'我很难过'就按'悲伤'去演。先问：他是真的难过，还是在用'难过'获取同情/推卸责任/测试对方？"

# ------------------------------------------------------
# 测试案例
# ------------------------------------------------------
examples:
  wrong:
    description: "奥兹说'年轻人太没用' → AI 标注为'语气轻蔑地抱怨手下'"
    problem: "把社交措辞当情感流露"

  correct:
    description: "奥兹说'年轻人太没用' → AI 标注为'社交恭维：给凯姆面子，意思是不得不请你出马'"
    performance: "表情轻松、嘴角带社交微笑、微微欠身。不是抱怨，是恭维的社交表演。"
