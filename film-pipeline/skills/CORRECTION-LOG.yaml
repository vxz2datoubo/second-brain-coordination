    scene: "莉莉会所吧台 · Shot 1"
    character: "奥兹"
    original_line: "都怪我们这边的年轻人太没用"
    
    ai_original_output: "奥兹语气轻蔑地抱怨手下年轻人太没用"
    ai_error_assumption: "台词 = 角色真实想法 → 奥兹在表达对年轻人的不满"
    
    user_correction: "这不是情感流露，是社交措辞。给凯姆面子——意思是不得不请你出马。"
    user_insight: "读上下文就能看出来，他是因为凯姆做了简单任务才说这话，是社交润滑剂。"
    
    corrected_output: "奥兹表情轻松、嘴角带社交微笑、微微欠身。不是抱怨，是恭维的社交表演——objective 是维持与凯姆的关系"
    
    # Schön: 行动后反思 (reflection-on-action)
    reflection_why_ai_failed: "AI 默认假设'台词=情感窗口'，未考虑权力不对等场景下台词的社交功能优先于情感表达"
    
    # Argyris: 双环学习
    single_loop_fix: "删掉'轻蔑抱怨'，改成'社交恭维'"
    double_loop_fix: "修正底层假设：权力不对等时，台词=社交工具而非情感窗口。建立诊断公式：'如果角色此刻完全诚实，会说完全相同的话吗？'"
    
    # DBR: 提炼可迁移原则
    transferable_principle: "任何存在权力差距的对话场景，先问 objective（角色想要什么），再判断台词是 tactic 还是真实情感"
    
    # 学术验证
    academic_validation:
      - "Stanislavski: Objective vs Tactic"
      - "Stanislavski: Subtext（潜台词）"
      - "Goffman: Face-work"
    
    skill_generated: "skills/dialogue-as-social-tool.yaml"
    skill_registered: "SKILL-INDEX.yaml → trigger_map.power_gap_dialogue"

  - id: "c-20260712-002"
    date: 2026-07-12
    scene: "莉莉会所吧台 · Shot 1"
    character: "凯姆 & 奥兹"
    original_line: "材质描述"
    
    ai_original_output: "凯姆:深色皮革外套磨损边缘、乱发油腻质感、数日未刮的胡茬。奥兹:深色布衣粗粝织纹、宽大手掌指节突出、腰间匕首皮鞘磨亮"
    ai_error_assumption: "prompt 越详细越好——把角色所有外观信息都写进去让 AI 更准确"
    
    user_correction: "角色外表已由参考图确定，不需要在 prompt 里重复描述服装衣着。只有叙事功能的细节才需要提——比如奥兹宽大的手掌指节表明他做打手类脏活。"
    user_insight: "图像负责身份，文字负责动作。prompt 里重复参考图已有的信息只会跟参考图竞争，稀释关键指令。"
    
    corrected_output: "凯姆:腰间的空皮套——此行不需要带武器。奥兹:宽大手掌指节突出，指关节有旧伤——常年做打手类脏活。"
    
    reflection_why_ai_failed: "AI 沿用了'文本生成'思维——描述越详细越好。但在 AI 视频生成中，reference_image 已锁定外观，prompt 的描述跟参考图是竞争关系——越多越差。"
    
    single_loop_fix: "删掉服装/发型描述，只保留叙事功能的材质"
    double_loop_fix: "修正底层假设：AI 视频生成中，prompt 与 reference_image 有明确分工——图负责静态身份，文负责动态变化。多写无用信息 = 信号干扰。"
    
    transferable_principle: "在任何使用 reference_image 的 AI 生成中，检查每个外观描述：参考图能看出来吗？能→删。不能且有叙事功能→保留并标注原因。"
    
    academic_validation:
      - "DojoClip AI: '图像负责身份，文字负责动作'"
      - "PixVerse #1: 'Longer prompts produce worse output'"
      - "Bresson: '当一只小提琴足够的时候，就不要用两只'"
      - "HappyHorse AI: '不应重写参考图已固定的细节'"
    
    skill_generated: "skills/reference-image-division-of-labor.yaml"
    skill_registered: "SKILL-INDEX.yaml → trigger_map.reference_image_prompt"

