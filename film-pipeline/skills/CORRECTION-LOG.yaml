  - id: "c-20260712-004"
    date: 2026-07-12
    scene: "莉莉会所吧台 · Shot 2 & Shot 5"
    character: "凯姆"
    ai_original_output: "灌了口酒 / 仰头灌酒"
    ai_error_assumption: "训练数据中'喝酒'场景多以'借酒消愁/酗酒/酒后冲突'为主 → AI 默认喝酒=情感行为=大口灌"
    user_correction: "前后并没有特别重大的事情要发生，没必要灌酒。抿一口就行，喝酒只是消遣。"
    user_insight: "角色的行为不是训练数据的主流模式决定的，是场景上下文决定的。喝酒≠一定有情绪。"
    corrected_output: "抿了口酒 / 仰头抿酒"
    reflection_why_ai_failed: "AI 训练数据偏戏剧化场景——喝酒多数是借酒消愁/酒后吐真言/酗酒崩溃。当看到一个角色喝酒，AI 习惯性选'大口灌'，因为那是数据里的主流。但现实和好剧本里，喝酒经常只是消遣——日常就是日常。"
    single_loop_fix: "灌→抿"
    double_loop_fix: "修正 AI 的数据偏差假设：训练数据的主流模式 ≠ 所有场景的默认模式。每个行为都要先问：场景的情绪基线是什么？日常行为（酒/烟/饭/窗）最容易触发训练数据的戏剧化偏差——必须校准。"
    transferable_principle: "任何日常行为（喝酒/吃饭/吸烟/看窗外）——先问场景的情绪基线，再决定动作的烈度。日常版/情绪版/崩溃版，三选一。不要默认选情绪版。"
    academic_validation:
      - "David Mamet: 'Perform actions as simply as possible. Do not help the play along.'"
      - "Mamet: 'Remove every part of the scene that is not essential.'"
    skill_generated: "skills/action-scene-calibration.yaml"
    skill_registered: "SKILL-INDEX.yaml → trigger_map.everyday_action"
