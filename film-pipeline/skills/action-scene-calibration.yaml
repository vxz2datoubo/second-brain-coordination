# ============================================================
# 原子技能 · action-scene-calibration
# 来自纠正：2026-07-12 Shot 2/5 凯姆"灌酒"→"抿酒"
# ============================================================
id: action-scene-calibration
version: "1.0"
status: 已锁定
created: 2026-07-12
source_correction: "凯姆日常喝酒→不应'灌一大口'，应'抿一口'——日常就是日常"

# ---------- 双环学习追踪 ----------
default_assumption: >
  "角色喝酒 = 有情绪需要释放 → AI 训练数据中以'借酒消愁'场景占多数 
  → AI 默认'喝酒=情感性饮酒=大口灌'"
corrected_assumption: >
  "角色喝酒 ≠ 一定有情绪。喝酒是行为，情绪由上下文决定。
  场景没有重大情绪事件 → 喝酒=消遣=小口抿。
  场景有重大情绪事件 → 喝酒才可能是'灌'或'猛'。
  行为的烈度必须匹配场景的情绪烈度，不能默认匹配训练数据主流模式。"
double_loop_scope: "泛化——适用于所有日常行为（吃饭/走路/抽烟/喝水）。训练数据偏戏剧化不等于所有场景都该戏剧化。"
# -----------------------------------

# ------------------------------------------------------
# 学术依据
# ------------------------------------------------------
academic_basis:
  - source: "David Mamet - On Directing Film"
    key_point: "'Perform their actions as simply as possible. Do not help the play along.' 演员不应让每个物理动作承载场景的全部意义——这反而会毁了电影。"
    ref: "musicbed.com / bookey.app"

  - source: "David Mamet - 删除非必要部分"
    key_point: "'Remove every part of the scene that is not essential. Take it away and see if you need it or not.' 如果场景不需要戏剧化的饮酒动作，就删掉它。"
    ref: "musicbed.com"

  - source: "Hong Sang-soo (洪尚秀) - 日常中的饮酒"
    key_point: "洪尚秀电影中人物频繁喝酒，但喝酒=日常生活的一部分，非情绪外化。'琐碎的日常对话来描写人物的感情'。"
    ref: "donga.com"

  - source: "AI 训练数据偏差"
    key_point: "训练数据中'喝酒'场景以戏剧化用法（借酒消愁/酗酒/酒后冲突）为主流。AI 默认'喝酒=情感行为'——需要被上下文校准打破。"

# ------------------------------------------------------
# 何时触发
# ------------------------------------------------------
triggers:
  - scene_type: "角色在做日常行为（喝酒/吃饭/吸烟/走路）"
    conditions:
      - 场景情绪基线平静（前后无重大冲突/转折/情绪爆发）
      - AI 标注的动作携带了超出场景需要的戏剧性

  - scene_type: "任何 AI 可能将日常行为过度戏剧化的场景"
    conditions:
      - 行为本身在训练数据中常被用于情绪表达（酒/烟/食物/天气反应）
      - 但当前场景上下文不支持同等级别的情绪

# ------------------------------------------------------
# 核心原则
# ------------------------------------------------------
principle: >
  行为的烈度必须匹配场景的情绪烈度。不是"角色在喝酒→他一定有情绪要释放"，
  而是"角色在喝酒→先看场景发生了什么→再决定怎么喝"。
  训练数据中的主流模式（借酒消愁）≠ 所有场景的默认模式。
  
  诊断：把当前行为想象成三种版本——
  ① 日常版（场景无大事→抿/安静/平淡）
  ② 情绪版（场景有冲突→灌/猛/快）
  ③ 崩溃版（场景是低谷→摔杯/瘫倒/不喝）
  问：这个场景的情绪基线最接近哪个版本？选它。不要默认选②。

# ------------------------------------------------------
# 反例（数据偏差导致的 AI 默认错误）
# ------------------------------------------------------
data_bias_awareness:
  - behavior: "喝酒"
    training_data_default: "借酒消愁 → 大口灌 → 情感宣泄"
    correct_calibration: "先问：场景有情绪吗？有→灌。没有→抿。"

  - behavior: "吸烟"
    training_data_default: "焦虑/沉思 → 猛吸 → 深沉"
    correct_calibration: "先问：角色在焦虑吗？"

  - behavior: "吃饭"
    training_data_default: "孤独/思念 → 食不知味 → 机械咀嚼"
    correct_calibration: "先问：角色真的在思念吗？还是只是饿了？"

  - behavior: "看窗外"
    training_data_default: "忧郁/等待 → 凝视 → 深远"
    correct_calibration: "先问：窗外有什么？"

# ------------------------------------------------------
# 应用规则
# ------------------------------------------------------
rules:
  diagnose:
    - question: "这个行为的三种版本（日常/情绪/崩溃），场景情绪基线最接近哪个？"
    - question: "如果我不加任何戏剧化修饰，这个行为本身还成立吗？"
    - question: "训练数据里这个行为最常见的是哪种模式？→ 我是不是在无意识地复制那个模式？"

  apply:
    - step: "读上下文——这个行为发生前后有什么事件？"
    - step: "如果前后无大事 → 选日常版"
    - step: "如果有情绪事件但角色在克制 → 选带细微克制的日常版"
    - step: "如果有重大冲突 → 选情绪版"
    - step: "绝不要默认行为=情感外化"

  mamet_test: "问：如果去掉这个动作，场景还能成立吗？如果能→这个动作做日常版就够了。如果不能→追问为什么。"
