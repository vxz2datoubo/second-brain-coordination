# ------------------------------------------------------
# 三、称谓 —— 不改。保留原文的粗粝感。
#    舞女就是舞女，卖身契就是卖身契。
#    旁人蔑视这个职业，所以用词不该文绉绉。
# ------------------------------------------------------
terms:
  - original: "卖身契"
    adapted: ""
    reason: "不改。卖身契三个字就是这个世界残酷的注脚。平台不拦就不动。"
    applied: false

  - original: "舞女"
    adapted: ""
    reason: "不改。这就是别人叫她们的方式——蔑称。叫'陪酒师'反而不真实。"
    applied: false

  - original: "娼妇"
    adapted: ""
    reason: "不改。梅尔特曾经是娼馆街最红的人——这个身份是她的底色。"
    applied: false

# ------------------------------------------------------
# 四、新增角色（改编加入）
# ------------------------------------------------------
new_characters:
  - name: "丽莎"
    role: "驻唱歌手 + 舞女"
    desc: >
      莉莉会所的头牌驻唱歌手。年轻，一副好嗓子。签了卖身契，逃不掉。
      她就是故事里那个"逃跑的女人"——有名字了，叫丽莎。
      平时在台上唱歌，下了台也陪酒。客人喜欢她。
    applied: true

  - name: "蒂雅"
    role: "年长舞女 / 会所大姐"
    desc: >
      莉莉会所最资深的舞女。三十出头，在会所干了十几年。
      举手投足老练，跟客人的周旋滴水不漏。
      新来的女孩都叫她"蒂雅姐"。身上有故事，但从来不说。
    applied: true

# ------------------------------------------------------
# 五、场景设定 —— 莉莉会所的真实面貌
# ------------------------------------------------------
scene_setting:
  desc: >
    莉莉会所是一栋三层旧楼。牌匾新换的，但里面的世界没变。
    一层：吧台+小舞台。丽莎每晚在这里唱歌。舞女陪客人喝酒。
    二层：包间。更私密。客人手脚不干净——不直拍，通过女生的微表情和身体微后缩来暗示。
    地下：类似牢狱的空间。欠了卖身契的人被关在这里。潮湿，发霉，曾经饿死过人。
    整体基调：暧昧但不露骨。观众知道这里在发生什么——但镜头永远停在门外。
  applied: true

# ------------------------------------------------------
# 六、内容规则 —— 残酷不删，但怎么拍有讲究
# ------------------------------------------------------
content_rules:
  - rule: "暴力最高 L2 风格化美学。不减暴力级别，但减血腥特写——用烛火摇晃、墙上投影、音效来传递冲击。拔刀保留。"
    reason: "保留了残酷，但平台审核需要克制直拍血腥"
    applied: true

  - rule: "性的部分：不直拍任何性行为。但陪酒时客人的手、舞女的眼神、推开的酒杯——这些微表情和肢体语言充分表达'这里在发生什么'。观众能懂。"
    reason: "点到为止，留白比展示更有力量"
    applied: true

  - rule: "世界观的暗黑不削弱：饥饿、卖身、牢狱、人吃人——这些是背景设定，通过对白和环境暗示传递。不直拍但要让观众感受到。"
    reason: "故事的残酷性是核心，抽掉就没有力量了"
    applied: true

  - rule: "穿着：性感但不直接裸露。露肩、露背、高开衩可以。舞女的衣服旧了、有修补痕迹——穷但不失体面。"
    reason: "美但不低俗"
    applied: true

# ------------------------------------------------------
# 七、全局风格
# ------------------------------------------------------
style_overrides:
  - param: "style_tendency"
    original: "写实克制"
    overridden: "写实克制"
    reason: "暗黑但不夸张。写实才有力——让观众感觉这不是幻想，是某个世界真实发生的事。"
    applied: true
