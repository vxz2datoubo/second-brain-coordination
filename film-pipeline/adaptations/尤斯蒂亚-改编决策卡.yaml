# ============================================================
# 改编决策卡 · 《秽翼的尤斯蒂娅》→ 短视频影视化
# ============================================================
# 核心理念：世界的残酷不美颜。只换场景招牌（平台合规），不洗白人性。
# 卖身契就是卖身契，舞女就是舞女，旁人的蔑视是这个世界的一部分。
# ============================================================

# ------------------------------------------------------
# 一、地名/场景名替换（仅平台合规需要的外壳）
# ------------------------------------------------------
settings:
  - original: "娼馆"
    adapted: "莉莉会所"
    reason: "平台敏感词规避。牌匾换了，里面照样暗黑——人们还是会饿死，还是会卖身。"
    applied: true

  - original: "娼馆街"
    adapted: "莉莉商业街"
    reason: "跟随娼馆→会所"
    applied: true

  - original: "菲诺列塔"
    adapted: "菲诺酒吧"
    reason: "更易记"
    applied: false

  - original: "牢狱"
    adapted: ""
    reason: ""
    applied: false

