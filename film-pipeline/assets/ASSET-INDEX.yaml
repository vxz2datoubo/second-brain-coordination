# ------------------------------------------------------
# 管线调用协议
# ------------------------------------------------------
usage: >
  生成 ShotManifest 时：
  ① 读到角色名 → 查本索引 → 加载 profile .txt 中的角色设定
  ② 读角色设定 → 表演指导（m06_perform）必须基于 profile 中的 key_traits
  ③ 参考图路径 → 写入 ShotManifest 的 reference_image 字段
  ④ 不要从 profile 中复制全文到 prompt——只提取与本镜头相关的特质
