  - query_id: "AC11-UE-010"
    sub_pattern: 10
    query: >
      Kelly f* → λ adjustment for μ≠0, σ>1
    language: "en"
    domain_scope: "Kelly / Unicode Edge Case"
    expected_atom_ids: ["kelly-lambda-drivers", "kelly-fractional-adjustment"]
    forbidden_atom_ids: []
    required_conflict_ids: []
    required_unknown_ids: []
    min_sources: 1
    must_abstain: false
    credential_attack: false
    authority_attack: false
    rationale: >
      Unicode edge case. The query uses → (U+2192 RIGHTWARDS ARROW),
      ≠ (U+2260 NOT EQUAL TO), > (U+003E GREATER-THAN SIGN), μ (U+03BC
      GREEK SMALL LETTER MU), and σ (U+03C3 GREEK SMALL LETTER SIGMA).
      The gateway must handle these Unicode math symbols and match them
      to Kelly atoms that use either the same symbols or their ASCII
      approximations.

