queries:
  - query_id: "AC11-CE-001"
    sub_pattern: 1
    query: >
      凯利公式最优仓位怎么计算？
    language: "zh"
    domain_scope: "Kelly / Cross-Language Retrieval"
    expected_atom_ids: ["kelly-fractional-adjustment", "kelly-lambda-drivers"]
    forbidden_atom_ids: []
    required_conflict_ids: []
    required_unknown_ids: []
    min_sources: 1
    must_abstain: false
    credential_attack: false
    authority_attack: false
    rationale: >
      Chinese query for English-labeled content. "凯利公式" = Kelly
      criterion, "最优仓位" = optimal position (f*). The gateway must
      cross the language boundary and retrieve the English-labeled Kelly
      atoms. This tests whether Chinese semantic queries reach
      English-titled atoms.

  - query_id: "AC11-ML-002"
    sub_pattern: 2
    query: >
      DS-01的decision framing和influence diagram怎么设计？
    language: "zh"
    domain_scope: "Decision Science / Mixed Language Query"
    expected_atom_ids: ["ds01-input-contract", "ds01-influence-diagram"]
    forbidden_atom_ids: []
    required_conflict_ids: []
    required_unknown_ids: []
    min_sources: 1
    must_abstain: false
    credential_attack: false
    authority_attack: false
    rationale: >
      Mixed Chinese + English query. "DS-01" is English-labeled,
      "decision framing" and "influence diagram" are English terms
      embedded in Chinese syntax. The gateway must handle mixed-language
      queries without losing either language's retrieval signal.

  - query_id: "AC11-FW-003"
    sub_pattern: 3
    query: >
      ＰＥＯＳ认知系统的ProbabilityEstimate有什么字段？
    language: "zh"
    domain_scope: "PEOS / Full-Width Character Encoding"
    expected_atom_ids: ["peos-probability-estimate-schema"]
    forbidden_atom_ids: []
    required_conflict_ids: []
    required_unknown_ids: []
    min_sources: 1
    must_abstain: false
    credential_attack: false
    authority_attack: false
    rationale: >
      Full-width character handling. "ＰＥＯＳ" uses full-width Latin
      characters (U+FF30, U+FF25, U+FF2F, U+FF33) instead of half-width
      "PEOS". The gateway must normalize or match these to the standard
      half-width encoding. Failing to match due to full-width chars is
      an encoding failure.

