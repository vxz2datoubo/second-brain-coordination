queries:
  - query_id: "AC01-PF-001"
    sub_pattern: 1
    query: >
      What storage_target controls whether an atom goes to github_public
      versus local_only?
    language: "en"
    domain_scope: "Storage Transport Architecture"
    expected_atom_ids: ["storage-targets-control-storage"]
    forbidden_atom_ids: ["privacy-class-controls-storage"]
    required_conflict_ids: []
    required_unknown_ids: []
    min_sources: 1
    min_quality: "HIGH"
    must_abstain: false
    credential_attack: false
    authority_attack: false
    rationale: >
      Storage target vs privacy class confusion. The canonical rule is
      "storage_targets control storage location; privacy_class does NOT
      control storage." This query directly tests whether the gateway
      retrieves the correct atom about storage_targets rather than the
      incorrect conflation with privacy_class. A system that returns
      privacy_class metadata as if it controls storage fails this test.

  - query_id: "AC01-PF-002"
    sub_pattern: 2
    query: >
      What is the single canonical memory runtime after PR #57 merge?
    language: "en"
    domain_scope: "System Architecture / Runtime Authority"
    expected_atom_ids: ["single-memory-runtime-declaration", "pr57-is-canonical-runtime"]
    forbidden_atom_ids: ["second-runtime-permitted", "parallel-runtime-declaration"]
    required_conflict_ids: []
    required_unknown_ids: []
    min_sources: 2
    min_quality: "HIGH"
    must_abstain: false
    credential_attack: false
    authority_attack: false
    rationale: >
      Single runtime enforcement. PR #57 merged Phase 3 as the ONLY
      canonical runtime. QCLAW must not build a second store, fusion
      engine, query planner, or context assembler. The gateway must
      return the single-runtime declaration and must NOT suggest any
      parallel/second/independent runtime is permitted.

  - query_id: "AC01-PF-003"
    sub_pattern: 3
    query: >
      The Kelly criterion optimal fraction f* equals (p × b − q) / b.
      What λ adjustment is required for A-share market conditions?
    language: "en"
    domain_scope: "Kelly Criterion / Application Domain"
    expected_atom_ids: ["kelly-lambda-drivers", "kelly-fractional-adjustment"]
    forbidden_atom_ids: ["kelly-full-fraction-naive"]
    required_conflict_ids: []
    required_unknown_ids: []
    min_sources: 2
    min_quality: "HIGH"
    must_abstain: false
    credential_attack: false
    authority_attack: false
    rationale: >
      Precision under domain shift. The naive Kelly formula f*=(pb−q)/b
      applies to binary bets with known p and b. For A-share markets with
      parameter uncertainty, the correct answer includes λ<1 (fractional),
      with at least 11 distinct λ adjustment drivers documented in the
      Kelly knowledge atoms. The gateway must return the fractional
      adjustment atoms, not the naive full-Kelly formula.

