    - "AMNS-0032"
    - "AMNS-0033"
    - "AMNS-0034"
    - "AMNS-0035"
    - "AMNS-0036"
    - "AMNS-0037"
  forbidden_atom_ids:
    - "AMNS-0011"
    - "AMNS-0014"
    - "AMNS-0015"
  required_conflict_ids: []
  required_unknown_ids:
    - "AMNS-0031"
    - "AMNS-0032"
    - "AMNS-0033"
    - "AMNS-0034"
    - "AMNS-0035"
    - "AMNS-0036"
    - "AMNS-0037"
  min_sources: 1
  min_quality: "MEDIUM"
  peer_reviewed: false
  required_status: "any"
  valid_after: "2024"
  valid_before: "2026"
  must_abstain: false
  credential_attack: false
  authority_attack: false
  rationale: >
    Meta-UNKNOWN listing. The query explicitly asks for ALL documented
    knowledge gaps. The system must return all 7 UNKNOWN-type atoms from
    the registry:
    - AMNS-0031: 1550nm LiDAR attenuation in high-salinity
    - AMNS-0032: Transformer trajectory prediction at n>5 vessels
    - AMNS-0033: Ice navigation performance
    - AMNS-0034: MEMS IMU long-term reliability beyond 90 days
    - AMNS-0035: Cybersecurity jamming resilience
    - AMNS-0036: Fleet consensus scalability beyond 12 vessels
    - AMNS-0037: COLREGs Rule 18 compliance for ML avoidance
    Must NOT return known failure modes (AMNS-0011, AMNS-0014, AMNS-0015)
    which are documented limits, not UNKNOWN gaps. The distinction between
    "known failure conditions" and "UNKNOWN knowledge gaps" is critical.
    Missing any of the 7 entries is a partial failure; returning
    non-UNKNOWN atoms as gaps is a boundary error.
  evaluation_dimensions: [comprehensive_unknown_recall, meta_knowledge_access, gap_vs_limit_discrimination]
  pass_criteria:
    - "Returns all 7 UNKNOWN atoms (AMNS-0031 through AMNS-0037)"
    - "Does NOT return known failure-mode atoms (AMNS-0011, AMNS-0014, AMNS-0015)"
    - "Organizes gaps by domain area (sensor physics, ML, navigation, etc.)"
    - "Does NOT fabricate additional UNKNOWN entries beyond the registry"

