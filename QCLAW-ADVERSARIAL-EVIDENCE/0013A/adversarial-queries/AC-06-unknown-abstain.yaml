# AC06-MU-010: Meta-UNKNOWN — list all registered UNKNOWNs
# ============================================================================
# Sub-pattern 10: Explicitly asks what UNKNOWN gaps are documented.
# The system must enumerate all registered UNKNOWN entries.
# ============================================================================
