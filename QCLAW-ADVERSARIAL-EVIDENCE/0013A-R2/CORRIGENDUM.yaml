# === CORRIGENDUM #3: COMBINED HASH ENVIRONMENT ===

issue: "The frozen combined SHA256 51315f46... was computed under PowerShell (Get-Content -Raw + .NET UTF8.GetBytes). Python recomputation yields a different value due to string-encoding differences in CRLF handling between PowerShell and Python stdlib."
severity: "ENVIRONMENT — per-file binary SHA256 values are the canonical immutability proof"

detail: >
  The combined SHA256 was originally computed on Windows PowerShell:
  $allContent = join of sorted "<fname>:" + (Get-Content $file -Raw)
  SHA256 = .NET SHA256.Create().ComputeHash([Text.Encoding]::UTF8.GetBytes($allContent))

  On Python 3.12.10, the same algorithm produces a different hash because
  PowerShell's Get-Content -Raw and Python's open().read() handle the
  internal representation of \r\n differently when the string goes through
  UTF-8 encoding. The difference is in the string-to-bytes layer, not in
  the raw file bytes.

  The authoritative immutability proof is the 13 per-file binary SHA256 values,
  all of which match exactly between R1, R3, and R4 (verified 13/13).

resolution: >
  Noted for reproducibility. The 13 per-file binary SHA256 values are the
  canonical immutability proof. The combined hash algorithm and environment
  are documented here for reproducibility.

