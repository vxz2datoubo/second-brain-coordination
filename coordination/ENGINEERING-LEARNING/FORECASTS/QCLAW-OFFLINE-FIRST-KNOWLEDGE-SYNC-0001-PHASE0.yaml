prepared_at: "2026-07-20"
mode: "project_plan"

first_principles:
  fundamental_goal: "Enable QCLAW to keep learning locally now while preserving a safe, idempotent, reviewable path for later batch synchronization to a private Git authority and rebuildable serving layer."
  current_state_to_change: "QCLAW has a strong candidate-knowledge protocol, but the actual local landing zones, packet persistence, privacy classification, sync outbox, batch manifest, and remote reconciliation path are not yet verified or implemented."
  causal_mechanism:
    - "A local immutable inbox and candidate packet store decouple knowledge digestion from cloud availability."
    - "Stable IDs, hashes, state transitions, and manifests make later bulk synchronization deterministic and resumable."
    - "Privacy/license classification and dry-run comparison reduce accidental disclosure and duplicate authority."
    - "Private Git branches and PRs provide versioning and rollback; Supabase remains a rebuildable read projection."
  constraints:
    - "No private knowledge leaves the machine in Phase 0."
    - "No credentials, cloud project creation, service lifecycle change, or real trade data."
    - "The public coordination repository receives only schemas, code, and sanitized reports."
    - "QCLAW outputs remain candidates until governance approval."
  required_evidence:
    - "Verified local QCLAW entry points, output paths, formats, runtime, and existing state."
    - "A proposed directory/state model grounded in actual environment facts."
    - "Schema and idempotency requirements for LearningPacket and SyncBundle."
    - "Privacy, license, secret, backup, failure-recovery, and rollback controls."
  failure_modes:
    - "Treating a local output folder as an ungoverned upload queue."
    - "Uploading raw private or licensed source material to public GitHub."
    - "Creating duplicate atoms or conflicting authorities during bulk sync."
    - "Git repository bloat from large binary/raw files."
    - "Mechanical packetization that loses source lineage or silently overwrites prior knowledge."
  observability_limits:
    - "GitHub cannot reveal the real local QCLAW runtime and data layout; WorkBuddy must verify on the Windows host."
    - "No causal claim about QCLAW output quality is possible until sample packets are reviewed."
  alternatives_considered:
    - option: "Wait until cloud infrastructure is ready before using QCLAW."
      reason_not_selected: "It wastes local compute and delays knowledge accumulation unnecessarily."
    - option: "Upload raw QCLAW output folders later in one large batch."
      reason_not_selected: "It creates privacy, duplication, provenance, rollback, and Git-bloat risks."
  stop_conditions:
    - "The task requires uploading private content, reading secrets, modifying cloud resources, or deleting local originals."
    - "The actual QCLAW output cannot be distinguished from runtime logs, credentials, or unrelated personal data."
    - "The proposed design lacks immutable source hashes, idempotency, privacy classification, or rollback."

expected_benefits:
  - benefit_id: "B1"
    description: "QCLAW can begin or continue offline knowledge digestion before cloud infrastructure exists."
    benefit_type: "direct"
    probability: "high"
    impact: "high"
    causal_basis: "Local candidate storage removes the cloud dependency from the learning pipeline."
    validation_signal: "A verified local workflow can produce candidate packets without any network write."
    expected_time_horizon: "short"
  - benefit_id: "B2"
    description: "Future batch synchronization becomes incremental, idempotent, reviewable, and reversible."
    benefit_type: "long_term"
    probability: "high"
    impact: "high"
    causal_basis: "Stable packet IDs, hashes, manifests, frozen outbox bundles, and Git revisions preserve lineage."
    validation_signal: "Repeated dry-runs produce no duplicates and the same unchanged bundle hash."
    expected_time_horizon: "medium"
  - benefit_id: "B3"
    description: "Private, sensitive, and license-restricted materials are kept out of public repositories and inappropriate cloud targets."
    benefit_type: "risk_reduction"
    probability: "high"
    impact: "high"
    causal_basis: "Classification and quarantine occur before bundle approval."
    validation_signal: "Negative fixtures are blocked and public-safe fixtures pass."
    expected_time_horizon: "short"
  - benefit_id: "B4"
    description: "QCLAW, Codex, WorkBuddy, GPT, private Git, and Supabase gain explicit responsibilities and data contracts."
    benefit_type: "cross_module"
    probability: "medium"
    impact: "high"
    causal_basis: "A shared packet/sync contract reduces hidden coupling and duplicate authority."
    validation_signal: "Enterprise Issue #31 maps this workflow into system-of-record and dependency documents."
    expected_time_horizon: "medium"

expected_harms:
  - harm_id: "H1"
    description: "Local storage may grow quickly while knowledge remains unsynchronized."
    harm_type: "resource_cost"
    probability: "medium"
    severity: "medium"
    reversibility: "moderate"
    detectability: "early"
    propagation_scope: "task_local"
    causal_basis: "Raw sources, candidate packets, manifests, and logs accumulate."
    mitigation: "Measure size, separate rebuildable processing files, define retention and backup, and avoid duplicate raw copies."
    validation_signal: "Phase 0 reports current size and projected growth."
  - harm_id: "H2"
    description: "A future large upload could leak private or licensed content."
    harm_type: "privacy_security"
    probability: "medium"
    severity: "critical"
    reversibility: "hard"
    detectability: "delayed"
    propagation_scope: "system_wide"
    causal_basis: "Bulk operations can bypass item-by-item awareness."
    mitigation: "No upload in Phase 0; privacy/license/secret scanning, quarantine, dry-run, and explicit user approval before first private-data sync."
    validation_signal: "Sync task cannot enter READY without approval and classification evidence."
  - harm_id: "H3"
    description: "Candidate knowledge may be mistaken for authoritative truth."
    harm_type: "model_risk"
    probability: "medium"
    severity: "high"
    reversibility: "moderate"
    detectability: "delayed"
    propagation_scope: "cross_module"
    causal_basis: "QCLAW generates structured, confident-looking output."
    mitigation: "Candidate status, evidence links, conflict preservation, review gates, and private Git authority boundary."
    validation_signal: "No candidate packet can overwrite approved knowledge directly."
  - harm_id: "H4"
    description: "Git may become bloated or expensive if used for large raw artifacts."
    harm_type: "architecture_lock_in"
    probability: "medium"
    severity: "medium"
    reversibility: "moderate"
    detectability: "early"
    propagation_scope: "cross_module"
    causal_basis: "Git is poor for large binaries and high-frequency logs."
    mitigation: "Use Git for structured approved knowledge and metadata; keep large raw artifacts local or in approved object storage."
    validation_signal: "Storage decision matrix separates Git, object storage, local archive, and Supabase."

cost_forecast:
  time: "medium"
