    severity: "high"
    reversibility: "moderate"
    detectability: "delayed"
    propagation_scope: "cross_module"
    causal_basis: "Trading rules change by exchange, board, security type and effective date."
    mitigation: "Require official source, effective date, applicability and historical-version status; mark unverified rules UNKNOWN."
    validation_signal: "Rule matrix contains authoritative source and effective-date fields with no timeless hard-coded claims."

