    harm_type: "schedule"
    probability: "medium"
    severity: "medium"
    reversibility: "easy"
    detectability: "early"
    propagation_scope: "module"
    causal_basis: "Repository, local evidence, A-share rules and skill-gap audit are combined into one D0 task."
    mitigation: "Time-box D0, separate verified/unavailable evidence, and deliver prioritized findings rather than exhaustive prose."
    validation_signal: "Checkpoint reports show stable scope and no child runtime work."
  - harm_id: "H2"
