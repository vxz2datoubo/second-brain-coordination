first_principles:
  fundamental_goal: >
    Establish one evidence-grounded, non-duplicative and maturity-honest map of the
    Second Brain + A-share decision-science system before any additional canonical
    runtime is implemented, while combining the former WorkBuddy local-reality audit
    into Codex's D0 project-plan responsibility.
  current_state_to_change: >
    W10, W11 and W12 are registered coherently, but repositories, local protected
    blueprints, old PRs and new QCLAW drafts contain mixed maturity claims, stale
    runtime descriptions, possible duplicate capability proposals and incomplete
    local backwrite evidence. The project currently lacks one verified D0 map that
    distinguishes mentioned, contracted, implemented, tested and validated capability.
  causal_mechanism:
    - "Read the latest authoritative main, Issue #63, PR #57, PR #58, PR #64, PR #65, parked PR #8/#34, PROGRAM-INDEX v1.3 and protected-backwrite packages."
    - "Inspect actual code, schemas, tests, reports and accessible local evidence rather than relying on filenames or agent summaries."
    - "Classify material methods and capabilities by lifecycle, system of record, maturity, owner, duplication risk and A-share rule dependency."
    - "Freeze non-duplication and file-ownership boundaries before selecting no more than three P0 vertical slices."
    - "Produce a resumable D0-D6 implementation plan with explicit gates, stop conditions and feedback evidence."
  constraints:
    - "Planning and audit only; no child-skill runtime implementation in this task."
    - "Do not modify canonical memory, portfolio, risk, execution, OMS, market-data or order-path runtimes."
    - "Local files may be marked VERIFIED only when Codex actually opens and inspects them in an authorized environment."
    - "Unavailable local evidence must be labelled ACCESS_NOT_AVAILABLE or UNKNOWN; filenames, ports and old reports are not substitutes."
    - "No credentials, broker/account actions, service lifecycle changes or real trading."
    - "Keep PR #58 and Issue #38 history intact; #63 does not replace their implementation evidence."
    - "No automatic child issue explosion; recommend only, subject to GPT/user approval."
  required_evidence:
    - "Latest remote main SHA and exact ACTIVE-CODEX-TASK.yaml content."
    - "Actual Python canonical runtime paths and tests from PR #57/main."
    - "Actual implemented contracts, code, 397-test evidence and remaining external gate from PR #58."
    - "PR #64 artifacts, metadata gaps, UNKNOWNs, commands and validation limitations."
    - "PR #65 stale/incorrect runtime assumptions and overlap with current canonical implementation."
    - "Accessible local protected blueprint contents, hashes and backwrite status, or explicit access-unavailable receipts."
    - "Current official A-share rule sources with effective dates for any rule mapping claim."
  observability_limits:
    - "GitHub evidence cannot prove local files or services that Codex cannot actually access."
    - "Documentation and schemas do not prove executable runtime behavior."
    - "Synthetic tests do not prove A-share historical or shadow validity."
    - "PR #58 final quality cannot be accepted until independent QCLAW adversarial evidence is consumed unchanged."
  alternatives_considered:
    - option: "Keep WorkBuddy as a separate active local-audit lane."
      reason_not_selected: "User explicitly reassigned the WorkBuddy task to Codex and reducing active lanes lowers coordination overhead."
    - option: "Start DS-01/DS-02/DS-10 implementation immediately."
      reason_not_selected: "Current duplicate, maturity and local-reality uncertainty could create parallel runtimes or false completion claims."
    - option: "Close Issue #38 and replace it with Issue #63."
      reason_not_selected: "PR #58 contains substantial implemented value and is only paused at an independent acceptance gate; replacement would erase lineage and invite reimplementation."
  stop_conditions:
    - "Stop if latest remote main, Issue #63, forecast and ACTIVE-CODEX-TASK disagree."
    - "Stop any local inspection that would require credentials, destructive actions or unauthorized scope expansion."
    - "Stop and report if proposed W12 slices require a second canonical memory, risk, portfolio, execution or order runtime."
    - "Stop maturity promotion where executable or validation evidence is missing."
    - "Stop if the audit begins implementing child runtimes instead of producing D0 evidence and plan."

