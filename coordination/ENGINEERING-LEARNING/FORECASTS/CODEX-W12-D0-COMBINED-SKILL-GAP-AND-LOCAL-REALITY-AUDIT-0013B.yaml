    mitigation: "Mandatory evidence classes and ACCESS_NOT_AVAILABLE/UNKNOWN; require exact path, hash and read receipt for VERIFIED_LOCAL."
    validation_signal: "No local claim lacks an access method, path/hash and inspection evidence."
