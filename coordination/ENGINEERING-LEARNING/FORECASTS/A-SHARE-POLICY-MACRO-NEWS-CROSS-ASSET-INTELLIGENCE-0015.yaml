net_value_assessment:
  expected_net_value: "positive"
  confidence: "medium_high"
  rationale: >-
    Policy and macro information are central to A-share pricing and to interpreting bond,
    FX, commodity and participant-flow moves. Value depends on strict point-in-time
    expectations, non-duplication and validation; a generic news-sentiment score would have
    low or negative net value.

execution_policy:
  codex_mode: "PROJECT_PLAN"
  reason: >-
    The task crosses policy calendars, source licensing, event evidence, expectations,
    text, cross-asset market data, replay, validation and multiple existing workstreams.
  first_required_stage: "D0 repository and accessible-local source/non-duplication audit"
  first_vertical_slice: "W5-PMN-VS1 Policy Calendar + Event Packet + Cross-Asset Shadow Bulletin"
  implementation_before_d0_acceptance: false
  active_route_preemption: false

success_criteria:
  - "Confirmed schedules, high-prior windows and rumors are separate."
  - "Every event preserves publication and available-at semantics."
  - "Ex-ante expectation snapshots are reproducible or explicitly UNKNOWN."
  - "Surprises are multi-dimensional and simple-model ablations are reported."
  - "Pre-runup does not imply leak identity."
  - "Cross-asset relation breaks and alternative explanations are present."
  - "B3+PMN is validated against B3 across periods, regimes, event families and horizons."
  - "Shadow bulletins pass source, timeliness, calibration, abstention and drift gates."
  - "No live trade, credential or unauthorized-source path exists."

