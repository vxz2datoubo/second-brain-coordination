prepared_at: "2026-07-22"
mode: "project_plan"
boundary: "research_only / NO_TRADE"

first_principles:
  fundamental_goal: >-
    Build a point-in-time, expectation-aware and cross-asset A-share policy/news
    intelligence capability that distinguishes confirmed schedules, historical high-prior
    windows, rumors, market consensus, multi-dimensional surprises, pre-event pricing,
    announcement reaction, post-event drift and policy transmission.
  current_state_to_change: >-
    The project has temporal-evidence and attention blueprints plus market replay, but no
    operational policy calendar, ex-ante expectation freezer, surprise compiler,
    cross-asset anomaly interpreter, priced-in/sell-the-news state machine or validated
    A-share policy transmission bulletin.
  causal_mechanism:
    - "Official calendar and source contracts create a reproducible event fact layer."
    - "Ex-ante expectation snapshots make news surprise measurable instead of retrospective."
    - "Multi-dimensional surprise and cross-asset evidence reduce single-variable causal stories."
    - "Pre-event and post-event state machines separate anticipation, leakage hypotheses, execution doubt, continuation and reversal."
    - "Point-in-time replay and B3 versus B3+PMN tests determine incremental A-share value."
  constraints:
    - "Reuse W2 market/replay and W5 event/evidence systems; do not create a parallel news or market runtime."
    - "Historical recurrence is not an official schedule."
    - "No surprise without an ex-ante expectation snapshot or explicit UNKNOWN."
    - "No price-runup-to-insider identity claim."
    - "No unauthorized scraping, paywall/CAPTCHA bypass or publication of restricted data."
    - "No broker, account or order path."
  required_evidence:
    - "Repository and accessible-local source/non-duplication audit."
    - "Official source/calendar/publication-time/license matrix."
    - "Point-in-time event and expectation dataset feasibility."
    - "Cross-asset historical coverage and rule-regime mapping."
    - "Event/claim, expectation/surprise, pricing-state and economic-increment validation plan."
  stop_conditions:
    - "Historical expectations can only be reconstructed with hindsight."
    - "A source cannot be legally used or its publication time cannot be verified."
    - "The design requires duplicating canonical event, market, replay, probability or risk runtimes."
    - "The task attempts to identify insiders or convert research into live orders."

expected_benefits:
  - benefit_id: "B1"
    description: "Creates advance warnings for confirmed events and honest high-prior policy windows."
    probability: "high"
    impact: "high"
    validation_signal: "Calendar precision/recall and zero false conversion of unconfirmed windows into confirmed dates."
  - benefit_id: "B2"
    description: "Prevents single-asset misinterpretation by combining expectations, yields, FX, commodities, equities and participant flows."
    probability: "high"
    impact: "high"
    validation_signal: "Cross-asset reaction maps preserve supporting, opposing and alternative explanations."
  - benefit_id: "B3"
    description: "Adds priced-in, pre-runup, sell-the-news and drift analysis to policy decisions."
    probability: "medium_high"
    impact: "high"
    validation_signal: "Pricing-state classifications are calibrated across event families and regimes."
  - benefit_id: "B4"
    description: "Improves W13 participant interpretation, W6 game modelling, W7 risk and W10 decision freeze."
    probability: "high"
    impact: "medium_high"
    validation_signal: "Shared contracts are consumed without duplicate runtimes or authority confusion."

expected_harms:
  - harm_id: "H1"
    description: "Historical policy patterns may be presented as certain schedules."
    probability: "high"
    severity: "high"
    mitigation: "Separate CONFIRMED_SCHEDULED from RECURRING_HIGH_PRIOR_WINDOW and show calendar confidence."
  - harm_id: "H2"
    description: "Pre-event price moves may be falsely attributed to leaks or insiders."
    probability: "high"
    severity: "high"
    mitigation: "Mandatory competing explanations, placebo tests and no identity assertion."
  - harm_id: "H3"
    description: "Many event windows, assets and text parameters may create severe overfitting."
    probability: "high"
    severity: "high"
    mitigation: "Experiment-family ledger, nested selection, lockbox, PBO/DSR/White/SPA/Romano-Wolf and failure preservation."
  - harm_id: "H4"
    description: "Complex cross-asset explanations may sound causal despite weak identification."
    probability: "medium_high"
    severity: "high"
    mitigation: "Causal-evidence levels, latent-factor uncertainty, negative controls and abstention."
  - harm_id: "H5"
    description: "The new skill may duplicate PR #8 temporal evidence or W5/W2 canonical systems."
    probability: "medium"
    severity: "medium"
    mitigation: "D0 reuse/adapt/migrate/reference-only audit before implementation."
  - harm_id: "H6"
    description: "Daily monitoring and source maintenance may be operationally expensive."
    probability: "high"
    severity: "medium"
    mitigation: "Official-source-first VS1, source priority tiers and value-of-information scheduling."

cost_forecast:
  architecture: "medium"
  source_calendar_audit: "high"
