    control: "No runtime implementation; preserve current authorities; changes beyond compatibility are C_PROPOSAL_ONLY."
  - risk: "Maturity downgrades create apparent loss of progress."
    control: "Use evidence-backed maturity; preserve artifacts while separating documentation from implementation."
  - risk: "Queue reordering delays visible trading features."
    control: "Rank slices by readiness, expected information value and validation cost; activate one immediately after acceptance."
  - risk: "Direct edits to shared governance files cause conflict."
    control: "Use a dedicated branch and Draft PR; do not write main or auto-merge."

unknowns:
  - "Exact current accessible-local implementations outside the public repository."
  - "Whether all current registration supplements have already been consumed by another branch."
  - "Final data readiness ranking of W13 versus PMN versus 0017."
  - "Whether W11/0018 interfaces need one shared NetExpectedValueInterval schema or only adapters."
  - "Whether PR #66 will be merged before or after Issue #72 completes."

stop_conditions:
  - "A requested change requires a new canonical runtime."
  - "Two protected authorities conflict and cannot be reconciled without user decision."
  - "The task would modify market data, account, credential, service or order runtime."
  - "Verified PR #66 assets would be lost or rewritten without evidence."
  - "WIP would exceed one active Codex route."

rollback:
