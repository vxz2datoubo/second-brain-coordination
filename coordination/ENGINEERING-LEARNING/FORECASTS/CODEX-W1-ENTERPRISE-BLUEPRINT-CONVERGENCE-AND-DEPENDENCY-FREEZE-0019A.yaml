  - "Prevent authority ambiguity between W12 probability, W11 allocation, W7 risk and 0018 controls."
  - "Prevent 0017 and 0018 from becoming parallel platforms."
  - "Make the next task depend on evidence readiness instead of recency or narrative appeal."
  - "Reduce future rework by freezing producer/consumer contracts before implementation."

expected_costs:
  - "Temporary delay to W13, PMN, 0017 and 0018 D0 tasks."
  - "Repository-wide governance audit and machine-readable consistency work."
  - "Potential need to deprecate or redirect stale references."

negative_side_effects:
