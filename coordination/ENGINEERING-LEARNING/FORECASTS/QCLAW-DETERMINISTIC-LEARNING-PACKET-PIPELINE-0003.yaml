first_principles:
  fundamental_goal: "把Issue #36已验证的知识判断能力工程化为可重复运行、内容寻址、可校验、可回归、可通过GitHub分支和PR审查的候选LearningPacket生产管道。"
  causal_mechanism:
    - "使用固定合成夹具、规范化序列化和内容哈希，建立稳定atom/packet/relation身份。"
    - "通过幂等键、处理器版本、基础知识修订和证据质量，保证重复运行、升级和冲突可追溯。"
    - "通过CLI或等价可执行入口和自动化测试，把一次性报告转为持续回归能力。"
    - "验证GitHub分支、提交和Draft PR通道，使完整交付不再滞留本地目录。"
  constraints:
    - "仅使用PUBLIC_SAFE合成材料和公开仓库协议。"
    - "所有知识保持CANDIDATE_ONLY；不做authority promotion。"
    - "不读取或上传用户私人知识、凭证或许可受限原文。"
    - "不修改QQ真实服务、配置、端口或运行态。"
    - "不冻结Codex Issue #39的企业合同；只实现适配器并报告差异。"
  required_evidence:
    - "可执行生产管道与固定Case A-F夹具。"
    - "相同输入重复运行得到相同语义身份、内容哈希和幂等键。"
    - "字段、关系、confidence和状态机映射的机器可验证测试。"
    - "GitHub branch/commit/PR能力真实证据或明确UNSUPPORTED报告。"
  failure_modes:
    - "只把原有15份YAML复制进仓库而没有可执行管道。"
    - "ID包含时间戳或运行序号，导致语义身份不稳定。"
    - "为了适配提案合同而丢失QQ原有关系语义。"
    - "把candidate状态错误解释为GPT不可完整读取。"
    - "创建PR能力失败却宣称成功。"

expected_benefits:
  - id: B1
    description: "形成QQ候选知识生产的首个可执行工程基线。"
    probability: high
    impact: high
  - id: B2
    description: "消除Issue #36发现的ID、哈希、幂等和证据字段缺口。"
    probability: high
    impact: high
  - id: B3
    description: "建立可持续回归夹具，监测QQ升级后的知识质量漂移。"
    probability: high
    impact: high
  - id: B4
    description: "验证QQ通过GitHub分支和PR向GPT交付完整文件的能力。"
    probability: medium
    impact: high

expected_harms:
  - id: H1
    description: "与Codex #39的LearningPacket合同发生临时漂移。"
    probability: medium
    severity: medium
    control: "使用adapter/compatibility matrix，不宣布canonical；差异提交Codex观察。"
  - id: H2
    description: "模板和测试过重，降低语义质量。"
    probability: medium
    severity: medium
    control: "同时测试字段合规与人工可读语义质量，不以字段存在率代替理解。"
  - id: H3
    description: "合成管道成功被误解为真实私人知识已可大规模自动摄入。"
    probability: medium
    severity: high
    control: "所有结论明确限定为PUBLIC_SAFE synthetic engineering baseline。"

