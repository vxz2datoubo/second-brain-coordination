schema_version: "1.0"
record_type: "TaskImpactForecast"
task_id: "A-SHARE-LOCAL-ADAPTER-CONTRACTS-IMPLEMENTATION-0004"
agent_id: "CODEX"
mode: "goal"
mode_label: "目标模式"
status: "ACTIVE_FORECAST"
created_by: "GPT"
created_at: "2026-07-21"

objective: "Turn the accepted Phase 3 integration blueprint into a runnable, deterministic, synthetic-first local adapter foundation with machine contracts, manifest quality gates, explicit outcomes, negative tests and compatibility bridges, while postponing real offline source binding until WorkBuddy Issue #49 evidence is accepted."

first_principles_prediction:
  benefits:
    - id: B1
      probability: high
      effect: "Convert planning artifacts into executable contracts and validators instead of allowing Phase 3 to remain documentation-only."
    - id: B2
      probability: high
      effect: "Detect missing provenance, invalid time semantics, undeclared adjustment, license ambiguity and capability mismatch before any real local dataset is bound."
    - id: B3
      probability: high
      effect: "Create a stable adapter boundary that reuses P1/P2 ownership and reduces the chance of building a competing local authority."
    - id: B4
      probability: medium_high
      effect: "Provide deterministic synthetic CSV/JSON/JSONL paths and negative fixtures that WorkBuddy evidence can later plug into with minimal semantic guessing."
    - id: B5
      probability: medium_high
      effect: "Establish compatibility tests for QQ candidate LearningPacket and ContextBundle without promoting candidate knowledge to authority."
    - id: B6
      probability: medium
      effect: "Separate complete knowledge access from credential-local-only handling through machine-readable references and log-safety tests."

  harms:
    - id: H1
      severity: high
      probability: medium
      effect: "Codex may duplicate P1/P2 or local mother-system domain objects and accidentally create a second authority."
      control: "Every new contract must map to an existing owner or be explicitly documented as an adapter-only type; system-of-record tests and ADR evidence are required."
    - id: H2
      severity: high
      probability: medium
      effect: "Synthetic success may be mistaken for successful real local integration."
      control: "Real source binding must remain BLOCKED/NOT_ACTIVATED until GPT accepts WorkBuddy Issue #49 evidence and activates a separate gate."
    - id: H3
      severity: high
      probability: low
      effect: "Credential values could leak into fixtures, logs, ContextBundles or public artifacts."
      control: "Use references and invalid placeholders only; add secret-pattern, log-safety and serialization negative tests."
    - id: H4
      severity: medium
      probability: medium
      effect: "Overly strict manifest validation may reject useful legacy data without producing an actionable migration path."
      control: "Return explicit VERIFIED, PARTIALLY_VERIFIED, PAYLOAD_SAMPLE_ONLY, LEGACY_UNKNOWN, REJECTED or BLOCKED_BY_POLICY outcomes with reasons and remediation hints."
    - id: H5
      severity: high
      probability: low
      effect: "Unverified L2 aggregate fields may be promoted into raw trade, order or auction semantics."
      control: "Negative tests must reject semantic promotion without direct evidence and preserve vendor-defined aggregate classification."
    - id: H6
      severity: high
      probability: low
      effect: "Implementation could drift into realtime, service control, broker or order execution."
      control: "NO_TRADE and offline-only boundaries remain hard gates; no service lifecycle or execution adapter is in scope."

risk_gate:
  current_decision: "PROCEED_WITH_CONTROLS"
  user_approval_required_now: false
  current_execution_scope:
    - "Machine contracts and schemas"
    - "Manifest parsing and cross-field validation"
    - "Synthetic and in-memory adapters"
    - "CSV/JSON/JSONL deterministic synthetic replay"
    - "Negative tests and compatibility tests"
  not_activated:
    - "Real offline source binding"
    - "Realtime market-data integration"
    - "Local service modification"
    - "Broker, account or order paths"
  stop_and_request_user_approval_before:
    - "Any real offline source is bound before GPT accepts WorkBuddy Issue #49 evidence."
    - "Any private knowledge body is published to the public repository."
    - "Any credential value is read, copied, serialized or exposed."
    - "Any local service is started, stopped, reconfigured or migrated."
    - "Any realtime, broker, account or order path is introduced."
    - "Any new system-of-record authority is created."

success_observation_plan:
  - "Report capability-gate progress at approximately 20/40/60/80/100 percent."
  - "Run at least 30 meaningful tests including provenance, timezone, future-data, license, adjustment, L2 semantics, credential leakage and authority-promotion negatives."
  - "Compare core hashes across repeated synthetic executions."
  - "Confirm P1/P2 reference tests remain green."
  - "Record every adapter-only type and its system-of-record mapping."
  - "Keep real-source binding explicitly NOT_ACTIVATED until a later GPT gate."
  - "Produce AgentExecutionFeedback v2 and OutcomeCalibrationReview before merge request."

rollback:
  strategy: "All implementation changes stay on an isolated Codex branch and Draft PR. Revert commits or close the PR; no runtime service, real dataset, credential value or trading state may be changed."
