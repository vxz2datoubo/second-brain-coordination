schema_version: "1.0"
record_type: "TaskImpactForecast"
task_id: "A-SHARE-OFFLINE-REPLAY-KNOWLEDGE-ACCESS-0002"
agent_id: "CODEX"
mode: "goal"
mode_label: "目标模式"
status: "ACTIVE_FORECAST"
created_by: "GPT"
created_at: "2026-07-21"

objective: "Deliver a runnable, deterministic, public-safe A-share offline research vertical slice from fixture ingestion through replay, candidate signals, portfolio/risk simulation, validation, evidence bundles and GPT full-semantic atomized-knowledge query contracts."

first_principles_prediction:
  benefits:
    - id: B1
      probability: high
      effect: "Convert the newly frozen P1 contracts into an executable end-to-end research path rather than leaving them as isolated schemas."
    - id: B2
      probability: high
      effect: "Expose temporal leakage, duplicate/out-of-order data, capability and lineage failures before realtime adapters are introduced."
    - id: B3
      probability: high
      effect: "Create a reproducible baseline for future strategy, event-intelligence and multi-agent comparison without touching live trading."
    - id: B4
      probability: medium_high
      effect: "Establish KnowledgeQuery and ContextBundle contracts that separate knowledge governance status, GPT access and transport visibility."
    - id: B5
      probability: medium_high
      effect: "Generate research evidence and candidate LearningPackets that QQ can later consume and test against its own contract observations."
    - id: B6
      probability: medium
      effect: "Reduce future WorkBuddy integration ambiguity by publishing explicit adapters, manifests, CLI commands and local handoff requirements."

  harms:
    - id: H1
      severity: medium
      probability: medium
      effect: "The vertical slice may grow into a miniature parallel platform and duplicate local mother-system domain objects."
      control: "Adapters and compatibility mappings must reuse P1 ownership; new domain models require an ADR and explicit non-duplication evidence."
    - id: H2
      severity: high
      probability: medium
      effect: "A replay that accidentally uses future information could create convincing but invalid results."
      control: "Machine-enforce available_at <= as_of, time-split validation and negative leakage fixtures."
    - id: H3
      severity: medium
      probability: medium
      effect: "Synthetic-data success may be mistaken for production readiness or profitable strategy evidence."
      control: "All outputs remain research_only, candidate, synthetic/public-safe and explicitly non-production."
    - id: H4
      severity: medium
      probability: medium
      effect: "Large scope may cause incomplete, loosely connected deliverables."
      control: "Use milestone checkpoints, runnable slices, test gates and resumable progress records rather than independent documents."
    - id: H5
      severity: high
      probability: low
      effect: "Knowledge access work could be misread as permission to publish private atomized knowledge in the public repository."
      control: "Only schemas, synthetic fixtures and stubs are public; private bodies remain local/private and credentials are hard excluded."
    - id: H6
      severity: high
      probability: low
      effect: "Research portfolio simulation could drift toward broker or real-order execution."
      control: "NO_TRADE is machine-enforced; no broker, account, service lifecycle or network execution adapters are permitted."

risk_gate:
  current_decision: "PROCEED_WITH_CONTROLS"
  user_approval_required_now: false
  stop_and_request_user_approval_before:
    - "Any private or sensitive knowledge leaves the local machine or is committed to the public repository."
    - "Any cloud, private repository, Supabase or object-storage resource is created or modified."
    - "Any credential, cookie, token, private key, broker or bank authentication material is accessed."
    - "Any local service is started, stopped, reconfigured or migrated."
    - "Any real market order, broker path or account connection is introduced."
    - "Any protected blueprint body is changed or published."

success_observation_plan:
  - "Record milestone progress at approximately 20/40/60/80/100 percent with completed gates, tests, blockers and next step."
  - "Compare deterministic run hashes across repeated executions."
  - "Measure test coverage across temporal, lineage, capability, replay, portfolio, validation and knowledge-query gates."
  - "Record deviations between planned vertical slice and actual reusable components."
  - "Produce AgentExecutionFeedback v2 and OutcomeCalibrationReview before requesting merge."

rollback:
  strategy: "All changes remain on an isolated Codex branch and draft PR; revert commits or close the PR. No runtime state, services, private data or credentials may be changed."
