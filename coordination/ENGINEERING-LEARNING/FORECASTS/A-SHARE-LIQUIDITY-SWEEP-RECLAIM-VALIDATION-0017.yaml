mission_intent:
  fundamental_goal: "Merge legacy liquidity-sweep/reclaim fragments into one observable, point-in-time, A-share-constrained and falsifiable validation skill."
  user_capability_outcome: "The system can distinguish reference-zone breach, reclaim, failure, continuation and post-event stabilization without claiming hidden stops, order flow or participant intent."

system_position:
  primary_workstreams: [W4, W7]
  consumes: [W2, W5, W13]
  read_only_downstream: [W10, W11]
  systems_of_record:
    market_and_rules: W2
    feature_and_experiment: W4
    validation: W7
    shadow_and_learning: W9
  prohibited_duplicates:
    - market_data_runtime
    - replay_runtime
    - event_ledger
    - participant_identity_engine
    - risk_engine
    - portfolio_engine
    - execution_or_order_system

first_principles:
  fundamental_goal: "Create testable event labels and T+1-aware validation rather than a narrative indicator."
  current_state_to_change: "Relevant fragments exist but are semantically scattered and not independently validated."
  causal_mechanism:
    - "Predefine a reference zone without future leakage."
    - "Measure observable breach and reclaim paths."
    - "Separate continuation, reversal and stabilization outcomes."
    - "Apply A-share inventory and execution constraints."
    - "Compare against simple baselines across periods and regimes."
  constraints:
    - research_only_NO_TRADE
    - no_master_intent_claim
    - no_fake_tick_or_order_flow
    - no_DDX_or_DDY
    - no_auto_trade
    - one_active_codex_task
  required_evidence:
    - repository_and_local_candidate_inventory
    - source_semantics_and_capability_matrix
    - official_A_share_rule_snapshots
    - point_in_time_replay_feasibility
    - multi_period_OOS_validation_plan
  observability_limits:
    - "BAR_ONLY cannot observe stop clusters, absorption, hidden liquidity or participant identity."
    - "L1 snapshots cannot reconstruct queues or true OFI."
  alternatives_considered:
    - option: "Treat liquidity sweep as a chart-pattern strategy"
      reason_not_selected: "Would overclaim hidden mechanisms and invite parameter mining."
    - option: "Fold everything into W13 participant-intent inference"
      reason_not_selected: "Price structure does not identify participants and would contaminate identity semantics."
    - option: "Start with raw-order-flow implementation"
      reason_not_selected: "Raw order-event entitlement and history are not yet verified."
  stop_conditions:
    - future_leakage_in_reference_zones
    - required_data_license_unavailable
    - no_reproducible_point_in_time_labels
    - duplicate_canonical_runtime_required
    - expected_net_value_negative

