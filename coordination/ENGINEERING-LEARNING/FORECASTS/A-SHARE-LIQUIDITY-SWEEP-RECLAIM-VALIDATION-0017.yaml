  active_discovery_share: "15-25%"
  system_opportunity_share: "10-15%"
  max_new_architecture_proposals: 4
  max_new_skill_candidates: 1
  max_unplanned_files: 8
  scope_expansion_without_gate: false

improvement_authority:
  A_SAFE_LOCAL_AUTONOMOUS:
