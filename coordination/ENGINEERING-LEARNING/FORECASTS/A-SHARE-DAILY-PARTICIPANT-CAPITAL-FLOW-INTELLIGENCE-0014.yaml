schema_version: "1.0"
record_type: "TaskImpactForecast"
task_id: "A-SHARE-DAILY-PARTICIPANT-CAPITAL-FLOW-INTELLIGENCE-0014"
prepared_by: "GPT"
prepared_at: "2026-07-22"
mode: "project_plan"
boundary: "research_only / NO_TRADE"

first_principles:
  fundamental_goal: >-
    Build a point-in-time, evidence-graded and continuously validated A-share daily
    participant-capital intelligence capability for institutions, Northbound Connect,
    active short-term seats, passive/programmatic flows and state-linked stabilization
    hypotheses without pretending that hidden account identity or private intent is observable.
  current_state_to_change: >-
    The repository has participant archetypes, capital-intent architecture and offline
    replay, but no operational daily collectors, disclosure-regime contracts, participant
    evidence ledger, daily bulletin, identity calibration or economic incremental backtest.
  causal_mechanism:
    - "Official and licensed point-in-time evidence creates a reproducible daily fact layer."
    - "Observation classes and three-part confidence prevent activity, direction, amount and identity from being conflated."
    - "Competing hypotheses and counterevidence reduce narrative overreach."
    - "Cross-regime replay and two-level validation separate actor identification from economic usefulness."
    - "Daily shadow reports create calibration feedback before any high-risk use."
  constraints:
    - "Reuse canonical W2 market/replay, W5 evidence, W6 participant, W7 validation, W9 shadow, W10 DecisionEpisode, W11 allocation and W12 decision-science systems."
    - "Do not create a second market data, event ledger, replay, probability, risk or execution runtime."
    - "Do not bypass login, CAPTCHA, paywall, licensing or exchange redistribution restrictions."
    - "Do not identify a real hot-money person from a brokerage branch."
    - "Do not claim exact daily National Team amounts without official disclosure."
    - "Do not treat post-2024 Northbound aggregate activity as daily net flow."
    - "No broker connection or order generation."
  required_evidence:
    - "Full repository and accessible local capability audit."
    - "Official source, license, coverage, publication-time and disclosure-regime registry."
    - "Point-in-time historical dataset with immutable raw artifacts and hashes."
    - "Identity/direction/amount calibration labels and uncertainty."
    - "Cross-regime, cross-market-state and multi-skill economic validation."
  stop_conditions:
    - "Implementation requires fabricating unavailable actor identity or amount data."
    - "A source cannot be used legally or its field semantics cannot be verified."
    - "A proposed adapter duplicates a canonical runtime."
    - "Point-in-time publication history cannot be reconstructed for a claimed backtest."
    - "Task expands into live trade execution without a new explicit user approval."

expected_benefits:
  - benefit_id: B1
    description: "Provides a daily evidence map of major A-share participant-flow hypotheses."
    probability: high
    impact: high
    validation_signal: "Daily bulletin is reproducible from frozen point-in-time artifacts and includes abstentions."
  - benefit_id: B2
    description: "Improves multi-agent game inputs with evidence-graded participant posteriors instead of static stereotypes."
    probability: high
    impact: high
    validation_signal: "W6 consumes W13 outputs without treating simulation as fact."
  - benefit_id: B3
    description: "Separates Northbound activity, institutions, passive ETF flows, active seats and state-linked stabilization to reduce false attribution."
    probability: high
    impact: high
    validation_signal: "Misclassification matrix and ablation show lower error than a single main-fund-flow score."
  - benefit_id: B4
    description: "Creates a reusable dataset and validation protocol for event, risk, allocation and second-brain decisions."
    probability: medium
    impact: high
    validation_signal: "Point-in-time records are reusable by W5/W7/W10/W11/W12."

expected_harms:
  - harm_id: H1
    description: "Daily reports may sound more certain than the public data permits."
    probability: high
    severity: high
    mitigation: "Observation class, evidence grade, separate identity/direction/amount confidence, alternatives and mandatory abstention."
  - harm_id: H2
    description: "Historical Northbound effects may be wrongly transferred across disclosure and identity regimes."
    probability: high
    severity: high
    mitigation: "Hard regime splits, rolling calibration, model retirement and no universal net-flow field."
  - harm_id: H3
    description: "Multiple correlated proxies may create fake confirmation and backtest overfitting."
    probability: high
    severity: high
    mitigation: "Evidence clusters, experiment-family ledger, nested validation, PBO/DSR/White/SPA/Romano-Wolf and failure preservation."
  - harm_id: H4
    description: "Seat or ETF proxies may falsely label a real person or state-linked fund."
    probability: medium
    severity: high
    mitigation: "Use seat clusters and state-linked hypotheses only; prohibit person identity and exact amount claims."
  - harm_id: H5
    description: "Source licensing or publication restrictions may block historical assembly."
    probability: medium
    severity: medium
    mitigation: "Capability/license registry, official-first adapters, metadata-only records where redistribution is not permitted."
  - harm_id: H6
    description: "The workstream may duplicate existing capital-intent and replay architecture."
    probability: medium
    severity: medium
    mitigation: "D0 non-duplication audit and explicit reuse/adapt/migrate/reference-only decisions."

cost_forecast:
  architecture: medium
  source_and_license_audit: high
  historical_data_assembly: high
  engineering: high
  model_and_validation_compute: medium
  ongoing_maintenance: high
  main_cost_drivers:
    - "Disclosure and field-semantics versioning."
    - "Historical point-in-time publication reconstruction."
    - "Seat alias history and entity resolution."
    - "Cross-regime validation and independent adversarial tests."

net_value_assessment:
  expected_net_value: positive
  confidence: medium_high
  rationale: >-
    Daily participant intelligence can materially improve A-share context, game modelling,
    risk and event interpretation, but only if the first delivery remains official-evidence-first,
    avoids identity claims and validates incremental value instead of optimizing a narrative score.

execution_policy:
  codex_mode: "PROJECT_PLAN"
  reason: >-
    The task crosses data, rules, market microstructure, evidence, identity resolution,
    replay, validation and multiple existing workstreams; local source availability and
    historical coverage contain material unknowns.
  first_required_stage: "D0 repository and accessible-local capability/non-duplication audit"
  first_vertical_slice: "W13-VS1 Official Daily Evidence and Bulletin"
  maximum_initial_new_runtime_components: 1
  preferred_design: "Adapters and projections over canonical systems, not a parallel platform."

success_criteria:
  - "Official source and disclosure-regime registry complete."
  - "Post-2024 Northbound semantics are not represented as daily net flow."
  - "Point-in-time official evidence dataset and daily bulletin are reproducible."
  - "Seat and state-linked modules preserve identity limits and competing explanations."
  - "Identification and economic incremental validation are both completed."
  - "At least five regulatory/market periods and multiple market regimes are reported."
  - "Multi-skill interactions, ablations and multiple-testing audit are present."
  - "Shadow daily run passes calibration, drift and availability checks."
  - "No live order path, credential use or unauthorized data collection."

