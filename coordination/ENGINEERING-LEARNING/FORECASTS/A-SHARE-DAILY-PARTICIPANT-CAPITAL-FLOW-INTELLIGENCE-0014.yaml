boundary: "research_only / NO_TRADE"

first_principles:
  fundamental_goal: >-
    Build a point-in-time, evidence-graded and continuously validated A-share daily
    participant-capital intelligence capability for institutions, Northbound Connect,
    active short-term seats, passive/programmatic flows and state-linked stabilization
    hypotheses without pretending hidden account identity or private intent is observable.
  current_state_to_change: >-
    The repository has participant archetypes, capital-intent architecture and offline
    replay, but no operational daily collectors, disclosure-regime contracts, participant
    evidence ledger, daily bulletin, identity calibration or economic incremental backtest.
  causal_mechanism:
    - "Official and licensed point-in-time evidence creates a reproducible daily fact layer."
    - "Observation classes and separate identity, direction and amount confidence prevent semantic escalation."
    - "Competing hypotheses and counterevidence reduce narrative overreach."
    - "Cross-regime replay and two-level validation separate actor identification from economic usefulness."
    - "Daily shadow reports create calibration feedback before any high-risk use."
  constraints:
    - "Reuse canonical W2 market/replay, W5 evidence, W6 participant, W7 validation, W9 shadow, W10 DecisionEpisode, W11 allocation and W12 decision-science systems."
    - "Do not create a second market data, event ledger, replay, probability, risk or execution runtime."
    - "Do not bypass login, CAPTCHA, paywall, licensing or exchange redistribution restrictions."
    - "Do not identify a real hot-money person from a brokerage branch."
    - "Do not claim exact daily National Team amounts without official disclosure."
    - "Do not treat post-2024 Northbound aggregate activity as daily net flow."
    - "No broker connection or order generation."
  required_evidence:
    - "Full repository and accessible local capability audit."
    - "Official source, license, coverage, publication-time and disclosure-regime registry."
    - "Point-in-time historical dataset with immutable raw artifacts and hashes."
    - "Identity/direction/amount calibration labels and uncertainty."
    - "Cross-regime, cross-market-state and multi-skill economic validation."
  stop_conditions:
    - "Implementation requires fabricated actor identity or amount data."
    - "A source cannot be used legally or its field semantics cannot be verified."
    - "A proposed adapter duplicates a canonical runtime."
    - "Point-in-time publication history cannot be reconstructed for a claimed backtest."
    - "Task expands into live trade execution without new explicit user approval."

expected_benefits:
  - id: B1
    outcome: "Reproducible daily evidence map of major A-share participant-flow hypotheses."
    probability: high
    impact: high
  - id: B2
    outcome: "Evidence-graded inputs for W6 participant games, W7 risk, W10 decisions and W11 allocation."
    probability: high
    impact: high
  - id: B3
    outcome: "Lower false attribution by separating Northbound activity, domestic institutions, passive ETF flows, active seats and state-linked hypotheses."
    probability: high
    impact: high
  - id: B4
    outcome: "Reusable point-in-time dataset and cross-regime validation assets."
    probability: medium
    impact: high

expected_harms:
  - id: H1
    risk: "Reports sound more certain than public data permits."
    probability: high
    severity: high
    mitigation: "Evidence grade, three-part confidence, alternatives, invalidation and mandatory abstention."
  - id: H2
    risk: "Historical Northbound effects are transferred across identity and disclosure regimes."
    probability: high
    severity: high
    mitigation: "Hard regime splits, rolling calibration, retirement gates and no universal net-flow field."
  - id: H3
    risk: "Correlated proxies and parameter searches create fake confirmation."
    probability: high
    severity: high
    mitigation: "Evidence clusters, experiment-family ledger, nested validation and multiple-testing audit."
  - id: H4
    risk: "Seat or ETF proxies falsely label a person or state-linked fund."
    probability: medium
    severity: high
    mitigation: "Seat clusters and state-linked hypotheses only; exact identity/amount claims prohibited."
  - id: H5
    risk: "Licensing or publication restrictions block historical assembly."
    probability: medium
    severity: medium
    mitigation: "Official-first capability/license registry and metadata-only storage when redistribution is prohibited."
  - id: H6
    risk: "Duplicate capital-intent, evidence or replay runtime."
    probability: medium
    severity: medium
    mitigation: "D0 non-duplication audit and REUSE/ADAPT/MIGRATE/REFERENCE_ONLY decisions."

