first_principles:
  fundamental_goal: >-
    Preserve and make reviewable the completed W12 D0 evidence while synchronizing Draft PR #66
    with latest main and accurately absorbing W13, PMN and AMED as governance deltas without
    implementing their child runtimes or repeating the full D0 audit.
  user_capability_outcome: >-
    GPT can independently review a single current PR that reflects the full enterprise architecture,
    contains detailed evidence and active-discovery findings, and is ready for bounded acceptance or remediation.
  current_state_to_change: >-
    PR #66 is based on an older main and predates W13, PMN and AMED enterprise governance.
  causal_mechanism:
    - "Latest-main integration removes stale control-plane assumptions."
    - "Bounded delta mapping preserves W12 evidence while adding current maturity, ownership and non-duplication facts."
    - "AMED receipts expose research, unplanned improvements, active discoveries, alternatives and system-backwrite candidates for GPT second-pass audit."
  constraints:
    - "Reuse the existing PR #66 branch and PR."
    - "Do not redo valid D0 artifacts without a concrete invalidating conflict."
    - "Do not implement W12, W13 or PMN child runtimes."
    - "Do not expand WIP or self-switch tasks."
  required_evidence:
    - "Exact latest-main SHA and original/final PR #66 head SHAs."
    - "Conflict-resolution receipt and before/after comparison."
    - "W13, PMN and AMED maturity/ownership/dependency/non-duplication mappings."
    - "Actual parse, stale-reference, secret-pattern, governance and CI results."
    - "AMED execution receipt, L1 research ledger, improvement ledger, system discovery report, UNKNOWN and AI_HANDOFF."
  observability_limits:
    - "Repository evidence cannot prove inaccessible local implementation or licensed external data."
    - "No internet research is required unless a material current-source conflict is discovered."
  alternatives_considered:
    - option: "Create a replacement PR"
      reason_not_selected: "Would duplicate work, lose lineage and increase review risk."
    - option: "Restart the full W12 D0 audit"
      reason_not_selected: "No evidence that all verified artifacts are invalid; only bounded latest-main deltas are needed."
    - option: "Ignore AMED until the next task"
      reason_not_selected: "User explicitly made AMED the enterprise default and current active tasks must inherit it."
  stop_conditions:
    - "Latest-main conflicts invalidate a material portion of the original W12 D0 evidence."
    - "Integration would require canonical runtime modification."
    - "Required local or external evidence is inaccessible and cannot be honestly marked UNKNOWN."
    - "Exploration budget would be exceeded."

