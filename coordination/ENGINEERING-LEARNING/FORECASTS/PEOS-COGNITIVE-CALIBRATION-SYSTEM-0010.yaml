expected_positive_outcomes:
  - outcome: "World facts, user beliefs, task context, model inference and recommendations become explicitly separated."
    probability: 0.80
    evidence_required:
      - "Machine-readable epistemic contracts"
      - "Adversarial cases showing no cross-model fact contamination"
  - outcome: "Decision reviews distinguish process quality from outcome luck and reduce outcome-bias reinforcement."
    probability: 0.75
    evidence_required:
      - "Ex-ante frozen DecisionEpisodes"
      - "Blind process scoring before outcome reveal"
      - "Good-process/bad-outcome and bad-process/good-outcome cases"
  - outcome: "User cognitive profiles become more correctable and less absolute."
    probability: 0.70
    evidence_required:
      - "Open review protocol"
      - "Supporting and opposing evidence"
      - "State-trait-context-domain tests"
      - "User correction propagation"
  - outcome: "QCLAW adversarial evaluation expands from knowledge fidelity to false-profile and metacognitive errors."
    probability: 0.85
    evidence_required:
      - "Independent fixtures and per-case results"
      - "Failures preserved and blocking completion"
  - outcome: "A-share decision learning improves by linking market evidence, forecasts, actions and postmortems."
    probability: 0.60
    evidence_required:
      - "Real historical DecisionEpisode slice"
      - "Calibration and economic-utility comparison"
      - "No future-data leakage"

expected_negative_outcomes:
  - risk: "Architecture scope expands faster than executable vertical slices."
    probability: 0.70
    impact: "HIGH"
    mitigation: "C0 non-duplication audit; DecisionEpisode vertical slice before digital twin or broad world model."
  - risk: "False personal profiling or self-fulfilling labels."
    probability: 0.45
    impact: "HIGH"
    mitigation: "Single observation cannot create permanent traits; open correction; expiry; opposing evidence; neutral conditional wording."
  - risk: "User dependency increases while independent judgment weakens."
    probability: 0.35
    impact: "HIGH"
    mitigation: "Measure autonomy preservation; include reasoning and training; avoid answer-only optimization."
  - risk: "Multiple agents create duplicate user-model, evidence or memory stores."
    probability: 0.50
    impact: "HIGH"
    mitigation: "PR #57 canonical boundary; C0 file-ownership freeze; separate branches; no second runtime."
  - risk: "Metacognitive confidence becomes another uncalibrated LLM self-report."
    probability: 0.65
    impact: "MEDIUM_HIGH"
    mitigation: "External performance evidence, independent evaluator, calibration curves, sensitivity and efficiency metrics."
  - risk: "Anti-sycophancy becomes mechanical contradiction."
    probability: 0.40
    impact: "MEDIUM"
    mitigation: "Counterarguments require evidence, relevance and failure conditions; test unsupported contrarianism."
  - risk: "Personal or licensed material is published without adequate publication basis."
    probability: 0.20
    impact: "HIGH"
    mitigation: "Explicit user authorization and license/publication fields remain separate from secret classification."

critical_assumptions:
  - assumption: "Canonical atoms and evidence can support world, personal and task views without duplicating source bodies."
    confidence: 0.65
    validation: "C0 mapping and C2 contract prototype"
  - assumption: "A small number of real DecisionEpisodes can provide measurable value before a comprehensive world model exists."
    confidence: 0.80
    validation: "C3 vertical slice"
  - assumption: "Open negotiated user-model controls are usable outside educational learner-model settings."
    confidence: 0.55
    validation: "C4 user correction and longitudinal evaluation"
  - assumption: "Current LLMs can distinguish roleplay, humor, emotional expression and stable preference with acceptable error under evidence gates."
    confidence: 0.40
    validation: "Dedicated user-authorized fixture set and abstention benchmark"

stop_conditions:
  - "Issue #61 attempts canonical implementation before C0 non-duplication and file-ownership freeze."
  - "A single conversation or outcome is promoted to a permanent user trait without user confirmation and opposing-evidence review."
  - "Model-generated summaries are counted as independent evidence."
  - "Secret values enter source bodies, atoms, embeddings, logs, tests, issues or pull requests."
  - "Digital twin is presented as authoritative or allowed to make irreversible decisions."
  - "Failed adversarial cases are deleted or answer keys are silently rewritten."
  - "Brier Score or another single metric is used as sole proof of calibration, capability or decision value."

calibration_review_required:
  checkpoints: [20, 40, 60, 80, 100]
  compare:
    - "Predicted versus actual positive effects"
    - "Predicted versus actual harms"
    - "Unexpected benefits"
    - "Unexpected harms"
    - "Changed assumptions"
    - "Architecture simplifications"
    - "User corrections"
