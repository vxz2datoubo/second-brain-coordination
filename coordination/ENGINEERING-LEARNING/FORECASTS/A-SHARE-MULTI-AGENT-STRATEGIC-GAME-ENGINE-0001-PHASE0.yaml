mode: "project_plan"

first_principles:
  fundamental_goal: "Convert the four-family market-game concept into a repository-grounded, testable, staged engineering plan without prematurely building a persuasive but uncalibrated simulation."
  current_state_to_change: "The specialized blueprints are detailed, but executable contracts, system-gap evidence, integration mappings, and validation gates are not yet produced."
  causal_mechanism:
    - "A real-system audit reveals which data, replay, feature, simulator, and validation capabilities actually exist."
    - "Explicit archetype, state, action, objective, advantage, weakness, and evidence contracts prevent narrative role-play from masquerading as market inference."
    - "Rule-based MVP and historical replay create interpretable baselines before expensive MARL or self-play."
    - "Integration and protected-blueprint backwrite packages connect the module to the overall trading and second-brain architecture."
  constraints:
    - "Research only and NO_TRADE."
    - "No large-scale MARL training in the first delivery."
    - "No assumption that order-flow patterns reveal true participant identity."
    - "A-share auction, price-limit, suspension, T+1, cost, capacity, and cross-day inventory constraints must be explicit."
  required_evidence:
    - "Repository and local-system capability gap audit."
    - "Machine-readable family, advantage/weakness, state, action, evidence, dependency, and validation contracts."
    - "A staged work breakdown with stop conditions, cost estimates, unknowns, and rollback."
  observability_limits:
    - "True participant identity and private inventory remain hidden."
    - "Vendor-derived fund-flow fields may not have independently verified semantics."
    - "Some Level-2 fields or historical depth may be unavailable."
  alternatives_considered:
    - option: "Immediately build four LLM agents and let them debate."
      reason_not_selected: "This would create fluent stories without realistic matching, constraints, calibration, or reproducibility."
    - option: "Immediately train MARL agents."
      reason_not_selected: "High compute cost and reward misspecification risk before a validated rules baseline."
  stop_conditions:
    - "Task starts implementing real trade execution or accesses account/broker credentials."
    - "Required data is unavailable and the plan attempts to fabricate it."
    - "Scope expands into large-scale training or production deployment without a new approved task."
    - "The task treats inferred family identity as verified fact."

