    supporting_evidence: "The module is registered as a level-one trading research capability."
    validation_signal: "Capability dependency graph maps reuse across data, replay, attention, and second-brain modules."
    expected_time_horizon: "long"
  - benefit_id: "B4"
    description: "Identifies gaps in current data, replay, simulator, and validation infrastructure before expensive implementation."
    benefit_type: "indirect"
    probability: "high"
    impact: "medium"
