      - "Issue #31"
      - "Issue #32"
    owner: "GPT"
  - learning_id: "ELR-0002"
    title: "任务应链接完整反馈范本并在PR前校验结构"
    source_task: "SECOND-BRAIN-LEGACY-BACKEND-DISCOVERY-0003C-REVIEW-FIX"
    source_issue: 26
    source_pr: 29
    source_commit: "6c52b4dce5410abbeb98943f8c964933929f1670"
    observation: "初始技术内容合格，但精简反馈结构遗漏统一v2字段，造成一次额外修订。"
    causal_hypothesis: "在任务创建时链接完整已验收范本，并在PR前做字段校验，可以减少格式漂移和复审返工。"
    supporting_evidence:
      - "使用Phase A完整反馈作为参考后，一次性补齐缺失字段。"
      - "修订仅一份文件即可通过验收。"
    opposing_evidence:
      - "完整模板可能增加小任务负担，机械校验不能证明内容真实。"
    applicability_conditions:
      - "非trivial Agent任务且要求反馈v2。"
    failure_conditions:
      - "紧急止损或纯信息读取任务使用明确例外。"
    risks:
      - "过度模板化和虚假合规感。"
    maturity: "HYPOTHESIS"
    replication_count: 1
    next_validation:
      - "Issue #30设计Schema/linter，并在后续三个任务中记录返工率。"
    affected_assets:
