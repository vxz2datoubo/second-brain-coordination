records:
  - learning_id: "ELR-0001"
    title: "运行状态不等于权威地位，未运行不等于应废弃"
    source_task: "SECOND-BRAIN-LEGACY-BACKEND-DISCOVERY-0003C"
    source_issue: 26
    source_pr: 29
    source_commit: "6c52b4dce5410abbeb98943f8c964933929f1670"
    observation: "8766是唯一已验证运行候选，但不应因此成为未来知识权威；两个8767未运行也不足以证明应废弃。"
    causal_hypothesis: "将运行证据、能力证据和系统记录源治理分开，可以减少把现状误当目标架构的错误。"
    supporting_evidence:
      - "Phase A/B/C分别记录静态证据、运行事实和治理决策。"
      - "复用分类保留WRAP、UNKNOWN、MIGRATE和ARCHIVE差异。"
    opposing_evidence:
      - "当前只在旧第二大脑后端场景中验证，跨域泛化仍需测试。"
    applicability_conditions:
      - "存在旧系统、临时服务、候选存储或迁移过渡期。"
    failure_conditions:
      - "目标系统明确决定现役服务就是唯一权威，且经过独立治理批准。"
    risks:
      - "过度坚持分离可能增加适配层和迁移成本。"
    maturity: "HYPOTHESIS"
    replication_count: 1
    next_validation:
      - "在QCLAW本地候选仓与私有Git知识权威的设计中复用并验证。"
    affected_assets:
