      - "coordination/ENGINEERING-LEARNING/REVIEWS/SECOND-BRAIN-LEGACY-BACKEND-DISCOVERY-0003C-REVIEW-FIX.yaml"
    owner: "GPT"
  - learning_id: "ELR-0003"
    title: "新增Agent任务入口时必须显式隔离旧调度器身份与任务真源"
    source_task: "QCLAW-OFFLINE-FIRST-KNOWLEDGE-SYNC-0001-PHASE0"
    source_issue: 32
    source_pr: null
    source_commit: "5dff144563e252bcfdef1ec1dd1caf17c673c4e3"
    observation: "WorkBuddy活动索引和Issue #32已经存在，但本机仍优先进入Issue #7的旧Codex dispatcher流程，并错误地继续等待已关闭的Issue #26，导致新任务没有被领取。"
    causal_hypothesis: "仅新增活动索引不足以改变已有Agent的本地行为；必须同时声明执行者身份、旧调度器用途、禁止回退路径和远端最新main读取规则。"
    supporting_evidence:
      - "远端main的ACTIVE-WORKBUDDY-TASK指向Issue #32且状态READY。"
      - "WorkBuddy实际报告仍从Issue #7接收调度并等待Issue #26。"
      - "Issue #7正文明确是为Codex建立自动唤醒调度链，而非WorkBuddy自身任务入口。"
    opposing_evidence:
      - "尚未由WorkBuddy再次读取最新main验证修复是否完全生效。"
    applicability_conditions:
      - "一个Agent同时承担执行者、调度器维护者、审查者等多个身份。"
      - "本地存在长期运行的旧dispatcher、缓存索引或旧checkout。"
    failure_conditions:
      - "Agent运行时原生支持按目标身份隔离的唯一任务队列，并通过自动测试证明不会回退。"
    risks:
      - "增加路由规则复杂度，若身份命名不统一仍可能产生新歧义。"
    maturity: "HYPOTHESIS"
    replication_count: 1
    next_validation:
      - "让WorkBuddy使用恢复指令读取Issue #32，并检查是否停止访问Issue #7和Issue #26。"
      - "Issue #30加入旧路由抢占与陈旧索引回归测试。"
    affected_assets:
      - "AGENTS.md"
      - "coordination/WORKBUDDY-TASK-ROUTER.md"
      - "coordination/ACTIVE-WORKBUDDY-TASK.yaml"
      - "Issue #7"
      - "Issue #32"
      - "Issue #30"
    owner: "GPT"

rules:
  - "Single-task positive surprise cannot be promoted beyond HYPOTHESIS without strong independent mechanism evidence."
  - "Negative surprise must produce containment, root-cause analysis, a control update, and a regression test or explicit reason why none is possible."
  - "Every learning record must retain supporting and opposing evidence, applicability conditions, and failure conditions."
  - "Standards must be downgraded when contradicted by new evidence or environment changes."
  - "Lessons must be linked to the source Issue, PR, commit, and affected task templates or blueprints."

