purpose: >-
  Build a point-in-time, expectation-aware and cross-asset policy/news intelligence
  capability for A shares. The skill separates confirmed calendars, historical high-prior
  windows, rumors, market expectations, multi-dimensional surprises, pre-event runups,
  announcement reactions, post-event drift, sell-the-news and policy transmission without
  treating market moves as proof of leaks or causal identity.

