hard_gates:
  - id: "CALENDAR_TRUTH"
    rule: "Historical recurrence cannot be represented as an officially confirmed schedule."
  - id: "EXPECTATION_FREEZE"
    rule: "No surprise may be computed without an ex-ante expectation snapshot or explicit UNKNOWN."
  - id: "POINT_IN_TIME"
    rule: "Every event, claim, correction and feature must preserve published_at, available_at and market_effective_at."
  - id: "MULTI_DIMENSIONAL_NEWS"
    rule: "A headline number or sentiment score cannot replace policy-path, information-effect and latent-detail analysis."
  - id: "NO_LEAK_ASSERTION"
    rule: "Pre-event market movement may raise a leakage hypothesis but cannot prove insider access or identity."
  - id: "CROSS_ASSET_COMPETITION"
    rule: "Every major interpretation must compare cross-asset evidence, contradictions and alternative explanations."
  - id: "A_SHARE_MAPPING"
    rule: "Policy impact must identify mechanism, sector/company mapping, lag and invalidation conditions."
  - id: "NO_TRADE"
    rule: "The skill produces research evidence and bulletins, never orders or autonomous position sizes."

validation_requirements:
  event_claim:
    - "source classification accuracy"
    - "confirmation/denial/supersession accuracy"
    - "calendar precision and recall"
    - "rumor calibration and false-positive rate"
  expectation_surprise:
    - "expectation snapshot reproducibility"
    - "surprise sign and magnitude stability"
    - "text novelty and latent-factor ablation"
  cross_asset:
    - "reaction-map consistency"
    - "relationship-break detection"
    - "alternative-explanation coverage"
  economic_increment:
    - "B3 versus B3+PMN"
    - "1m/intraday/1/3/5/10/20/60-day horizons"
    - "cost, liquidity, T+1, limits and suspension"
    - "regime, event-family and policy-era splits"
    - "purged walk-forward, embargo and lockbox"
    - "White Reality Check, Hansen SPA, PBO, DSR and Romano-Wolf"
  shadow:
    - "timeliness"
    - "source completeness"
    - "calibration"
    - "abstention quality"
    - "drift and retirement"

first_vertical_slice:
  id: "W5-PMN-VS1"
  name: "Policy Calendar + Event Packet + Cross-Asset Shadow Bulletin"
  implementation_status: "NOT_AUTHORIZED"
  scope:
    - "official China policy and macro source registry"
    - "confirmed calendar versus high-prior unconfirmed window separation"
    - "point-in-time event/claim/evidence packets"
    - "ex-ante expectation and UNKNOWN snapshots"
    - "CGB curve, RMB, major equity indexes, commodities and market-breadth reaction map"
    - "rule-based pre-runup/priced-in/sell-the-news baseline"
    - "fact-first no-trade shadow bulletin"
  forbidden:
    - "unauthorized scraping or paywall bypass"
    - "anonymous rumor upgraded to fact"
    - "insider identity inference"
    - "live broker/order path"
    - "uncalibrated composite news score"

maturity_state_machine:
