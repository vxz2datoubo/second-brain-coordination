  event_evidence: "W5 canonical event/evidence layer"
  market_and_replay: "W2"
  probability: "W12/DS-02 shared ProbabilityEstimate"
  risk_validation: "W7"
  decision_freeze: "W10 DecisionEpisode"
  allocation_consumer: "W11"
