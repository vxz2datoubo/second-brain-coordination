anti_cheat_rules:
  - "Knowledge atoms MUST preserve full semantic content; no summarizing"
  - "Conflicts MUST be preserved with BOTH sides; no 'balanced' merge"
  - "UNKNOWN entries MUST carry verification paths; no deleted unknowns"
  - "Conditions and exceptions MUST be explicit; no stripping for brevity"
  - "Negations MUST be preserved; 'not X' is different from 'X'"
  - "Deterministic IDs MUST match content; no sequential numbering"
  - "Packet hash MUST be deterministic; same content = same hash"
  - "Quality gates are real; no overrides without documented decisions"
  - "Source lineage is mandatory; no orphan atoms"
  - "Secret scan is mandatory; no skipped security checks"
  - "privacy_class does NOT control storage; storage_targets does"
  - "CREDENTIAL_VALUE and FINANCIAL_VALUE atoms: NONE storage, METADATA_ONLY GPT"
