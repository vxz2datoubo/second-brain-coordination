# ============================================================================
# SECRET SCANNING CONFIGURATION
# Task:    QCLAW-KNOWLEDGE-ATOMIZATION-DIGESTION-0008
# Version: 1.0.0
# ============================================================================

scanner:
  name: "QCLAW Secret Scanner"
  version: "1.0.0"
  description: >
    Scans knowledge sources for credential, authentication, access, and financial
    secret values. These are the ONLY content permanently denied from all outputs.
    Regular knowledge (private, personal, internal) is NOT blocked by this scanner.

# ════════════════════════════════════════════════════════════════════
# PATTERN DEFINITIONS
# ════════════════════════════════════════════════════════════════════

patterns:
  # ── API Keys ──
  - id: SEC-API-001
    name: "Generic API Key"
    secret_type: "API_KEY"
    severity: "BLOCKING"
    patterns:
      - '(?i)(api[_-]?key|apikey|api[_-]?secret)\s*[:=]\s*[''"]?[A-Za-z0-9_\-\.]{20,}[''"]?'
      - '(?i)sk-[A-Za-z0-9]{32,}'
      - '(?i)key-[A-Za-z0-9]{32,}'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:API_KEY]"

  - id: SEC-API-002
    name: "OpenAI API Key"
    secret_type: "API_KEY"
    severity: "BLOCKING"
    patterns:
      - 'sk-(?:proj-)?[A-Za-z0-9]{32,}'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:OPENAI_API_KEY]"

  - id: SEC-API-003
    name: "GitHub Token"
    secret_type: "TOKEN"
    severity: "BLOCKING"
    patterns:
      - '(?i)gh[pousr]_[A-Za-z0-9]{36,}'
      - '(?i)github[_-]?token\s*[:=]\s*[''"]?[A-Za-z0-9_]{20,}[''"]?'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:GITHUB_TOKEN]"

  # ── Tokens ──
  - id: SEC-TOK-001
    name: "JWT Token"
    secret_type: "TOKEN"
    severity: "BLOCKING"
    patterns:
      - 'eyJ[A-Za-z0-9\-_\.]{20,}\.[A-Za-z0-9\-_\.]{20,}\.[A-Za-z0-9\-_\.]{10,}'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:JWT_TOKEN]"

  - id: SEC-TOK-002
    name: "OAuth Access Token"
    secret_type: "OAUTH_SECRET"
    severity: "BLOCKING"
    patterns:
      - '(?i)ya29\.[A-Za-z0-9_\-\.]{50,}'
      - '(?i)access[_-]?token\s*[:=]\s*[''"]?[A-Za-z0-9_\-\.]{20,}[''"]?'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:OAUTH_TOKEN]"

  # ── Passwords ──
  - id: SEC-PWD-001
    name: "Password in Config"
    secret_type: "PASSWORD"
    severity: "BLOCKING"
    patterns:
      - '(?i)(?:password|passwd|pwd|secret)\s*[:=]\s*[''"][^''""]{1,}[''"]'
    exceptions:
      - "Placeholder values: '****', 'REDACTED', 'your-password-here', 'changeme'"
      - "Environment variable references: '${VAR}', '$VAR', '%VAR%'"
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:PASSWORD]"

  - id: SEC-PWD-002
    name: "Database Password"
    secret_type: "DATABASE_CREDENTIAL"
    severity: "BLOCKING"
    patterns:
      - '(?i)(?:db|database|mysql|postgres|mongodb|redis)[_-]?(?:password|pass|pwd)\s*[:=]\s*[''"]?[^''""\s]{4,}[''"]?'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:DB_PASSWORD]"

  # ── Private Keys ──
  - id: SEC-KEY-001
    name: "PEM Private Key"
    secret_type: "PRIVATE_KEY"
    severity: "BLOCKING"
    patterns:
      - '-----BEGIN (?:RSA |EC |DSA |OPENSSH |ENCRYPTED )?PRIVATE KEY-----[\s\S]{20,}-----END (?:RSA |EC |DSA |OPENSSH |ENCRYPTED )?PRIVATE KEY-----'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:PRIVATE_KEY]"

  - id: SEC-KEY-002
    name: "SSH Private Key"
    secret_type: "PRIVATE_KEY"
    severity: "BLOCKING"
    patterns:
      - '-----BEGIN OPENSSH PRIVATE KEY-----[\s\S]{20,}-----END OPENSSH PRIVATE KEY-----'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:SSH_PRIVATE_KEY]"

  # ── Connection Strings ──
  - id: SEC-CONN-001
    name: "Database Connection String"
    secret_type: "CONNECTION_STRING"
    severity: "BLOCKING"
    patterns:
      - '(?i)(?:mongodb|mysql|postgresql|postgres|sqlite|redis|mssql)://[^:]+:[^@]+@'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:CONNECTION_STRING]"

  - id: SEC-CONN-002
    name: "JDBC Connection String"
    secret_type: "CONNECTION_STRING"
    severity: "BLOCKING"
    patterns:
      - '(?i)jdbc:[a-z]+://[^:]+:[^@;/]+[@;/]'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:JDBC_CONNECTION]"

  # ── Financial ──
  - id: SEC-FIN-001
    name: "Broker API Key"
    secret_type: "BROKER_API_KEY"
    severity: "BLOCKING"
    patterns:
      - '(?i)(?:alpaca|interactive[_-]?brokers|td[_-]?ameritrade|robinhood|binance|coinbase|kraken)[_-]?(?:api[_-]?key|secret|token)\s*[:=]\s*[''"]?[A-Za-z0-9_\-\.]{16,}[''"]?'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:BROKER_KEY]"

  - id: SEC-FIN-002
    name: "Payment Processor Key"
    secret_type: "PAYMENT_PROCESSOR_KEY"
    severity: "BLOCKING"
    patterns:
      - '(?i)(?:stripe|paypal|square)[_-]?(?:secret|key|token)\s*[:=]\s*[''"]?[A-Za-z0-9_\-\.]{16,}[''"]?'
      - '(?i)sk_(?:test|live)_[A-Za-z0-9]{16,}'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:PAYMENT_KEY]"

  - id: SEC-FIN-003
    name: "Crypto Wallet Private Key"
    secret_type: "CRYPTOCURRENCY_KEY"
    severity: "BLOCKING"
    patterns:
      - '(?i)(?:private[_-]?key|wallet[_-]?key|seed[_-]?phrase)\s*[:=]\s*[''"]?[A-Za-z0-9\s]{20,}[''"]?'
      - '\b[13][a-km-zA-HJ-NP-Z1-9]{25,34}\b'  # BTC address pattern (exclude)
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:CRYPTO_KEY]"

  # ── Webhooks ──
  - id: SEC-WEB-001
    name: "Webhook Secret URL"
    secret_type: "WEBHOOK_SECRET"
    severity: "BLOCKING"
    patterns:
      - '(?i)https://hooks\.(?:slack|discord|teams)\.com/services/[A-Za-z0-9/_\-]{30,}'
    redaction_method: "REPLACED_WITH_PLACEHOLDER"
    placeholder: "[REDACTED:WEBHOOK_URL]"

# ════════════════════════════════════════════════════════════════════
# ALLOWED METADATA PATTERNS (NOT secrets)
# ════════════════════════════════════════════════════════════════════

allowed_metadata:
  description: >
    These patterns describe where secrets are stored WITHOUT containing the
    secret values. They are KNOWLEDGE, not secrets, and are NOT redacted.

  examples:
    - "API key is stored in environment variable OPENAI_API_KEY"
    - "Database credentials are in Kubernetes Secret 'db-creds'"
    - "The config file at ~/.config/app/config.yaml contains the API token field"
    - "Wallet private key is stored in wallet.json (encrypted)"
    - "Payment keys are managed through the Stripe dashboard, not in code"
    - "Credentials rotation is handled by Vault at /secret/app/credentials"

  detection_rule: >
    If a pattern contains a secret PATTERN but the matched text describes WHERE
    a secret lives (not the secret value itself), classify as METADATA_ONLY
    and do NOT redact. Example: "API key in .env file" is fine; "API_KEY=sk-abc123"
    is not.

# ════════════════════════════════════════════════════════════════════
# SCAN PROCEDURE
# ════════════════════════════════════════════════════════════════════

scan_procedure:
  steps:
    - order: 1
      action: "For each source, apply all pattern regexes against full text"
    - order: 2
      action: "For each match, determine if it's a VALUE or METADATA reference"
    - order: 3
      action: "If VALUE: mark position, type, severity"
    - order: 4
      action: "If METADATA: keep, do not redact"
    - order: 5
      action: "For all VALUE matches: apply redaction (replace with placeholder)"
    - order: 6
      action: "Compute hash after redaction"
    - order: 7
      action: "Assess semantic damage: how much knowledge was lost?"
    - order: 8
      action: "Generate SecretScanReceipt"
    - order: 9
      action: "If BLOCKING secrets found but semantic damage CRITICAL: flag for human review"

# ════════════════════════════════════════════════════════════════════
# SEMANTIC DAMAGE ASSESSMENT
# ════════════════════════════════════════════════════════════════════

semantic_damage:
  levels:
    NONE:
      description: "No secrets found, or redacted text contained no knowledge"
      example: "Redacting 'password=abc123' removes only the value"
    
    MINIMAL:
      description: "Redaction removed non-semantic content only"
      example: "Redacting an API key from a code example; the code logic remains"
    
    MODERATE:
      description: "Redaction removed some semantic context but core knowledge preserved"
      example: "Redacting connection string credentials; the database structure description remains"
    
    SIGNIFICANT:
      description: "Redaction removed important semantic information"
      example: "Redacting authentication flow description because it contained example tokens"
    
    CRITICAL:
      description: "Redaction destroyed essential knowledge; source cannot be atomized"
      example: "Entire document is a credential management guide where every example contains real secrets"
