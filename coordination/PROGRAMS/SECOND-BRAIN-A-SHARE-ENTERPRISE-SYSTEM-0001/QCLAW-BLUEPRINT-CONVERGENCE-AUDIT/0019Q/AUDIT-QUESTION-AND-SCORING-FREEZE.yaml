pre_evaluation_freeze_gate:
  status: "NOT_PROVEN"
  classification: "FAIL"
  reason: >
    The standard adversarial evaluation protocol requires that
    (a) scoring questions are finalized and frozen, (b) acceptance
    criteria are defined, and (c) THEN evaluation/scoring is performed.
    
    In the observed 0019Q artifact order, scoring (step 1) was produced
    BEFORE the question pack (step 2) and expected/forbidden behavior
    contract (step 3) were frozen. This means the questions that would
    test the scoring were not yet defined when the scores were assigned,
    and the acceptance criteria were not yet written when the conclusions
    were drawn.
    
    This does NOT mean the scoring was biased or the conclusions wrong.
    It means the PROCEDURAL guarantee of independence — that scores
    could not have been influenced by knowing what questions would be
    asked — is not proven.

