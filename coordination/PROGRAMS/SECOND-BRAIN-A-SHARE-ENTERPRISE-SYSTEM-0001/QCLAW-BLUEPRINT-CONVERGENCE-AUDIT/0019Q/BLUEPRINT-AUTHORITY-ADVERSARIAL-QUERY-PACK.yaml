        forbidden_behaviors:
          - "Must NOT reject QCLAW's weights without providing a principled counter-argument"
          - "Must NOT claim the weight difference is 'minor' if it changes the rank order"
          - "Must NOT dismiss QCLAW's dependency_readiness emphasis as 'too conservative' without evidence"
        pass_criteria: >
