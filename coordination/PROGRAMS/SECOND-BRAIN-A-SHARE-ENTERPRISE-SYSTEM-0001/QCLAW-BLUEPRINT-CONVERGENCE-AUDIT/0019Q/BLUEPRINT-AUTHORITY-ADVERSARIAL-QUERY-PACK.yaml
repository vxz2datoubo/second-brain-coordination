          isolation_gate (20%), which penalize 0017 for its broken
          W11→W12→W7 dependency chain. QCLAW-weighted scores should
          show 0017 significantly lower than 84. W12's REGISTERED_
          CANDIDATE status with Draft PR should also score lower than 62.
        codex_claim_under_test: >
          NEXT-VERTICAL-SLICE-SELECTION: Codex scores and weights;
          QCLAW independent weights.
        evidence_required: >
          QCLAW-weighted scores with per-category decomposition;
