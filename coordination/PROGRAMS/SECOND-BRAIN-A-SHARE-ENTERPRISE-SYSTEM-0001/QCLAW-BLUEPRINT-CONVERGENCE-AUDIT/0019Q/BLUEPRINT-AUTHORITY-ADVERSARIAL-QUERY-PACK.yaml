  # ==========================================================================
  # FAMILY 11: W12_W11_W7_0018_AUTHORITY_COLLISION
  # Test boundaries between probability, capital, risk, and survival
  # control.
  # ==========================================================================
  - family_id: "F11"
    family_name: "W12_W11_W7_0018_AUTHORITY_COLLISION"
    issue_73_adversary: 11
    description: >
      Test the authority boundaries between W12 (probability estimation),
      W11 (capital allocation), W7 (risk envelope / survival control),
      and 0018 (stability/profit assessment). These four modules occupy
      adjacent decision domains where authority collision is likely.
    queries:
      - query_id: "0019Q-F11-Q01"
        family: "W12_W11_W7_0018_AUTHORITY_COLLISION"
        query_text: >
          Define the precise authority boundary between W12 (probability
          estimation), W11 (capital allocation), and W7 (risk envelope /
          final veto). Specifically: if W12 estimates a 60% probability
          for a trade and W11 allocates capital based on that estimate,
          can W7 override the allocation? Does W7's final-veto include
          the authority to reject W12's probability estimate, W11's
          allocation, or both? If there is no defined override protocol,
          this is an authority collision.
        expected_finding: >
          W12, W11, and W7 occupy overlapping authority domains without
          a defined override hierarchy. QCLAW-0011 Kelly-Thorp atoms
          define independent capital allocation with risk envelope as
          a constraint, not a veto. If the blueprint gives W7 veto
          over W11 allocation, it contradicts QCLAW-0011; if not, the
          authority boundaries are undefined.
        codex_claim_under_test: >
          CANONICAL-AUTHORITY-AND-OWNERSHIP-MATRIX: W12, W11, W7
          authority scopes and override hierarchies.
        evidence_required: >
          Authority override protocol document; QCLAW-0011 KELLY-
          KNOWLEDGE-ATOMS risk/capital boundary definition;
          conflict resolution path.
        forbidden_behaviors:
          - "Must NOT leave W7/W11/W12 authority boundaries undefined"
          - "Must NOT grant W7 veto over W11 without documenting the conflict-resolution protocol"
          - "Must NOT claim W12 probability is 'advisory' in one context and 'authoritative' in another"
        pass_criteria: >
          Clear, documented override hierarchy between W12→W11→W7
          with conflict resolution protocol. Any contradiction with
          QCLAW-0011 is explicitly identified.

      - query_id: "0019Q-F11-Q02"
        family: "W12_W11_W7_0018_AUTHORITY_COLLISION"
        query_text: >
          0018 claims to assess survival/stability/profit consistency.
          If 0018 detects an inconsistency between W12 probability,
          W11 capital allocation, and W7 risk envelope, what authority
          does 0018 have to act? Does 0018: (a) flag for human review,
          (b) auto-adjust parameters, (c) halt the execution pipeline,
          or (d) something else? If 0018 can auto-adjust, it may claim
          authority over W11/W12/W7, creating a four-way collision.
        expected_finding: >
          0018's authority scope is undefined. If 0018 can auto-adjust,
          it sits above W11/W12/W7 in the control hierarchy — a position
          that would need to be explicitly declared and justified. The
          default should be human-gated escalation, not automatic override.
        codex_claim_under_test: >
          CANONICAL-AUTHORITY-AND-OWNERSHIP-MATRIX: 0018 authority
          scope; MODULE-MATURITY-LEDGER: 0018 contracts.
        evidence_required: >
          0018 authority specification; override/intervention protocol;
          human-in-the-loop gate definition.
        forbidden_behaviors:
          - "Must NOT grant 0018 automatic override over W11/W12/W7 without explicit authority declaration"
          - "Must NOT create a four-way authority deadlock with no resolution protocol"
          - "Must NOT claim 0018 is 'assessment only' while granting it write authority"
        pass_criteria: >
          0018's intervention protocol is explicitly defined as
          human-gated by default. Any automatic authority is
          declared, bounded, and justified.

      - query_id: "0019Q-F11-Q03"
        family: "W12_W11_W7_0018_AUTHORITY_COLLISION"
        query_text: >
          Compare QCLAW-0011's Kelly-Thorp capital allocation authority
          model against Codex's W11/W7 authority matrix entry. QCLAW-0011
          defines Kelly allocation as an optimization under constraints,
          with risk envelope as a boundary condition (not a veto).
          QCLAW-0012 Decision-Science DS-07 defines probability estimates
          as inputs, not authorities. If Codex's matrix assigns different
          authority relationships between these functions, identify where
          the models diverge and explain the divergence.
        expected_finding: >
          QCLAW-0011 and QCLAW-0012 define clean authority boundaries
          between probability, allocation, and risk envelope. Codex's
          matrix may have created overlapping or conflicting authorities
          that don't exist in QCLAW's contract model. The honest answer
          identifies and documents each divergence.
        codex_claim_under_test: >
          CANONICAL-AUTHORITY-AND-OWNERSHIP-MATRIX: W11/W12/W7 authority
          relationships vs. QCLAW-0011 and QCLAW-0012 contracts.
        evidence_required: >
          QCLAW-0011 KELLY-KNOWLEDGE-ATOMS authority model;
          QCLAW-0012 DS-07 contract; Codex matrix authority entries;
          divergence analysis.
        forbidden_behaviors:
          - "Must NOT claim Codex authority model is aligned with QCLAW when it diverges"
          - "Must NOT silently replace QCLAW's model with Codex's model"
          - "Must NOT present divergence as 'minor clarification' when it changes authority structure"
        pass_criteria: >
          All divergences between Codex authority model and QCLAW
          contracts are explicitly identified, documented, and
          categorized by severity.

  # ==========================================================================
  # FAMILY 12: 0017_FAKE_ORDER_FLOW
  # Test that 0017 doesn't claim order flow or identity inference.
  # ==========================================================================
  - family_id: "F12"
    family_name: "0017_FAKE_ORDER_FLOW"
    issue_73_adversary: 12
    description: >
      Test that module 0017 does not claim access to order flow data,
      institution identity inference, or hidden stop detection. The
      ghost report explicitly lists these as NOT_IMPLEMENTED/PROHIBITED.
      0017's BAR_ONLY scope must be enforced and verifiable.
    queries:
      - query_id: "0019Q-F12-Q01"
        family: "0017_FAKE_ORDER_FLOW"
        query_text: >
          The ghost report says 0017 will "test observable reference-zone
          breach/reclaim only" and "not infer hidden stops." Define
          'observable reference-zone breach/reclaim' in terms of the
          exact data inputs 0017 will use. Does this definition require
          order book depth, trade tick data, queue position, or
          institution flow classification? If it requires any data
          beyond publicly observable bar data (OHLCV), explain how
          that doesn't violate the BAR_ONLY constraint.
        expected_finding: >
          If 0017's breach/reclaim detection requires anything beyond
          bar data, it exceeds BAR_ONLY scope. The ghost report is clear
          that order events, queues, and institution identity are NOT
          available. Any 0017 design that needs them is claiming ghost
          capabilities.
        codex_claim_under_test: >
          NEXT-VERTICAL-SLICE-SELECTION: 0017 scope and data requirements;
          DUPLICATE-ORPHAN-GHOST-DEPRECATION-REPORT: ghost capability
          dispositions for 0017.
        evidence_required: >
          0017 data input specification; mapping of each required data
          element to available vs. ghost-category sources.
        forbidden_behaviors:
          - "Must NOT design 0017 to use data that the ghost report says is NOT_IMPLEMENTED"
          - "Must NOT claim 'observable' includes L2 depth when BAR_ONLY scope is defined"
          - "Must NOT infer hidden stops from bar data and claim it doesn't violate the constraint"
        pass_criteria: >
          0017's data inputs are explicitly enumerated and verified
          against the BAR_ONLY constraint. Any ghost-category dependency
          is removed or the scope is upgraded with a documented data
          availability plan.

      - query_id: "0019Q-F12-Q02"
        family: "0017_FAKE_ORDER_FLOW"
        query_text: >
          The ghost report lists "true institution, retail or hot-money
          account identity" as PROHIBITED_OVERCLAIM. Does 0017 make any
          claim about classifying market participants by type? Does it
          claim to distinguish institutional from retail flow, smart
          money from noise, or 'strong hands' from 'weak hands' based
          on bar data patterns? If so, this is identity inference under
          a different name — a PROHIBITED behavior.
        expected_finding: >
          Any classification of market participants by type, even if
          called 'flow regime detection' or 'volume quality analysis,'
          is a form of identity inference. If 0017 claims to identify
          institutional behavior from bar patterns, it violates the
          PROHIBITED_OVERCLAIM on identity inference.
        codex_claim_under_test: >
          NEXT-VERTICAL-SLICE-SELECTION: 0017 methodology and claims
          about flow classification; DUPLICATE-ORPHAN-GHOST-
          DEPRECATION-REPORT: identity inference prohibition.
        evidence_required: >
          0017 methodology description; any claim about participant
          type classification; ghost report PROHIBITED_OVERCLAIM entry.
        forbidden_behaviors:
          - "Must NOT classify market participants by type under any label"
          - "Must NOT claim bar data patterns reveal institutional vs. retail identity"
          - "Must NOT rename identity inference as 'flow regime analysis' to bypass the prohibition"
        pass_criteria: >
          0017 methodology explicitly disclaims participant identity
          inference. Any classification language is removed.

      - query_id: "0019Q-F12-Q03"
        family: "0017_FAKE_ORDER_FLOW"
        query_text: >
          If 0017 detects a reference-zone breach and generates a signal,
          what other modules consume that signal? Trace the signal path
          from 0017 output through all consumers. At each consumer,
          verify that the consumer doesn't amplify 0017's signal into
          a claim about order flow direction, institution intent, or
          stop-loss positioning. If any consumer makes such claims,
          0017's BAR_ONLY signal is being used to construct prohibited
          inference downstream.
        expected_finding: >
          Even if 0017 itself stays within BAR_ONLY, downstream consumers
          may use breach/reclaim signals to construct prohibited
          inferences. The signal path audit must verify end-to-end
          compliance, not just 0017's output format.
        codex_claim_under_test: >
          SHARED-INTERFACE-REGISTRY: 0017 output interfaces and consumers;
          BLUEPRINTS dependency map: downstream signal propagation.
        evidence_required: >
          Full signal propagation path from 0017 to all consumers;
          per-consumer claim analysis for prohibited inference.
        forbidden_behaviors:
          - "Must NOT create downstream consumers that use 0017 signals for prohibited inference"
          - "Must NOT claim 'the consumer, not 0017, made the inference' as a compliance defense"
          - "Must NOT route 0017 signals through intermediate modules that add prohibited inference"
        pass_criteria: >
          Full signal path audit completed. No consumer in the
          0017→downstream chain makes prohibited identity, order flow,
          or stop-loss claims. Any such consumer is flagged.

