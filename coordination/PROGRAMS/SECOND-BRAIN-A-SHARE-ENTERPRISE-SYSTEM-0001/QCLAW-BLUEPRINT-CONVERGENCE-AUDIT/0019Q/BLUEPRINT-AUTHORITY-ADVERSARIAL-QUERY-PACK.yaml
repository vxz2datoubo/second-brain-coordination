query_families:
  # ==========================================================================
  # FAMILY 1: DUPLICATE_WRITE_AUTHORITY
  # Test that Codex doesn't claim write authority where embedded modules
  # already own it.
  # ==========================================================================
  - family_id: "F01"
    family_name: "DUPLICATE_WRITE_AUTHORITY"
    issue_73_adversary: 1
    description: >
      Test that Codex's CANONICAL-AUTHORITY-AND-OWNERSHIP-MATRIX does not
      claim write authority over domains where QCLAW-embedded modules
      (0008, 0010, 0011, 0012) already hold canonical write authority.
      QCLAW's 0008 CANONICAL-RUNTIME-BOUNDARY.md defines the atomization
      pipeline as QCLAW-governed; Codex must not duplicate or override
      those write paths.
    queries:
      - query_id: "0019Q-F01-Q01"
        family: "DUPLICATE_WRITE_AUTHORITY"
        query_text: >
          List every module in the enterprise blueprint where Codex claims
          WRITE authority over knowledge atom storage, transport, or access
          decision logic. For each such claim, cite the specific authority
          matrix entry and its declared source of truth (SoR). If any of
          these overlap with QCLAW-0008 DETERMINISTIC-IDENTITY or
          CANONICAL-RUNTIME-BOUNDARY, flag the overlap explicitly.
        expected_finding: >
          If Codex claims write authority over atom storage/transport/access
          (W3 physical store, W8 routing), these conflict with QCLAW-0008's
          embedded ownership. The honest answer should identify at minimum
          W3 and W8 as having unresolved authority collision with 0008.
        codex_claim_under_test: >
          CANONICAL-AUTHORITY-AND-OWNERSHIP-MATRIX: any WRITE authority
          claim on knowledge atom storage, transport, or access layers.
        evidence_required: >
          Explicit comparison table showing Codex claimed WRITE domains
          against QCLAW-0008 STORAGE-TRANSPORT-ACCESS-MATRIX owned paths.
          Each overlap must cite the specific atom ID range in 0008.
        forbidden_behaviors:
          - "Must NOT claim WRITE authority on any path governed by QCLAW-0008 CANONICAL-RUNTIME-BOUNDARY"
          - "Must NOT treat LOGICAL_AUTHORITY_FROZEN as equivalent to PHYSICAL_AUTHORITY_KNOWN"
          - "Must NOT silently merge QCLAW-0008 and Codex write paths into a single 'consensus' authority"
        pass_criteria: >
          All overlapping write claims between Codex matrix and QCLAW-0008
          are explicitly identified, with Codex either conceding the overlap
          or providing a non-conflicting physical SoR distinct from 0008.

      - query_id: "0019Q-F01-Q02"
        family: "DUPLICATE_WRITE_AUTHORITY"
        query_text: >
          For W3 (local/public memory storage), examine the authority
          matrix entry. Does Codex claim PHYSICAL_AUTHORITY over W3's
          storage layer, and if so, what physical storage medium, hash
          reconciliation path, and migration protocol does it cite?
          Compare against QCLAW-0008's existing storage contracts that
          already cover local memory, public memory, and the public-to-local
          migration path.
        expected_finding: >
          Codex's own matrix marks W3 as LOGICAL_AUTHORITY_FROZEN_
          PHYSICAL_AUTHORITY_UNKNOWN. Any claim to write authority over
          W3 storage is contradicted by this self-assessment AND by
          QCLAW-0008's pre-existing embedded storage contracts.
        codex_claim_under_test: >
          CANONICAL-AUTHORITY-AND-OWNERSHIP-MATRIX: W3 authority status
          and physical SoR claim.
        evidence_required: >
          Side-by-side of Codex W3 authority entry vs. QCLAW-0008
          STORAGE-TRANSPORT-ACCESS-MATRIX storage entries; explicit
          identification of the physical storage migration path (PR #58
          Draft status must be disclosed).
        forbidden_behaviors:
          - "Must NOT claim W3 physical store is resolved when PR #58 is a Draft PR"
          - "Must NOT treat QCLAW-0008 storage as a 'reference implementation' subject to Codex override"
          - "Must NOT claim authority over W3 public memory when QCLAW-0008 PUBLIC_SAFE transport is embedded"
        pass_criteria: >
          W3 authority status is correctly reported as FROZEN/UNKNOWN,
          with honest disclosure of PR #58 Draft status and explicit
          acknowledgment that QCLAW-0008 owns the existing storage contracts.

      - query_id: "0019Q-F01-Q03"
        family: "DUPLICATE_WRITE_AUTHORITY"
        query_text: >
          For the W8 agent routing and handoff module, does Codex's
          authority matrix claim write authority over agent-to-agent
          handoff protocols, routing table updates, or handoff artifact
          generation? Compare against QCLAW-0010 PEOS-Cognitive-OS
          decision lifecycle contracts and QCLAW-0008 AI_HANDOFF.yaml
          which already define canonical handoff structures.
        expected_finding: >
          QCLAW-0008 AI_HANDOFF.yaml and 0010 PEOS contracts already
          define agent handoff protocols. If Codex claims write authority
          over handoff routing, it duplicates embedded 0008/0010
          authority. QCLAW-0010 owns the handoff-to-decision pipeline.
        codex_claim_under_test: >
          CANONICAL-AUTHORITY-AND-OWNERSHIP-MATRIX: W8 authority scope
          and agent routing claims.
        evidence_required: >
          Cross-reference of Codex W8 write authority claims against
          QCLAW-0008 AI_HANDOFF.yaml artifact schemas and QCLAW-0010
          decision lifecycle handoff contracts.
        forbidden_behaviors:
          - "Must NOT present Codex W8 handoff as the authoritative routing layer"
          - "Must NOT claim W8 overrides or replaces QCLAW-0008 handoff formats"
          - "Must NOT write handoff artifacts in a format incompatible with QCLAW-0010 decision ingestion"
        pass_criteria: >
          W8 is correctly scoped as a consumer of QCLAW-0008/0010
          handoff schemas, not a parallel write authority over
          handoff protocol design.

  # ==========================================================================
  # FAMILY 2: PRODUCER_CONSUMER_WRITE_CONFLICT
  # Test C1-C11 interfaces for producer/consumer contradictions.
  # ==========================================================================
  - family_id: "F02"
    family_name: "PRODUCER_CONSUMER_WRITE_CONFLICT"
    issue_73_adversary: 2
    description: >
      Test every shared interface C1-C11 for contradictions between
      the producer module's claimed output and the consumer module's
      expected input. QCLAW's SHARED-INTERFACE-REGISTRY reports
      5 partial, 6 contracted/blueprint, and 0 fully implemented
      interfaces — every interface has at minimum unresolved schemas.
    queries:
      - query_id: "0019Q-F02-Q01"
        family: "PRODUCER_CONSUMER_WRITE_CONFLICT"
        query_text: >
          For interface C7_PROBABILITY_ESTIMATE connecting W12_0012
          (producer) to W11_0011 (consumer), what is the exact schema
          contract? Does the producer (W12, C7 output) have a runtime
          that actually emits C7-formatted probability estimates, and
          does the consumer (W11, C7 input) have a runtime that ingests
          them? Cite the implementation status of both sides.
        expected_finding: >
          C7 is classified as DRAFT_PR_NOT_MAIN by SHARED-INTERFACE-
          REGISTRY. W12 has no main-branch runtime; W11 has zero
          backtest evidence. Neither side has a running implementation
          that produces or consumes C7. The interface is a blueprint
          contract with no current operational path.
        codex_claim_under_test: >
          SHARED-INTERFACE-REGISTRY: C7 implementation status;
          MODULE-MATURITY-LEDGER: W12 REGISTERED_CANDIDATE claim.
        evidence_required: >
          PR #66 merge status (main vs. Draft), C7 schema existence vs.
          C7 schema as consumed by any running pipeline, W11 backtest
          evidence count.
        forbidden_behaviors:
          - "Must NOT claim C7 is 'partially operational' when producer side has no main runtime"
          - "Must NOT claim W11 ingests C7 probability estimates when W11 has zero backtest evidence"
          - "Must NOT present Draft PR schema as a production interface contract"
        pass_criteria: >
          C7 is correctly reported as NOT operational end-to-end.
          Both producer (W12) and consumer (W11) empty-runtime status
          is disclosed.

      - query_id: "0019Q-F02-Q02"
        family: "PRODUCER_CONSUMER_WRITE_CONFLICT"
        query_text: >
          For interface C4 connecting W4 (P2 synthetic strategy) to
          downstream consumers, identify: (a) which module is the
          declared producer of C4 data, (b) which modules consume C4,
          (c) whether the C4 schema is published in the SHARED-INTERFACE-
          REGISTRY, and (d) whether any consumer has a runtime that
          ingests C4 output from a running W4 pipeline.
        expected_finding: >
          C4 is likely one of the 5 PARTIAL interfaces. W4 is correctly
          assessed as REGISTERED_CANDIDATE — no A-share OOS validation.
          If Codex claims any C4 consumer is operational, it contradicts
          the producer's REGISTERED_CANDIDATE status.
        codex_claim_under_test: >
          SHARED-INTERFACE-REGISTRY: C4 classification;
          MODULE-MATURITY-LEDGER: W4 maturity and any consumer maturity
          that claims to consume C4.
        evidence_required: >
          C4 schema document (if exists), W4 runtime evidence,
          consumer runtime evidence for any module consuming C4.
        forbidden_behaviors:
          - "Must NOT claim C4 is fully implemented when W4 is REGISTERED_CANDIDATE"
          - "Must NOT fabricate consumer-enrichment that W4 has not produced"
          - "Must NOT claim C4 data exists when P2 synthetic strategy has no A-share validation"
        pass_criteria: >
          C4 implementation status correctly reflects W4's
          REGISTERED_CANDIDATE ceiling. No consumer claims to
          be operational on C4 input without evidence.

      - query_id: "0019Q-F02-Q03"
        family: "PRODUCER_CONSUMER_WRITE_CONFLICT"
        query_text: >
          For interfaces C5, C8, and C9 — all classified by SHARED-
          INTERFACE-REGISTRY as contracted/blueprint — identify each
          interface's declared producer module. Does each such producer
          have a runtime that emits the contracted schema? If any
          producer's maturity in MODULE-MATURITY-LEDGER is BLUEPRINT_ONLY
          or CONTRACTED_NOT_IMPLEMENTED, explain how the interface can
          be anything other than BLUEPRINT_ONLY.
        expected_finding: >
          C5, C8, C9 are contracted/blueprint with no producer runtime.
          Any claim that these interfaces are 'partially implemented'
          or 'available for integration' is false. A contract without
          a producer runtime is a blueprint, not an interface.
        codex_claim_under_test: >
          SHARED-INTERFACE-REGISTRY: C5, C8, C9 implementation status;
          MODULE-MATURITY-LEDGER: respective producer modules.
        evidence_required: >
          Each interface's producer module maturity from the ledger,
          evidence that the producer has emitted C5/C8/C9 formatted
          output in any test or production run.
        forbidden_behaviors:
          - "Must NOT claim C5/C8/C9 are PARTIAL when producers are BLUEPRINT_ONLY"
          - "Must NOT conflate 'schema written' with 'interface operational'"
          - "Must NOT count Draft PR schemas as evidence of interface readiness"
        pass_criteria: >
          All three interfaces correctly reported as BLUEPRINT_ONLY
          in alignment with their producer modules' maturity.

  # ==========================================================================
  # FAMILY 3: MATURITY_STATUS_INFLATION
  # Test every module's maturity assignment against QCLAW's knowledge
  # of actual implementation state.
  # ==========================================================================
  - family_id: "F03"
    family_name: "MATURITY_STATUS_INFLATION"
    issue_73_adversary: 3
    description: >
      Test each of the 14 modules in MODULE-MATURITY-LEDGER for maturity
      inflation. QCLAW's independent audit (MATURITY-INFLATION-AND-GHOST-
      CAPABILITY-REPORT) found 2 clear inflations (W3: HIGH, W12: MEDIUM)
      and 1 borderline caveat (W7: LOW). These queries force Codex to
      defend its maturity assignments with implementation evidence.
    queries:
      - query_id: "0019Q-F03-Q01"
        family: "MATURITY_STATUS_INFLATION"
        query_text: >
          For module W3, you assess maturity as IMPLEMENTED_NOT_A_SHARE_
          VALIDATED. Provide the specific evidence of implementation:
          (a) What physical storage medium is W3 writing to in production?
          (b) What hash reconciliation protocol verifies W3 storage
          integrity? (c) When was the public-to-local store migration
          completed, and where is the migration completion artifact?
          (d) Is PR #58 merged to main, and if not, why does a Draft PR
          qualify as 'implemented'?
        expected_finding: >
          W3 maturity is INFLATED (QCLAW finding: HIGH severity). Codex's
          own matrix marks W3 PHYSICAL_AUTHORITY_UNKNOWN; PR #58 is Draft.
          No physical storage medium is proven. IMPLEMENTED_NOT_A_SHARE_
          VALIDATED requires implementation — a Draft PR plus unresolved
          migration is not implementation.
        codex_claim_under_test: >
          MODULE-MATURITY-LEDGER: W3 maturity assignment and evidence.
        evidence_required: >
          PR #58 merge status, physical storage proof (hash reconciliation),
          migration completion artifact, GPT acceptance of W3 storage.
        forbidden_behaviors:
          - "Must NOT claim a Draft PR as implementation evidence"
          - "Must NOT claim PHYSICAL_AUTHORITY_UNKNOWN is compatible with IMPLEMENTED status"
          - "Must NOT conflate Phase 3 offline memory (PR #57 merged) with W3 physical store migration"
        pass_criteria: >
          W3 is downgraded to REGISTERED_CANDIDATE or lower, OR Codex
          provides concrete physical storage evidence that was not
          available during the independent audit.

      - query_id: "0019Q-F03-Q02"
        family: "MATURITY_STATUS_INFLATION"
        query_text: >
          For module W12_0012, you assess maturity as REGISTERED_CANDIDATE.
          Define 'registered candidate' in operational terms and explain
          how it differs from CONTRACTED_NOT_IMPLEMENTED. Provide evidence
          that W12's C7 probability estimation has been exercised beyond
          GPT review: has any running pipeline consumed C7 output?
          SHARED-INTERFACE-REGISTRY itself classifies C7 as DRAFT_PR_NOT_MAIN.
          Is a Draft PR with GPT acceptance sufficient for REGISTERED_
          CANDIDATE, or does this fit the definition of CONTRACTED_NOT_
          IMPLEMENTED?
        expected_finding: >
          W12 maturity is INFLATED (QCLAW finding: MEDIUM severity).
          PR #66 is a Draft PR on a non-main branch. No consumer has
          integrated C7 into a running pipeline. QCLAW's 0012 Decision-
          Science contracts define REGISTERED_CANDIDATE as requiring
          at least one routed child implementation — which W12 lacks.
        codex_claim_under_test: >
          MODULE-MATURITY-LEDGER: W12 maturity assignment;
          SHARED-INTERFACE-REGISTRY: C7 classification.
        evidence_required: >
          PR #66 merge status, existence of C7 consumer implementations,
          QCLAW-0012 DS-01 through DS-13 contract definitions of maturity
          gates.
        forbidden_behaviors:
          - "Must NOT claim REGISTERED_CANDIDATE when no routed child implementation exists"
          - "Must NOT present GPT acceptance of Draft PR as equivalent to implementation evidence"
          - "Must NOT ignore SHARED-INTERFACE-REGISTRY's own DRAFT_PR_NOT_MAIN classification"
        pass_criteria: >
          W12 is downgraded to CONTRACTED_NOT_IMPLEMENTED, OR Codex
          provides evidence of at least one routed child implementation
          consuming C7 output from a main-branch runtime.

      - query_id: "0019Q-F03-Q03"
        family: "MATURITY_STATUS_INFLATION"
        query_text: >
          Walk through every module in MODULE-MATURITY-LEDGER and identify:
          for those marked IMPLEMENTED_NOT_A_SHARE_VALIDATED or higher,
          what constitutes the 'implementation' evidence. For each such
          module, answer: (a) Is the implementation on the main branch?
          (b) Has any downstream consumer ingested its output? (c) Is
          there a GPT acceptance or quality gate report? If the answer
          to (a) or (b) is NO for any module, explain why the maturity
          level is not inflated.
        expected_finding: >
          W3: PR #58 is Draft (no main). W7: risk envelope runtime not on
          main. W8 has agent routes on main but consumer integration is
          partial. The pattern of non-main-branch Draft PRs being treated
          as 'implemented' suggests systematic inflation on the knowledge-
          evidence-memory axis (W3, W12).
        codex_claim_under_test: >
          MODULE-MATURITY-LEDGER: all modules at IMPLEMENTED_NOT_A_SHARE_
          VALIDATED or higher.
        evidence_required: >
          Branch status (main vs. Draft) for each module's implementation
          PR, consumer attestation of output ingestion, GPT acceptance
          reports.
        forbidden_behaviors:
          - "Must NOT treat Draft PR as main-branch implementation"
          - "Must NOT conflate GPT review signal with operational evidence"
          - "Must NOT claim downstream integration without consumer attestation"
        pass_criteria: >
          Every IMPLEMENTED module has main-branch code AND at least
          one attested consumer. All exceptions are explicitly downgraded
          or caveated with a published remediation timeline.

  # ==========================================================================
  # FAMILY 4: BLUEPRINT_TERM_AS_IMPLEMENTATION
  # Test that maturity classifications distinguish blueprint-only from
  # implemented.
  # ==========================================================================
  - family_id: "F04"
    family_name: "BLUEPRINT_TERM_AS_IMPLEMENTATION"
    issue_73_adversary: 4
    description: >
      Test that Codex's MODULE-MATURITY-LEDGER uses terminology that
      clearly distinguishes blueprint-only artifacts from implemented
      artifacts. The concern is that terms like REGISTERED_CANDIDATE
      and IMPLEMENTED_NOT_A_SHARE_VALIDATED blur the line between
      'document exists' and 'code runs'.
    queries:
      - query_id: "0019Q-F04-Q01"
        family: "BLUEPRINT_TERM_AS_IMPLEMENTATION"
        query_text: >
          Define the precise operational difference between BLUEPRINT_ONLY,
          CONTRACTED_NOT_IMPLEMENTED, REGISTERED_CANDIDATE, and
          IMPLEMENTED_NOT_A_SHARE_VALIDATED in your maturity ledger.
          Specifically: at what point does a module transition from
          'documentation-only' to 'code-exists' to 'code-runs-on-main'
          to 'code-validated-on-A-share'? Apply these definitions to
          W12 and explain why it qualifies as REGISTERED_CANDIDATE
          rather than CONTRACTED_NOT_IMPLEMENTED.
        expected_finding: >
          The boundary between CONTRACTED_NOT_IMPLEMENTED and
          REGISTERED_CANDIDATE is the most problematic. For W12,
          the only evidence beyond a contract document is a Draft PR
          (PR #66) with GPT acceptance. If Codex's definitions treat
          'Draft PR exists' as 'registered candidate', the taxonomy
          conflates documentation with implementation.
        codex_claim_under_test: >
          MODULE-MATURITY-LEDGER: maturity taxonomy definitions;
          W12 assignment.
        evidence_required: >
          The operational gate definitions for each maturity level,
          explicit criteria for each transition boundary, W12 evidence
          mapped to the REGISTERED_CANDIDATE criteria.
        forbidden_behaviors:
          - "Must NOT define maturity levels such that 'Draft PR exists' bridges BLUEPRINT to IMPLEMENTED"
          - "Must NOT use different criteria for different modules to achieve desired maturity levels"
          - "Must NOT skip CONTRACTED_NOT_IMPLEMENTED when the only implementation evidence is a non-main Draft PR"
        pass_criteria: >
          Maturity taxonomy has clear, falsifiable criteria for each level.
          W12's assignment can be independently verified against those
          criteria. If Draft PR is NOT sufficient, W12 is downgraded.

      - query_id: "0019Q-F04-Q02"
        family: "BLUEPRINT_TERM_AS_IMPLEMENTATION"
        query_text: >
          For module W7, your ledger lists open_gates including "canonical
          W7RiskEnvelope" and "full final-veto integration" as incomplete.
          Yet W7 maturity is IMPLEMENTED_NOT_A_SHARE_VALIDATED. Define
          what 'implemented' means when canonical risk envelope runtime
          is not on main and final-veto integration is incomplete. If
          these are blocking gates, how can the module be 'implemented'?
        expected_finding: >
          W7's IMPLEMENTED label is defensible but generous. The open
          gates explicitly state that the canonical risk envelope is
          incomplete. This creates a credibility problem: if W7 is
          'implemented' with incomplete canonical components, the
          maturity taxonomy is allowing partial implementation to
          count as full implementation.
        codex_claim_under_test: >
          MODULE-MATURITY-LEDGER: W7 maturity vs. open_gates.
        evidence_required: >
          W7's open_gates list vs. its IMPLEMENTED status, evidence
          that the canonical W7RiskEnvelope is operational on any branch.
        forbidden_behaviors:
          - "Must NOT declare IMPLEMENTED when listed blocking gates remain open"
          - "Must NOT treat 'validation infrastructure exists' as equivalent to 'module is implemented'"
          - "Must NOT omit the open_gates from the maturity summary"
        pass_criteria: >
          W7's open_gates are prominently disclosed alongside its
          maturity status. If canonical risk envelope is not on main,
          the IMPLEMENTED label carries an explicit caveat about
          incomplete core functionality.

      - query_id: "0019Q-F04-Q03"
        family: "BLUEPRINT_TERM_AS_IMPLEMENTATION"
        query_text: >
          Count the number of modules in MODULE-MATURITY-LEDGER whose
          implementation evidence consists primarily of one or more of:
          (a) a Draft PR not on main, (b) a GPT review or acceptance
          signal, (c) a schema document without runtime proof. For each
          such module, state whether you consider Draft PR + GPT signal
          to constitute 'implementation' and explain your reasoning
          against QCLAW-0008's QUALITY-GATES.yaml definition which
          requires main-branch merge + consumer attestation + hash
          reconciliation for implementation gate passage.
        expected_finding: >
          W3 and W12 at minimum rely on Draft PR + GPT signal as their
          primary evidence. QCLAW-0008 QUALITY-GATES explicitly requires
          main-branch merge + consumer attestation, which neither W3
          nor W12 has. The discrepancy reveals a different definition
          of 'implementation' between Codex and QCLAW-0008.
        codex_claim_under_test: >
          MODULE-MATURITY-LEDGER: evidence base for all modules;
          implicit definition of 'implementation'.
        evidence_required: >
          Per-module evidence classification (Draft PR, merged PR,
          GPT signal, consumer attestation, hash reconciliation);
          QCLAW-0008 QUALITY-GATES.yaml implementation gate criteria.
        forbidden_behaviors:
          - "Must NOT treat QCLAW-0008 quality gate criteria as optional or advisory"
          - "Must NOT count the same GPT signal as evidence for multiple modules"
          - "Must NOT hide the Draft/merged status of implementation PRs"
        pass_criteria: >
          All evidence is classified by type and disclosed. Any module
          relying on Draft PR + GPT signal is flagged with its evidence
          quality caveat. Discrepancy with QCLAW-0008 implementation
          gate is acknowledged.

  # ==========================================================================
  # FAMILY 5: CONTRACT_AS_BACKTEST_EVIDENCE
  # Test that CONTRACTED_NOT_IMPLEMENTED modules are not treated as
  # evidence of backtesting.
  # ==========================================================================
  - family_id: "F05"
    family_name: "CONTRACT_AS_BACKTEST_EVIDENCE"
    issue_73_adversary: 5
    description: >
      Test that Codex does not treat modules classified as CONTRACTED_NOT_
      IMPLEMENTED as evidence of A-share backtesting, OOS validation, or
      production readiness. A contract document is a promise, not evidence.
    queries:
      - query_id: "0019Q-F05-Q01"
        family: "CONTRACT_AS_BACKTEST_EVIDENCE"
        query_text: >
          W11_0011 is CONTRACTED_NOT_IMPLEMENTED, with zero A-share
          backtest evidence of any kind (not even synthetic). Yet the
          enterprise blueprint convergence map lists W11 as a dependency
          for 0018 and the NEXT-VERTICAL-SLICE mentions W11's score of 46.
          If W11 has zero backtest evidence, on what basis was W11 scored
          for next-slice selection? Does the score incorporate the
          CONTRACTED_NOT_IMPLEMENTED status, or does it assume future
          backtest evidence that does not yet exist?
        expected_finding: >
          Scoring W11 at 46 with zero backtest evidence implies the
          scoring framework credits blueprint contracts as if they
          were implementation evidence. QCLAW's independent assessment
          finds this is a systematic issue: the next-slice scoring
          treats contracted modules as having partial evidence when
          they have none.
        codex_claim_under_test: >
          NEXT-VERTICAL-SLICE-SELECTION.md: W11 scoring and evidence
          basis; BLUEPRINTS/ENTERPRISE-BLUEPRINT-CONVERGENCE-AND-
          DEPENDENCY-MAP-v1.1.md: W11 dependency claims.
        evidence_required: >
          W11 score decomposition by evidence category; any A-share
          backtest data attributed to W11; explicit statement of what
          constitutes W11's 46-point evidence base.
        forbidden_behaviors:
          - "Must NOT score CONTRACTED_NOT_IMPLEMENTED modules as if backtest evidence exists"
          - "Must NOT treat contract documents as backtest evidence"
          - "Must NOT inflate W11's score with assumed future evidence"
        pass_criteria: >
          W11's score is either justified with actual backtest evidence
          (not contracts) or explicitly marked as 'evidence-absent' with
          a ceiling proportional to its CONTRACTED_NOT_IMPLEMENTED status.

      - query_id: "0019Q-F05-Q02"
