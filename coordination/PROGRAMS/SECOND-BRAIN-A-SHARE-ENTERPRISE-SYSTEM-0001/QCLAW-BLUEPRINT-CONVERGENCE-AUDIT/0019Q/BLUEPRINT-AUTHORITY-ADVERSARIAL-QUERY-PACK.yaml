  # ==========================================================================
  # FAMILY 14: NEXT_SLICE_RECENCY_BIAS
  # Test whether 0017 score of 84 suffers from recency/momentum bias
  # vs W12(62) and W11(46).
  # ==========================================================================
  - family_id: "F14"
    family_name: "NEXT_SLICE_RECENCY_BIAS"
    issue_73_adversary: 14
    description: >
      Test whether 0017's top score of 84 reflects genuine readiness
      or recency/momentum bias. 0017 is the newest module proposal;
      W12 (62) and W11 (46) have been in the pipeline longer but score
      lower. QCLAW's independent assessment must verify that the scoring
      doesn't overweight novelty.
    queries:
      - query_id: "0019Q-F14-Q01"
        family: "NEXT_SLICE_RECENCY_BIAS"
        query_text: >
          The scoring weights for next-slice selection are reported as
          25/20/15/15/10/10/5. Explain how each weight category was
          applied to 0017 (score 84) and W12 (score 62). For each
          category, provide the raw score and the weighted contribution.
          Specifically address: does 0017's higher score come from
          genuinely better evidence across all categories, or does it
          come from categories that favor new proposals (e.g., lower
          implementation cost because nothing has been built yet)?
        expected_finding: >
          If 0017 outscores W12 primarily in categories that are
          easier for unimplemented modules (implementation cost,
          isolation gate, rollback), the scoring framework has a
          structural bias toward new proposals. The 84 vs. 62 gap
          may reflect recency bias rather than higher readiness.
        codex_claim_under_test: >
          NEXT-VERTICAL-SLICE-SELECTION: scoring methodology, weights,
          per-category scores for 0017 and W12.
        evidence_required: >
          Full per-category score decomposition for 0017 and W12;
          per-category scoring rubric.
        forbidden_behaviors:
          - "Must NOT apply different scoring rubrics to 0017 vs. W12"
          - "Must NOT give 0017 full marks in 'isolation gate' when it depends on the broken W11 chain"
          - "Must NOT claim recency bias doesn't exist without providing the per-category data"
        pass_criteria: >
          Per-category scores published. Any category where 0017
          outscores W12 due to novelty/not-yet-built status is flagged
          as structurally biased. Adjusted scores computed.

      - query_id: "0019Q-F14-Q02"
        family: "NEXT_SLICE_RECENCY_BIAS"
        query_text: >
          Normalize the next-slice scores for maturity: modules with
          lower maturity should have lower evidence-readiness scores.
          Does 0017 (CONTRACTED_NOT_IMPLEMENTED) scoring 84 while W12
          (REGISTERED_CANDIDATE) scores 62 and W11 (CONTRACTED_NOT_
          IMPLEMENTED) scores 46 indicate that maturity is not a
          significant factor in the scoring? If maturity were properly
          weighted, what would the rank order be?
        expected_finding: >
          If maturity were properly weighted, CONTRACTED_NOT_IMPLEMENTED
          modules should not outscore REGISTERED_CANDIDATE modules.
          The 84→62→46 pattern inverts the expected maturity-weighted
          order. The scoring framework either underweights maturity
          or applies it inconsistently.
        codex_claim_under_test: >
          NEXT-VERTICAL-SLICE-SELECTION: scoring weights and maturity
          incorporation.
        evidence_required: >
          Maturity-weighted score recalculation for all modules;
          maturity-to-score correlation analysis.
        forbidden_behaviors:
          - "Must NOT claim maturity is adequately weighted when CONTRACTED outranks REGISTERED_CANDIDATE"
          - "Must NOT claim 0017's 84 reflects 'different criteria' without documenting those criteria"
          - "Must NOT dismiss the inversion as 'scoring captures different dimensions'"
        pass_criteria: >
          Maturity-weighted scores computed. If the rank order inverts
          under proper maturity weighting, the inversion is documented
          and the scoring framework is revised or caveated.

      - query_id: "0019Q-F14-Q03"
        family: "NEXT_SLICE_RECENCY_BIAS"
        query_text: >
          QCLAW's independent scoring uses weights: data_adequacy (20%),
          dependency_readiness (25%), implementation_cost (15%),
          isolation_gate (20%), rollback (10%), infrastructure_reuse (10%).
