# Comprehensive matrix proving each planned M1-M6 deliverable does NOT duplicate:
# - PR #57 Phase 3 offline memory (store, fusion, snapshot, retrieval, context, eval, CLI)
# - Issue #38 Knowledge Gateway (C1-C6 work packages)
# - Issue #59 Atomization (atoms, relations, schemas, pipeline, quality gates)

matrix:
  description: >
    Each row maps an M-phase deliverable to:
    (a) what it needs from existing infrastructure
    (b) why it is NOT duplication
    (c) what new capability it adds
    
    VERDICTS: NO_DUPLICATION, INTERFACE_CONSUMPTION (uses but does not duplicate),
    SHARED_SCHEMA (uses schema but separate implementation)

  entries:

    # ════════════════════════════════════════════════════════════════
    # M1: MEMORY LAYER IMPLEMENTATION
    # ════════════════════════════════════════════════════════════════

    - deliverable: "layers/working_memory.rb"
      phase: M1
      needs_from_pr57: "None — working memory is session-scoped, transient"
      needs_from_issue38: "None"
      needs_from_issue59: "Atom schema for understanding what atoms look like (interface only)"
      why_not_duplication: >
        PR #57 has no concept of "working memory" — all knowledge is stored
        persistently. Issue #59 produces atoms but has no session concept.
        Working memory is a new cognitive layer that wraps transient context.
      new_capability: "Session-scoped high-priority memory with LRU eviction and TTL"

    - deliverable: "layers/episodic_memory.rb"
      phase: M1
      needs_from_pr57: "Store.read to fetch atoms classified as episodic"
      needs_from_issue38: "None"
      needs_from_issue59: "CASE, TEMPORAL_UPDATE, DECISION atom types for classification"
      why_not_duplication: >
        PR #57 stores all atoms flat; has no time-ordered event taxonomy.
        Issue #59 creates atoms but has no episodic layer classification.
        Episodic memory is a layer classifier + temporal index, not a store.
      new_capability: "Time-ordered event memory with temporal indexing, compression, and episode chains"

    - deliverable: "layers/semantic_memory.rb"
      phase: M1
      needs_from_pr57: "Store.read to fetch atoms classified as semantic"
      needs_from_issue38: "None"
