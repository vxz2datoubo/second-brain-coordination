      why_not_duplication: >
        PR #57 provides flat storage. Issue #59 produces typed atoms.
        Neither provides a conceptual knowledge layer with subject-indexed
        retrieval, confidence-weighted decay, or topic classification.
      new_capability: "Subject-indexed conceptual knowledge layer with confidence-weighted decay and topic classification"

    - deliverable: "layers/procedural_memory.rb"
      phase: M1
      needs_from_pr57: "Store.read for METHOD/PROCEDURE/SKILL atoms"
      needs_from_issue38: "None"
      needs_from_issue59: "METHOD, PROCEDURE, SKILL, CHECKLIST_ITEM atom types; KnowledgeSkill schema"
      why_not_duplication: >
        Issue #59 defines skill atoms but has no procedural memory layer with
        step-order indexing, prerequisite chains, and failure mode mapping.
      new_capability: "Step-ordered procedural memory with prerequisite awareness and failure mode indexing"

    - deliverable: "layers/autobiographical_user_memory.rb"
      phase: M1
      needs_from_pr57: "Store.read for USER_PREFERENCE/USER_CORRECTION atoms"
