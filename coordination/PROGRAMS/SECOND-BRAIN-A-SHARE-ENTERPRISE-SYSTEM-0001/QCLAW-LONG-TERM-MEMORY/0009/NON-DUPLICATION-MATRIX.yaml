        pipeline (semantic + keyword → results). 0009 dispatches 9 retrievers
        in parallel, each targeting different memory layers and query dimensions.
        PR #57 retrieval is just one input source.
      new_capability: "Parallel multi-recall dispatch across 9 retrievers with timeout management and result fusion"

