  - "Main delivery remains primary; active discovery cannot become a reason for incomplete delivery."
  - "A-class improvements may be implemented, B-class must be reported, C-class is proposal-only and D-class stops/escalates."
  - "L1 repository reuse checking is mandatory; L2 targeted professional research is trigger-based; L3 becomes an independent task."
  - "Finish mergeability and evidence-review gates before child runtime implementation."
  - "Planning-only work may proceed only when it does not create duplicate canonical runtimes."
  - "Blueprint presence, formulas, issue registration and fluent reports are not implementation evidence."
  - "All inaccessible local evidence remains ACCESS_NOT_AVAILABLE or UNKNOWN."
  - "Historical recurrence is not an official schedule; pre-event price movement is not proof of a leak."
  - "Reference-zone breach is not proof of hidden stops, absorption, master intent or participant identity."
  - "Negative, null and counterintuitive results must be preserved."
  - "No real trading, broker/account access, credential-value use or order-critical path changes."

