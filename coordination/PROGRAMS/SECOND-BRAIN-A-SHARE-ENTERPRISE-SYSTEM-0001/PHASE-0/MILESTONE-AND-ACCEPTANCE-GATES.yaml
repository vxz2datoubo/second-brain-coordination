schema_version: "1.0"
milestones:
  - id: M0
    name: "Enterprise Phase-0 accepted"
    evidence_required: ["20 required artifacts", "feedback v2", "draft PR", "outcome calibration"]
    blocking_conditions: ["protected content published", "no selected vertical slice"]
  - id: M1
    name: "Foundation contract freeze"
    evidence_required: ["contract registry", "fixtures", "negative tests", "read-compatibility", "rollback decision"]
    blocking_conditions: ["unclear authority", "missing temporal semantics"]
  - id: M2
    name: "Offline A-share replay slice"
    evidence_required: ["raw manifest", "normalisation", "A-share session rules", "cost model", "OOS validation", "NO_TRADE journal"]
    blocking_conditions: ["future leakage", "untraceable data", "live trading path"]
  - id: M3
    name: "Knowledge candidate/authority interface"
    evidence_required: ["WorkBuddy #32 input", "candidate schema", "quarantine", "import test", "authority manifest"]
    blocking_conditions: ["private data upload", "candidate overwrite", "QCLAW runtime dependency"]
  - id: M4
    name: "Research definition promotion"
    evidence_required: ["indicator/theory/strategy tests", "parameter source", "dataset/code/result manifests", "OOS gate"]
    blocking_conditions: ["generic-market rule conflict", "unsupported data field"]
  - id: M5
    name: "Event intelligence pilot"
    evidence_required: ["TEIF audit", "available_at test", "artifact provenance", "ambiguity/counterevidence tests"]
    blocking_conditions: ["causal claim without support", "unauthorised collection"]
  - id: M6
    name: "Agent-game MVP"
    evidence_required: ["family ontology", "feasible-action gate", "misclassification/counterfactual tests"]
    blocking_conditions: ["identity certainty", "MARL scope creep", "trade instruction"]
  - id: M7
    name: "Shadow operations"
    evidence_required: ["approval trace", "degradation tests", "engineering outcome review", "rollback drill"]
    blocking_conditions: ["order-critical coupling", "missing audit trail"]
