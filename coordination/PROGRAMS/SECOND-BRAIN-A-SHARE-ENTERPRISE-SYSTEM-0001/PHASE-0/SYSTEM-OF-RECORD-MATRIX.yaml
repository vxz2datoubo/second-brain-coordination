schema_version: "1.0"
principle: "One object class has one declared authority; projections and caches cannot silently override it."
records:
  - object: "Protected architecture intent"
    authority: "L0 protected master blueprints"
    public_representation: "sanitized manifest and backwrite delta only"
    state: VERIFIED_FACT
  - object: "Public task coordination"
    authority: "GitHub issues, active task router, PRs and approved coordination manifests"
    projection: "local checkout"
    state: VERIFIED_FACT
  - object: "Approved knowledge packets, atoms, relations and skills"
    authority: "future private Git knowledge repository"
    current_local_store: "candidate/legacy local knowledge directories"
    state: PLANNED
  - object: "Raw market and event evidence"
    authority: "immutable or append-only licensed/local artifact store with manifests"
    public_representation: "metadata/hash only"
    state: PROPOSED
  - object: "Normalized datasets and features"
    authority: "versioned dataset/feature manifests tied to raw lineage"
    current_local_store: "SQLite/JSON/files are implementation details, not enterprise authority"
    state: PROPOSED
  - object: "Experiments, replay configurations and results"
    authority: "experiment registry plus versioned code/data/parameter/result manifests"
    current_local_store: "TradingDomainV01 outputs"
    state: PROPOSED
  - object: "Validation and promotion decisions"
    authority: "append-only validation/risk registry with user approval links"
    current_local_store: "ValidationReport/RiskCheckResult objects"
    state: PROPOSED
  - object: "Runtime serving indexes"
    authority: "rebuildable projection from authoritative knowledge/data records"
    target: "Supabase or local serving layer, not yet created"
    state: PLANNED
  - object: "Engineering learning"
    authority: "engineering-learning forecast/outcome/review registry"
    state: VERIFIED_FACT
  - object: "Service availability"
    authority: "runtime health observation plus service registry"
    rule: "Availability never establishes semantic or knowledge authority."
    state: VERIFIED_FACT
