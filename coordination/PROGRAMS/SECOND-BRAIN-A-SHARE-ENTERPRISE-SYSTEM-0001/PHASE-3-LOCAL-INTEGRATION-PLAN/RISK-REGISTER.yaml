  - id: RISK-P3-006
    risk: "Broad legacy service routes or reserved ports are treated as safe integration surfaces."
    likelihood: medium
    impact: high
    mitigation: "Narrow allow-listed read-only wrapper; 8767 remains inactive; no service action."
