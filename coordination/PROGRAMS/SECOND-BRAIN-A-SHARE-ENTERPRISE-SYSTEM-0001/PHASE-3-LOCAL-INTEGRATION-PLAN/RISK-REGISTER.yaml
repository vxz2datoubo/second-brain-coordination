schema_version: "1.0"
risks:
  - id: RISK-P3-001
    risk: "Git HTTPS fetch reset prevents an ordinary local worktree from current main."
    likelihood: medium
    impact: medium
    mitigation: "Use verified GitHub archive only for drafting; publish only after fresh remote parent verification."
    owner: CODEX
  - id: RISK-P3-002
    risk: "Dirty shared F:/aidanao working tree contains other-agent changes."
    likelihood: high
    impact: high
    mitigation: "No edits, tests, resets, or migration against shared root; use isolated artifacts."
    owner: CODEX
  - id: RISK-P3-003
    risk: "Legacy local state is mistaken for a canonical authority."
    likelihood: high
    impact: high
    mitigation: "System-of-record matrix and manifest gates; legacy data remains read-only candidate."
    owner: GPT
  - id: RISK-P3-004
    risk: "Private knowledge or credential values leak into public Git or reports."
    likelihood: medium
    impact: critical
    mitigation: "Reference/digest-only design, no secret inspection, public-safe scan before PR."
    owner: CODEX
  - id: RISK-P3-005
    risk: "Undocumented bar, corporate-action, session, or L2 semantics create false A-share conclusions."
    likelihood: high
    impact: critical
    mitigation: "Source classification, point-in-time gates, abstention, and WorkBuddy evidence probe."
