schema_version: '1.0.0'
mode: READONLY_DEPENDENCY
interfaces:
  - workstream: W2
    ownership: market_time_rules_and_replay
    permitted_use: reference PIT and rule semantics only
    prohibited_use: instantiate_or_run_replay
  - workstream: W3
    ownership: knowledge_evidence_memory
    permitted_future_input: candidate SourceRecord and EvidenceItem with manifest and rule snapshot references
    required_status: candidate_or_unknown
    prohibited_use: authority_write_or_knowledge_promotion
  - workstream: W7
    ownership: validation_and_final_risk_veto
    permitted_future_input: candidate ValidationReport for admission checks
    required_status: no_trade_and_non_promotional
    prohibited_use: risk_clearance_or_trading_approval
interface_rules:
  - no_new_runtime_or_schema_authority_is_created_here
  - all_identifiers_are_references_not_copies
  - unknown_or_blocked_status_propagates_without_boolean_coercion
