schema_version: '1.0.0'
status: PROPOSAL_ONLY
fields:
  - name: trade_date
    type: date
    unit: calendar_day
    required_evidence: source_format_and_timezone
    unknown_behavior: reject_if_invalid_or_ambiguous
  - name: open_high_low_close
    type: decimal
    unit: currency_per_share
    required_evidence: scaling_currency_and_adjustment_basis
    unknown_behavior: retain_as_untrusted_raw_only
  - name: volume
    type: numeric
    unit: UNKNOWN
    required_evidence: shares_lots_or_vendor_defined_unit
    unknown_behavior: prohibit_feature_signal_or_simulation_use
  - name: amount
    type: numeric
    unit: UNKNOWN
    required_evidence: currency_scaling_encoding_and_adjustment_basis
    unknown_behavior: prohibit_authoritative_turnover_or_feature_use
  - name: adjustment
    type: enum
    unit: none
    required_evidence: raw_forward_backward_and_corporate_action_lineage
    unknown_behavior: UNKNOWN_and_no_cross_date_comparison
  - name: suspension_status
    type: enum
    unit: none
    required_evidence: point_in_time_security_status
    unknown_behavior: UNKNOWN_not_false
  - name: risk_warning_status
    type: enum
    unit: none
    required_evidence: effective_dated_security_status
    unknown_behavior: UNKNOWN_not_false
lineage_requirements:
  - source_field_name_and_raw_encoding
  - field_semantics_version
  - source_version
  - corporate_action_reference
  - missing_zero_error_permission_distinction
