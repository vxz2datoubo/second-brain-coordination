schema_version: '1.0.0'
status: PROPOSAL_ONLY
canonical_reference: PHASE-0/ENTERPRISE-CONTRACT-REGISTRY.yaml
required_temporal_fields:
  event_time:
    meaning: Time the market event or bar close represents, not local file time.
  observed_at:
    meaning: Time the source states it observed or published the value.
  receive_time:
    meaning: Local receiver timestamp; never masquerades as exchange time.
  entered_system_at:
    meaning: Time an authorized adapter accepted the record.
  available_at:
    meaning: Earliest versioned time a research process may use the record.
  timezone:
    meaning: IANA-equivalent declared market/source timezone; Asia/Shanghai for A-share session references.
rules:
  - available_at_must_be_proven_by_source_or_versioned_policy
  - requested_as_of_before_available_at_must_reject_or_quarantine
  - filesystem_mtime_is_audit_metadata_not_market_or_availability_time
  - daily_bar_nominal_close_is_not_proof_of_data_availability
  - corrected_records_require_new_revision_and_available_at
  - missing_time_semantics_remains_UNKNOWN
daily_bar_guidance:
  nominal_event_time: trading_date 15:00 Asia/Shanghai only when source declares end-of-day bar semantics
  availability_policy: versioned per admitted source, exchange calendar and publication behavior
  prohibited_shortcut: infer available_at from a present-day local copy
