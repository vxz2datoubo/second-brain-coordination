program_objectives:
  - "Unify Second Brain, A-share research, data, event intelligence, multi-agent game, validation, and AI operations under one enterprise architecture."
  - "Operate the Second Brain as a Personal Epistemic and Cognitive Operating System separating world knowledge, personal cognitive modelling, task context, decision calibration, and metacognitive governance."
  - "Evaluate probabilistic edge and expected value before allocating capital, then apply robust Kelly, risk, correlation, liquidity and A-share execution constraints."
  - "Cover the full decision lifecycle from framing, belief and information value through timing, sizing, portfolio, survival, execution, validation, monitoring, attribution and evolution."
  - "Compile every material blueprint method into an existing skill, candidate skill, reference-only item, rejected item or explicit research unknown."
  - "Track daily institution, Northbound, passive/programmatic, active-seat and state-linked stabilization evidence without confusing activity, identity, direction or amount."
  - "Track confirmed policy calendars, high-prior unconfirmed windows, expectations, multi-dimensional surprises, pre-event pricing, cross-asset reactions and A-share transmission without confusing recurrence, rumor, surprise or causality."
  - "Validate reference-zone breaches, reclaims, continuations and post-event stabilization without claiming hidden stops, fake order flow or participant intent."
  - "Require every non-trivial agent task to complete the main delivery, active discovery and system-evolution proposal under bounded exploration and evidence-backed second-pass review."
  - "Define systems of record, contracts, dependencies, milestones, acceptance gates, rollback, user correction, belief revision and probability calibration."
  - "Select and launch testable vertical slices rather than implementing all modules at once."

