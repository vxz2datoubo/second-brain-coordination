program_objectives:
  - "Unify Second Brain, A-share research, data, event intelligence, participant hypotheses, validation and AI operations under one enterprise architecture."
  - "Keep market facts, evidence, probability, capital allocation, risk veto and outcome learning under separate single-writer authorities."
  - "Require point-in-time A-share rules, T+1, cost, capacity, liquidity and unexecutable-exit modelling."
  - "Validate each signal or contextual module separately before joint economic-increment testing."
  - "Use AMED bounded initiative, negative-result preservation and GPT seven-gate review for every non-trivial task."
  - "Operate research_only / NO_TRADE with no LLM in an order-critical path."

