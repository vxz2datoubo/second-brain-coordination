wip_policy:
  max_major_active_workstreams: 3
  rule: "Issue #59 and #60 may continue while #61, #62 and #63 perform planning-only work. Canonical implementation requires an explicit WIP decision, frozen interfaces and separate file ownership."
  max_initial_w12_child_vertical_slices: 3

skill_gap_governance:
  lifecycle: [FRAME, BELIEVE, LEARN, CHOOSE, TIME, SIZE, PORTFOLIO, SURVIVE, EXECUTE, VALIDATE, MONITOR, ATTRIBUTE, EVOLVE]
  maturity_states: [DISCOVERED, MENTIONED, MAPPED_TO_LIFECYCLE, CANDIDATE_SKILL_REGISTERED, RESEARCH_VALIDATED, CONTRACTED, IMPLEMENTED, A_SHARE_BACKTESTED, SHADOW_VALIDATED, VALIDATED_RESEARCH_CAPABILITY]
  material_method_must_be_classified_as:
    - EXISTING_SKILL_SUBCAPABILITY
    - CANDIDATE_INDEPENDENT_SKILL
    - REFERENCE_ONLY
    - REJECTED
    - UNKNOWN_NEEDS_RESEARCH
  blocking_findings:
    - ORPHAN_TERM
    - GHOST_CAPABILITY
    - FORMULA_WITHOUT_ASSUMPTIONS
    - SKILL_WITHOUT_A_SHARE_MAPPING
    - IMPLEMENTED_WITHOUT_VALIDATION
    - DUPLICATE_RUNTIME
    - MATURE_STATUS_INFLATION
  blueprint_presence_is_not_implementation: true
  formula_correctness_is_not_a_share_validation: true
  skill_count_is_not_success_metric: true

protected_authority_policy:
  protected_master_blueprints_remain_l0_authority: true
  user_authorized_non_secret_knowledge_may_enter_public_repository: true
  user_authorized_non_secret_knowledge_may_enter_local_architecture: true
  dual_storage_allowed: true
  public_repository_may_store: "user-authorized non-secret knowledge, blueprints, contracts, indexes, tasks, source bodies, atoms, evidence, tests, skills and backwrite packages subject to publication/license governance"
  public_repository_must_not_store: "API keys, tokens, passwords, cookies, private keys, bank/broker authentication secrets, account login data, or material the user is not authorized to publish"
  privacy_class_does_not_automatically_block_public_storage: true
  third_party_publication_license_governance_required: true

cognitive_governance:
  world_model_and_personal_model_separated: true
  task_context_model_required: true
  ex_ante_decision_freeze_required: true
  process_outcome_separation_required: true
  open_negotiated_user_model_required: true
  state_trait_context_domain_separation_required: true
  supporting_and_opposing_evidence_required: true
  user_correction_and_revocation_required: true
  metacognitive_monitoring_and_control_required: true
  anti_sycophancy_and_counterevidence_gate_required: true
  personal_model_cannot_silently_set_probability_utility_or_risk_limit: true

capital_allocation_governance:
  positive_net_expected_value_required_for_positive_allocation: true
  probability_source_and_calibration_required: true
  probability_uncertainty_required_for_high_impact_allocation: true
  full_kelly_default: false
  fractional_and_risk_constrained_comparisons_required: true
  correlation_and_common_factor_check_required: true
  tail_drawdown_and_survival_gate_required: true
  a_share_rule_registry_versioned_by_effective_date: true
  t_plus_one_and_unexecutable_exit_scenarios_required: true
  cost_liquidity_capacity_and_fill_probability_required: true
  output_range_preferred_over_false_precision: true
  abstain_and_no_executable_position_supported: true
  direct_order_output: false

trade_boundary:
  research_only: true
  llm_not_in_order_critical_path: true
  real_trade_requires_user_approval: true
