# ============================================================================
# 3. REPRODUCIBILITY INTERPRETATION BOUNDARY
# ============================================================================

reproducibility_boundary:
  - id: "REPRO-001"
    location: "D0-AUDIT-QUESTION-FREEZE.yaml Q18 (immutable)"
    severity: "INTERPRETIVE_RISK"
    description: >-
      Q18 can be misread as requiring all vendor or local-proprietary
      data to be freely reproducible on any machine without the
      original licensed data feed. That is an unreasonable standard.
    canonical_standard: >-
      P1 evaluation MUST accept licensed/local-only data as
      satisfactorily documented when ALL of the following are
      truthfully recorded: (a) data source name and vendor, (b) path
      alias (not credential-bearing path), (c) license/access
      boundary, (d) file-level SHA-256 hashes of the dataset as used,
      (e) exact environment (OS, Python version, library versions),
      (f) documented alternative dataset or synthetic sample for
      independent replay of logic, and (g) explicit UNKNOWN for
      full-scale portability.
    does_not_affect: "Question remains frozen; only P1 scoring interpretation changes."

