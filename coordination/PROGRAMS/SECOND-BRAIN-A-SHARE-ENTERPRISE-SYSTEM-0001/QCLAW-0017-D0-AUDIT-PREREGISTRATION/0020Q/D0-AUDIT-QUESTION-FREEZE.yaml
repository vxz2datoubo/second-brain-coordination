# ============================================================================
# DIMENSION 1: REFERENCE ZONE DEFINABILITY (Q01-Q04)
# ============================================================================
D1_REFERENCE_ZONE_DEFINABILITY:
  id: "D1"
  dimension: "Can reference zones be defined from PIT bar data without future leakage?"
  weight: 10.0

  Q01:
    id: "Q01"
    question: "For each reference zone type used in the D0 plan, state: (a) the exact PIT bar data
      fields used to define it, (b) the bar lookback window, and (c) whether ANY field in the zone
      definition uses data that would not have been available at bar close time."
    evidence_type: "data_path_table"
    must_cover: ["price_level_zone", "volume_zone", "volatility_zone"]
    scoring: {satisfies_contract: 1.0, partially_satisfies: 0.5, fails_or_missing: 0.0}

  Q02:
    id: "Q02"
    question: "Demonstrate that the reference zone timestamp (available_at) for every zone is
      STRICTLY ≤ the bar timestamp of the breach event being tested. Provide the computation
      that guarantees no look-ahead: if zone is defined at T, it cannot be used for breach
      detection at any time < T."
    evidence_type: "timestamp_causality_proof"
    scoring: {satisfies_contract: 1.0, partially_satisfies: 0.5, fails_or_missing: 0.0}

  Q03:
    id: "Q03"
    question: "If reference zones are updated over time (rolling window, regime change),
      specify the exact rule for when a new zone becomes valid AND the rule for which
      zone version applies to which time period. No version ambiguity."
    evidence_type: "zone_versioning_contract"
    scoring: {satisfies_contract: 1.0, partially_satisfies: 0.5, fails_or_missing: 0.0}

  Q04:
    id: "Q04"
    question: "Describe any reference zone that uses multi-timeframe data (e.g., daily zone
      used with 5-minute breach detection). Show that intra-day bar data cannot leak
      information from the same day's close into the zone definition before that close
      occurs."
    evidence_type: "multi_timeframe_causality"
    scoring: {satisfies_contract: 1.0, partially_satisfies: 0.5, fails_or_missing: 0.0}

