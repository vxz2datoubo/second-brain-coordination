active_discovery_duty:
  required_checks:
    - WRONG_OR_STALE_ASSUMPTION
    - MISSING_REQUIREMENT
    - DUPLICATE_RUNTIME_OR_SKILL
    - INTERFACE_GAP
    - REUSABLE_CAPABILITY
    - SIMPLER_OR_BETTER_METHOD
    - CROSS_MODULE_LINKAGE
    - HIDDEN_COST_OR_RISK
    - NEGATIVE_OR_COUNTERINTUITIVE_RESULT
  required_output: "SYSTEM-DISCOVERY-AND-OPPORTUNITY-REPORT"

research_trigger:
  level: "L1_REUSE_AND_QUICK_CHECK | L2_TARGETED_PROFESSIONAL_RESEARCH | L3_INDEPENDENT_RESEARCH_TASK"
  trigger_reasons:
    - ""
  required_source_classes:
    - ""
  a_share_adaptation_required: false
  research_ledger_required: true

exploration_budget:
  primary_delivery_share: ""
  active_discovery_share: ""
  system_opportunity_share: ""
  max_new_architecture_proposals: 0
  max_new_skill_candidates: 0
  max_unplanned_files: 0
  scope_expansion_without_gate: false

improvement_authority:
  A_SAFE_LOCAL_AUTONOMOUS:
    allowed_examples:
      - ""
  B_BOUNDED_IMPLEMENT_AND_REPORT:
    allowed_examples:
      - ""
  C_PROPOSAL_ONLY:
    examples:
      - ""
  D_PROHIBITED_OR_USER_GATE:
    examples:
      - ""

required_evidence:
  fact_classes:
    - VERIFIED_REPOSITORY
    - VERIFIED_LOCAL
    - VERIFIED_OFFICIAL_SOURCE
    - VERIFIED_TEST
    - INFERENCE
    - INHERITED_REPORT
    - ACCESS_NOT_AVAILABLE
    - UNKNOWN
  commands_and_exit_codes: true
  tests_pass_fail_skip: true
  negative_results: true
  alternatives_and_tradeoffs: true
  rollback: true

mandatory_delivery_artifacts:
  - AGENT-EXECUTION-RECEIPT
  - RESEARCH-LEDGER
  - UNPLANNED-IMPROVEMENT-LEDGER
  - SYSTEM-DISCOVERY-AND-OPPORTUNITY-REPORT
  - TEST-RUN-RECEIPT
  - UNKNOWN-REGISTRY
  - AI_HANDOFF

second_pass_audit:
  required: true
  reviewer: "GPT"
  gates:
    - TASK_COMPLETENESS_GATE
    - FACT_EVIDENCE_GATE
    - RESEARCH_QUALITY_GATE
    - ENGINEERING_CORRECTNESS_GATE
    - IMPROVEMENT_VALUE_GATE
    - SYSTEM_EVOLUTION_GATE
    - NEXT_ACTION_GATE
