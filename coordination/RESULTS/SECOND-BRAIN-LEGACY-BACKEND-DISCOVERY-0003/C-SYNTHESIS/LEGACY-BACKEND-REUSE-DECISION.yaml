classification_policy:
  meanings:
    REUSE_AS_IS: "Direct reuse is justified by evidence and governance fit."
    WRAP: "Retain existing component behind a separate governed compatibility adapter."
    MIGRATE: "Preserve intent/data while moving into the target contract."
    ARCHIVE: "Preserve historical evidence without active integration."
    DEPRECATE: "Stop using after evidence and approval; no candidate meets this bar."
    UNKNOWN: "Insufficient evidence for a reuse or retirement decision."
  guardrails:
    - "Not listening at one check time is not deprecation evidence."
    - "No legacy component becomes the canonical source by being active."
    - "No classification authorizes service activation, migration, or trade action."
global_decision:
  canonical_knowledge_authority: "Future private GitHub knowledge repository, per Issue #21."
  serving_projection: "Supabase materialized projection, rebuildable from canonical Git history."
  legacy_role: "Legacy stores and services are import/compatibility candidates only."
  reuse_as_is_candidates: []
  deprecate_candidates: []
candidates:
  - candidate_id: "SB-HTTP-8766"
    classification: "WRAP"
    confidence: "medium"
    status_at_runtime_cutoff: "LISTENING"
    evidence:
      - "server.py and service registry declare the SuperBrain HTTP service and data root."
      - "Phase B verified a Python process, root UI, GET/POST responses, and F:/aidanao/data candidate files."
    counterevidence:
      - "Dedicated structured health endpoint is absent; GET /health returned error HTML."
      - "Authentication, firewall state, full API surface, write behavior, and store integrity are unverified."
      - "0.0.0.0 bind may be LAN reachable."
    dependencies:
      - "Owner approval for read-only compatibility wrapping."
      - "Security review and a narrow read-only API contract."
      - "Immutable legacy-source manifest before any export."
    risks:
      - "Dual authority if clients write directly to the legacy store."
      - "Potential LAN exposure or ungoverned legacy endpoints."
    rollback:
      strategy: "Feature-flagged wrapper only; legacy process and data remain untouched."
      validation: "Disable wrapper and verify no legacy files or records were changed."
    approval_required:
      - "User approval for any data export or external client registration."
      - "Security approval before wider network exposure."
