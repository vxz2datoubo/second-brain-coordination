    rollback:
      strategy: "No activation or source change in this plan."
      validation: "No service registry or source file changes."
    approval_required:
      - "User approval before activation or port reassignment."
  - candidate_id: "SB-LEGACY-HTTP-MCP-8767"
    classification: "UNKNOWN"
    confidence: "medium"
    status_at_runtime_cutoff: "NOT_LISTENING"
    evidence:
      - "mcp/brain_server.py declares a legacy HTTP document bridge."
      - "It references second-brain documents and core logs."
    counterevidence:
      - "No verified endpoint contract or runtime activity."
      - "Static conflict with SB-DEEP-HTTP-8767 on port 8767."
      - "Potential overlap with the stdio MCP adapter is untested."
    dependencies:
