  - candidate_id: "SB-MCP-STDIO"
    classification: "WRAP"
    confidence: "medium"
    status_at_runtime_cutoff: "UNKNOWN"
    evidence:
      - "brain_bridge.py exposes stdio MCP read-oriented tools/resources."
      - "It forwards selected knowledge access to 8766 and has a local fallback."
    counterevidence:
      - "No initialize/list-tools handshake was performed."
      - "Fallback behavior and the full tool authorization surface are unverified."
    dependencies:
      - "Future strict read-only MCP handshake."
      - "Tool allow-list, provenance envelope, and action-gate review."
    risks:
      - "Ungoverned fallback or tool expansion could bypass target versioning."
    rollback:
      strategy: "New wrapper configuration is separate and removable; retain the source unchanged."
      validation: "Use private GitHub read channel as a non-MCP fallback."
    approval_required:
      - "Approval before registering any write/action-capable tool."
  - candidate_id: "SB-CHATGPT-BRIDGE-8799"
    classification: "MIGRATE"
    confidence: "medium"
    status_at_runtime_cutoff: "NOT_LISTENING"
    evidence:
      - "bridge.py describes a FastAPI local bridge with in-memory queues forwarding ingestion to 8766."
    counterevidence:
      - "No runtime validation; durability and browser/session behavior unverified."
      - "In-memory delivery is not a durable canonical ingestion record."
    dependencies:
      - "KnowledgePacket schema, idempotency key, authenticated ingestion worker, failure queue."
    risks:
      - "Browser/session leakage, dropped tasks, and duplicate direct-write routes."
    rollback:
      strategy: "Preserve historical implementation; replacement is opt-in and independent."
      validation: "Disable replacement without changes to legacy bridge or stores."
    approval_required:
      - "User approval before replacing an existing intake workflow."
  - candidate_id: "HISTORICAL-F-AI"
    classification: "ARCHIVE"
    confidence: "high"
    status_at_runtime_cutoff: "NO_ACTIVE_CANDIDATE_SERVICE"
    evidence:
      - "Phase B confirmed F:/ai exists with historical coordination, QClaw output, and TDX-related artifacts."
      - "No candidate service was found running from this path."
    counterevidence:
      - "Some contents may still hold useful provenance or licensed/private material; contents were not classified."
    dependencies:
      - "Owner approval and privacy/licensing classification before any selective import."
    risks:
      - "Deletion loses provenance; treating it as live repeats stale path drift."
    rollback:
      strategy: "No move, deletion, or import."
      validation: "Any future import is content-addressed and removable only from the new target version."
    approval_required:
      - "User approval before content leaves the local machine."
