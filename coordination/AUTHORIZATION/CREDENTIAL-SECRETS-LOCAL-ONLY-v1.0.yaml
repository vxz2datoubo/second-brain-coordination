schema_version: "1.0"
record_type: "UserAuthorizationDecision"
status: "ACTIVE"
issued_by: "USER"
recorded_by: "GPT"
issued_at: "2026-07-21"

knowledge_policy:
  complete_learning: true
  complete_atomization: true
  complete_retrieval: true
  gpt_access_default: "FULL_SEMANTIC_ACCESS"

credential_secret_exception:
  categories:
    - "access_token"
    - "api_key"
    - "login_password"
    - "session_credential"
    - "private_key"
    - "account_authentication_secret"
  storage: "LOCAL_ONLY"
  locally_searchable: true
  github_upload: false
  public_object_storage: false
  ordinary_learning_packet_body: false
  ordinary_context_bundle_body: false
  graph_representation:
    - "reference_id"
    - "purpose"
    - "owning_system"
    - "updated_at"
    - "verification_digest"
    - "local_location_hint"

not_secret_content:
  - "API documentation"
  - "interface schemas"
  - "field definitions"
  - "usage instructions"
  - "non-authentication technical materials"

interpretation: "Only credential values are local-only. All other user-authorized knowledge remains fully learnable, mergeable and retrievable."
