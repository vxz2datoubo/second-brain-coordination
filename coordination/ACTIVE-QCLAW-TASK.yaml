    - CONFLICT_ERASURE
    - UNKNOWN_ERASURE
    - STALE_KNOWLEDGE
    - USER_PREFERENCE_AS_FACT
    - UNSUPPORTED_CERTAINTY
    - FABRICATED_SOURCE
