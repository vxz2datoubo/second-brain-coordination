long_term_memory_role:
  enabled: true
  issue: 60
  objective: "Build a durable second knowledge base that supports semantic recall, exact recall, temporal reasoning, graph navigation, memory consolidation and a computable memory-palace structure."
  memory_layers:
    - "WORKING_MEMORY"
    - "EPISODIC_MEMORY"
    - "SEMANTIC_MEMORY"
    - "PROCEDURAL_MEMORY"
    - "AUTOBIOGRAPHICAL_USER_MEMORY"
    - "PROJECT_MEMORY"
    - "SOURCE_MEMORY"
    - "CONFLICT_AND_UNKNOWN_MEMORY"
    - "META_MEMORY"
  retrievers:
    - "VECTOR_SEMANTIC_RETRIEVER"
    - "LEXICAL_BM25_RETRIEVER"
    - "EXACT_ID_AND_ENTITY_RETRIEVER"
    - "KNOWLEDGE_GRAPH_RETRIEVER"
    - "TEMPORAL_VERSION_RETRIEVER"
    - "SOURCE_EVIDENCE_RETRIEVER"
    - "MEMORY_PALACE_RETRIEVER"
    - "USER_AND_PROJECT_SCOPE_RETRIEVER"
    - "CONFLICT_UNKNOWN_RETRIEVER"
  memory_palace_contract:
    hierarchy: ["MemoryPalace", "PalaceWing", "MemoryRoom", "MemoryLocus", "MemoryObjectPlacement"]
    rule: "The palace is a stable computable navigation index over canonical atoms, not a duplicate body store or decorative UI."
  embedding_governance:
    provider_agnostic: true
    backend_agnostic: true
    local_first: true
    chinese_first_benchmark: true
    reembedding_supported: true
    canonical_content_rebuilds_all_indexes: true
    do_not_select_backend_before_benchmark: true
  lifecycle:
    - "INGESTED"
    - "CANDIDATE"
    - "ACTIVE"
    - "CONSOLIDATED"
    - "SUPERSEDED"
    - "STALE"
    - "DISPUTED"
    - "REVOKED"
    - "ARCHIVED"
    - "FORGOTTEN_INDEX_ONLY"
  required_controls:
    - "Hybrid retrieval and reranking; cosine similarity alone is insufficient."
    - "Current, historical, stale, disputed and revoked memories must remain distinguishable."
    - "Conflicts, counterevidence and UNKNOWN must be returned when relevant."
    - "Memory decay may lower index weight or archive an item but must not silently delete canonical knowledge."
    - "Embeddings, palace placement and all other indexes must be rebuildable from canonical knowledge."
    - "Every long-term retrieval benchmark must include anti-sycophancy and epistemic-integrity cases."

adversarial_role:
  enabled: true
  objective: "Reduce AI sycophancy, confirmation bias, unsupported agreement, fabricated certainty, conflict erasure, stale-memory leakage and incorrect knowledge promotion."
  mandatory_case_families:
    - "USER_AGREEMENT_PRESSURE"
    - "CONFIRMATION_BIAS"
    - "FALSE_CAUSALITY"
    - "MISSING_NEGATION"
    - "MISSING_CONDITION"
    - "MISSING_EXCEPTION"
    - "CONFLICT_ERASURE"
    - "UNKNOWN_ERASURE"
    - "STALE_KNOWLEDGE"
    - "USER_PREFERENCE_AS_FACT"
    - "UNSUPPORTED_CERTAINTY"
    - "FABRICATED_SOURCE"
    - "VECTOR_NEIGHBOR_FALSE_MATCH"
    - "CROSS_PROJECT_MEMORY_LEAK"
    - "MEMORY_PALACE_PROXIMITY_AS_CAUSALITY"
    - "EMBEDDING_VERSION_DRIFT"
    - "PROMPT_INJECTION"
    - "SECRET_VALUE_LEAKAGE"
    - "AUTHORITY_ESCALATION"
    - "FALSE_COMPLETION_CLAIM"
  rules:
    - "Insufficient evidence must produce UNKNOWN, NEEDS_VERIFICATION or ABSTAIN."
    - "Conflicting memories must coexist until an evidence-backed resolution is recorded."
    - "Do not delete failed tests or rewrite expected answers merely to raise the score."
    - "Report per-case failures and block completion on material unresolved failures."

priority_state_machine:
  P0: "Repair blocking atomization architecture defects."
  P0M: "Perform Issue #60 M0 audit and project plan; freeze integration contracts and non-duplication boundaries."
  P1: "Digest pending authorized knowledge items."
  P1A: "Run adversarial validation on every digest batch and repair failures."
  P1M: "Build and test the long-term memory, hybrid retrieval and memory-palace modules in the Issue #60 branch after M0 gates pass."
  P2: "When P0, P0M, P1, P1A and P1M have no pending work, assist explicitly assigned system-construction tasks."
  return_rule: "New knowledge returns work to P1; adversarial failures return to P0/P1/P1M; long-term memory integration conflicts return to P0M."

