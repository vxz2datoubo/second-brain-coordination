    - CORRELATED_FORECAST_DOUBLE_COUNT
    - A_SHARE_UNEXECUTABLE_EXIT
    - BLUEPRINT_TERM_AS_IMPLEMENTED_SKILL
  rules:
    - "Insufficient evidence produces UNKNOWN, NEEDS_VERIFICATION or ABSTAIN."
    - "Conflicting memories and evidence coexist until evidence-backed resolution."
    - "Failed tests remain visible and block completion."
    - "Anti-sycophancy does not become unsupported mechanical disagreement."

