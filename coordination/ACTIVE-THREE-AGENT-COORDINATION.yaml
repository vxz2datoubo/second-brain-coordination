bar_only_contract:
  allowed:
    - "Point-in-time minute/daily bars, pre-known reference zones and explicit bar-only derived formulas."
    - "Versioned exchange/board/security-state rules, calendars, corporate actions and T+1 inventory."
    - "Read-only sanitized local data inventory and replay-readiness evidence."
  prohibited:
    - "L2 order book/displayed depth dependency, raw trade/order events or L3."
    - "DDX/DDY/DDZ, fabricated Delta/CVD/OFI, participant identity or main-force/hidden-stop intent."
    - "Probability engine, capital allocation, order generation, account access or real trading."

rule_research_boundary:
  primary_sources: ["SSE", "SZSE", "BSE", "CSRC", "CSDC"]
  requirement: >-
    Rules must be versioned by exchange, board, security/risk-warning status and effective date. No universal ST limit,
    auction window or board rule may be assumed from a single example.

