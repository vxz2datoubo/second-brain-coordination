bar_only_contract:
  allowed:
    - "Point-in-time minute/daily bars and pre-known reference zones."
    - "Breach, bar-close reclaim, sustained reclaim, failed reclaim, continuation and stabilization labels."
    - "T+1 sellable/frozen inventory, overnight gap, suspension and price-limit rules."
    - "Costs, slippage, non-fill assumptions, purged walk-forward, embargo, nested selection and lockbox."
  prohibited:
    - "L2 order book or displayed-depth dependency, raw trade/order events or L3."
    - "DDX/DDY, fabricated Delta/CVD/OFI, participant identity or main-force/hidden-stop intent."
    - "Probability engine, capital allocation, order generation, account access or real trading."

