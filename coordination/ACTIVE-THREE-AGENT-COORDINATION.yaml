    - agent_id
    - target_agent
    - task_id
    - run_id
    - status
    - verified_facts
    - unknowns
    - privacy_class
    - authority_level
    - positive_effects
    - negative_effects
    - unexpected_findings
    - rollback_or_discard_method
  authority_default: "CANDIDATE_OR_OBSERVATION_ONLY"
  no_silent_task_preemption: true
  no_direct_main_write_by_executors: true
  no_auto_merge: true
  no_trade: true

