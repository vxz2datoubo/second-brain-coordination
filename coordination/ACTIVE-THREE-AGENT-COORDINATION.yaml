shared_handoff_contract:
  required_fields:
    - agent_id
    - target_agent
    - task_id
    - run_id
    - status
    - verified_facts
    - unknowns
    - privacy_class
    - authority_level
    - positive_effects
    - negative_effects
    - unexpected_findings
    - rollback_or_discard_method
  privacy_default: "PUBLIC_SAFE_METADATA_ONLY"
  authority_default: "CANDIDATE_OR_OBSERVATION_ONLY"
  no_silent_task_preemption: true
  no_direct_main_write_by_executors: true
  no_auto_merge: true
  no_trade: true

wip_policy:
  major_workstream_limit: 2
  current_major_workstreams:
    - "CODEX Issue #35"
  bounded_parallel_tests:
    - "QCLAW Issue #36 synthetic candidate validation"
  completed_deliveries_in_review:
    - "WORKBUDDY PR #34"
  interpretation: "QQ Issue #36 is bounded, synthetic and public-safe. It may run while Codex P1 continues, but cannot expand into real/private ingestion."

cross_agent_dependencies:
  - from: "WORKBUDDY PR #34"
    to: "QCLAW#36"
    deliverable: "proposed LearningPacket, local state machine and privacy classification contracts"
    blocking: false
    authority: "REFERENCE_ONLY"
  - from: "QCLAW#36"
    to: "CODEX#35"
    deliverable: "public-safe compatibility observations and discovered ambiguities"
    blocking: false
    authority: "OBSERVATION_ONLY"
  - from: "CODEX#35"
    to: "future offline replay"
    deliverable: "frozen foundation contracts and tests"
    blocking: true
  - from: "WORKBUDDY#32"
    to: "future knowledge authority slice"
    deliverable: "accepted local runtime/data evidence"
    blocking: true

risk_gate:
  current_decision: "PROCEED_WITH_CONTROLS"
  user_approval_required_now: false
  stop_and_escalate_before:
    - "private or sensitive knowledge leaves local machine"
    - "cloud/private repository/object storage creation"
    - "credential access or service lifecycle changes"
    - "protected blueprint body changes"
    - "candidate knowledge authority promotion"
    - "real trading, broker or order path"
