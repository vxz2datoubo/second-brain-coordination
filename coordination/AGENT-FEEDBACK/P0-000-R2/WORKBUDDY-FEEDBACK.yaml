# ========== 根因分析：R1 → R2 的回溯 ==========
root_cause_analysis:
  - failure: "R1 声称修复了硬编码路径但远程文件实际未修改"
    timeline:
      - "R1 阶段我在本地修改了 start_bridge.bat 和 tdx_live_bridge.py"
      - "生成 Manifest 时做了多次 git add/commit/amend/force push"
      - "最终 push 的 commit 是 23ea5e5"
      - "GPT 远程验证发现这两个文件的硬编码路径仍在"
    why_did_this_happen:
      - "最可能原因：R1 的多次 amend + force push 中，某些 amend 操作只提交了 Manifest 更新，遗漏了这两个文件的 staged 内容"
      - "或：R1 的修改被后来的一次 git add 覆盖（add 了旧版本的这两个文件）"
      - "根本原因：我没有在最终 push 前执行 git diff --cached 逐文件确认，也没有在 push 后 clean clone verify"
    lesson:
      - "铁律：声称'远程文件已修改'的交付 → push 后必须 clean clone + 逐文件 grep 验证"
      - "铁律：commit 前必须 git diff --cached 确认每个预期修改的文件确实在暂存区"
      - "禁止：force push 后只跑 git log --oneline 就当验证完成"
