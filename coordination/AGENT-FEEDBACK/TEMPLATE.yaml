# AGENT-FEEDBACK 模板
# 来源: Issue #4 长期收集台模板
# 所有非 trivial 任务完成后必须填写此模板并提交到 coordination/AGENT-FEEDBACK/<task-id>/

agent_id: WORKBUDDY  # CODEX | GPT
task_id: "<任务ID>"
report_type: progress  # progress | blocker | final | opportunity
status: SUCCESS_CLEAN  # SUCCESS_CLEAN | SUCCESS_WITH_FINDINGS | PARTIAL | BLOCKED | FAILED | NEEDS_APPROVAL
difficulty_level: D1  # D1轻微 | D2一般 | D3困难 | D4很困难 | D5阻断
difficulty_reasons:
  - none  # 难点及其来源
original_plan_vs_reality:
  - none  # 原计划与真实环境的差异
problems_encountered:
  - problem: none
    impact: none
    evidence: none  # 日志、文件、命令、PR链接或哈希
solutions_attempted:
  - approach: none
    result: none  # 成功/失败/部分成功
    reason: none
final_solution:
  - none  # 最终解决方式，未解决则写 unresolved
unresolved_questions:
  - none
unexpected_findings:
  - none
opportunities:
  - none
recommendations:
  - none
command_quality_feedback:
  clarity: clear  # clear | partial | ambiguous | conflicting
  unnecessary_work: none
  missing_context: none
  suggested_rewrite: none
plan_change_needed: false
needs_gpt_decision: false
needs_user_decision: false
next_best_action: none
confidence: high  # high | medium | low
