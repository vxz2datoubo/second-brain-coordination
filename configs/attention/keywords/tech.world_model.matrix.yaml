context_rules:
  positive:
    - rule_id: ctx.kunlun_matrix
      all_of:
        - "Matrix"
        - "昆仑万维"
      target_sense: sense.matrix_3_5_world_model
      confidence_boost: 0.45

    - rule_id: ctx.matrix_world_model
      all_of:
        - "Matrix"
        - "世界模型"
      target_sense: sense.matrix_3_5_world_model
      confidence_boost: 0.35

    - rule_id: ctx.matrix_ai_release
      all_of:
        - "Matrix"
      any_of:
        - "模型"
        - "AI"
        - "发布"
        - "生成"
        - "视频"
        - "空间智能"
      target_sense: sense.matrix_world_model
      confidence_boost: 0.20

  negative:
    - rule_id: ctx.matrix_movie
      any_of:
        - "黑客帝国"
        - "The Matrix"
        - "电影"
        - "基努里维斯"
      target_sense: sense.matrix_movie
      target_topic_penalty: 1.0

    - rule_id: ctx.matrix_math
      any_of:
        - "线性代数"
        - "矩阵乘法"
        - "行列式"
        - "特征值"
        - "矩阵求逆"
      target_sense: sense.matrix_mathematics
      target_topic_penalty: 1.0

    - rule_id: ctx.matrix_robotics
      any_of:
        - "Matrix Robotics"
        - "机器人公司"
        - "人形机器人"
      target_sense: sense.matrix_robotics_company
      target_topic_penalty: 0.8

disambiguation_policy:
  direct_topic_score_allowed_for:
    - ANCHOR
  conditional_topic_score_allowed_for:
    - CORE
  disallowed_without_attribution:
    - BROAD
  unknown_class_required: true
  minimum_confidence_for_topic_score: 0.75
  minimum_evidence_items: 2
  require_counter_evidence_check: true

